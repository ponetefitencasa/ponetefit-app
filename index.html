        }

        // ─── BLOQUE TIEMPO (Circuito por Tiempo) ───
        function iniciarBloqueTiempo(timerId, btnId, totalSeg) {
            const timerEl = document.getElementById(timerId);
            const btnEl = document.getElementById(btnId);
            if (!timerEl || !btnEl) return;
            if (btnEl.dataset.running === "1") return;
            btnEl.dataset.running = "1";
            btnEl.disabled = true;
            btnEl.innerText = "En curso...";
            solicitarWakeLock();

            let rem = totalSeg;
            bloqueTiempoIntervals[timerId] = setInterval(function() {
                rem--;
                const m = Math.floor(rem / 60),
                    s = rem % 60;
                timerEl.innerText = m + ":" + (s < 10 ? "0" + s : s);
                if (rem <= 3 && rem > 0) beep(400);
                if (rem <= 0) {
                    clearInterval(bloqueTiempoIntervals[timerId]);
                    beep(800);
                    timerEl.innerText = "TIEMPO!";
                    btnEl.disabled = false;
                    btnEl.innerText = "Reiniciar";
                    btnEl.dataset.running = "0";
                    liberarWakeLock();
                }
            }, 1000);
        }

        function iniciarBloqueTiempoConDescuento(timerId, btnId, totalSeg) {
            iniciarBloqueTiempo(timerId, btnId, totalSeg);
        }

        // ─── TIMER PRINCIPAL (Tabata / Circuito por Tiempo) ───
        let timerTrabajoCurr = 1;

        function iniciarCronometroTiempo() {
            if (timerActivo) return;
            timerActivo = true;
            timerPausado = false;
            solicitarWakeLock();

            const config = dataGlobal.config || {
                trabajo: 20,
                pausa: 10,
                rondas: 1,
                cantidad: 8,
                pausa_entre_rondas: 0
            };
            const rutina = dataGlobal.rutina || dataGlobal.datos || [];
            const trabajo = config.trabajo || 20;
            const pausa = config.pausa || 10;
            const rondas = config.rondas || 1;
            const cantidad = config.cantidad || rutina.length || 8;
            const pausaRondas = config.pausa_entre_rondas || 0;

            document.getElementById('btnStartTimer').style.display = "none";
            const btnPausa = document.getElementById('btnPausaTimer');
            if (btnPausa) {
                btnPausa.style.display = "block";
                btnPausa.innerText = "⏸ PAUSAR";
            }

            tSegs = 5;
            tFase = "prep";
            tIdx = 0;
            tRonda = 1;
            timerTrabajoCurr = trabajo;

            // Update clock appearance
            const clock = document.getElementById('clock');
            clock.className = 'prep';

            function actualizarUI() {
                document.getElementById('t-status').innerText = tFase === "prep" ? "PREPARATE" : (tFase === "trabajo" ? "TRABAJO" : (tFase === "pausa" ? "DESCANSO" : "LISTO"));
                document.getElementById('clock').className = tFase === "trabajo" ? "" : (tFase === "pausa" ? "descanso" : "prep");

                if (rutina.length > 0) {
                    const ej = rutina[tIdx % rutina.length];
                    const nombre = Array.isArray(ej) ? ej[0] : (ej.nombre || "");
                    document.getElementById('t-ejercicio-nombre').innerText = tFase === "trabajo" ? nombre : (tFase === "pausa" ? "Respira..." : "");
                    document.getElementById('t-ej-restantes').innerText = tFase === "trabajo" ? ("Serie " + (tIdx + 1) + "/" + cantidad + " — Ronda " + tRonda + "/" + rondas) : "";

                    const nextIdx = (tIdx + 1) % rutina.length;
                    if (tFase === "pausa" && tIdx < cantidad - 1) {
                        const nextEj = rutina[nextIdx];
                        document.getElementById('next-ej-container').style.display = "block";
                        document.getElementById('next-ej-name').innerText = Array.isArray(nextEj) ? nextEj[0] : (nextEj.nombre || "");
                    } else {
                        document.getElementById('next-ej-container').style.display = "none";
                    }
                }

                // Progress bar
                const fillEl = document.getElementById('timer-progress-fill');
                if (fillEl) {
                    const total = tFase === "prep" ? 5 : (tFase === "trabajo" ? trabajo : pausa);
                    fillEl.style.width = ((tSegs / total) * 100) + '%';
                    fillEl.style.background = tFase === "trabajo" ? "var(--verde)" : (tFase === "pausa" ? "var(--rojo)" : "var(--amarillo)");
                    fillEl.style.transition = "width 1s linear, background 0.3s";
                }
            }

            actualizarUI();

            tInterval = setInterval(function() {
                if (timerPausado) return;
                tSegs--;
                document.getElementById('clock').innerText = tSegs < 10 ? "0" + tSegs : tSegs;

                // Progress bar
                const total = tFase === "prep" ? 5 : (tFase === "trabajo" ? trabajo : pausa);
                const fillEl = document.getElementById('timer-progress-fill');
                if (fillEl) {
                    fillEl.style.width = ((tSegs / total) * 100) + '%';
                    fillEl.style.transition = "none";
                }

                if (tSegs <= 3 && tSegs > 0) beep(400);

                if (tSegs <= 0) {
                    beep(800);
                    if (tFase === "prep") {
                        tFase = "trabajo";
                        tSegs = trabajo;
                        actualizarUI();
                    } else if (tFase === "trabajo") {
                        tFase = "pausa";
                        tSegs = pausa;
                        tIdx++;
                        actualizarUI();
                    } else if (tFase === "pausa") {
                        if (tIdx >= cantidad) {
                            if (pausaRondas > 0 && tRonda < rondas) {
                                mostrarPausaRonda(pausaRondas, tRonda, rondas, function() {
                                    tRonda++;
                                    tIdx = 0;
                                    tFase = "trabajo";
                                    tSegs = trabajo;
                                    actualizarUI();
                                });
                            } else if (tRonda < rondas) {
                                tRonda++;
                                tIdx = 0;
                                tFase = "trabajo";
                                tSegs = trabajo;
                                actualizarUI();
                            } else {
                                clearInterval(tInterval);
                                document.getElementById('t-status').innerText = "COMPLETADO!";
                                document.getElementById('clock').innerText = "00";
                                document.getElementById('clock').className = "";
                                timerActivo = false;
                                liberarWakeLock();
                            }
                        } else {
                            tFase = "trabajo";
                            tSegs = trabajo;
                            actualizarUI();
                        }
                    }
                }

                document.getElementById('clock').innerText = tSegs < 10 ? "0" + tSegs : tSegs;
            }, 1000);
        }

        function togglePausaTimer() {
            timerPausado = !timerPausado;
            const btn = document.getElementById('btnPausaTimer');
            if (btn) btn.innerText = timerPausado ? "▶ REANUDAR" : "⏸ PAUSAR";

        // ─── PAUSA ENTRE RONDAS (overlay) ───
        function mostrarPausaRonda(segundos, rondaActual, totalRondas, callback) {
            clearInterval(tInterval);
            const clock = document.getElementById('pausa-ronda-clock');
            const progress = document.getElementById('pausa-ronda-progress');
            const info = document.getElementById('pausa-ronda-info');
            const total = segundos;
            clock.innerText = segundos;
            info.innerText = "Ronda " + rondaActual + "/" + totalRondas + " completada";

            document.getElementById('overlay-pausa-ronda').classList.add('visible');
            document.getElementById('overlay-pausa-ronda').style.display = 'flex';
            solicitarWakeLock();

            let rem = segundos;
            tPausaRondaResolve = callback;
            pausaRondaInterval = setInterval(function() {
                rem--;
                clock.innerText = rem;
                if (progress) progress.style.width = ((rem / total) * 100) + '%';
                if (rem <= 3 && rem > 0) beep(400);
                if (rem <= 0) {
                    clearInterval(pausaRondaInterval);

        function salterPausaRonda() {
            clearInterval(pausaRondaInterval);
            document.getElementById('overlay-pausa-ronda').classList.remove('visible');
            document.getElementById('overlay-pausa-ronda').style.display = 'none';
            if (tPausaRondaResolve) {
                tPausaRondaResolve();
                tPausaRondaResolve = null;
            }
            // Reanudar timer
            if (timerActivo) {
                tInterval = setInterval(arguments.callee || function() {}, 1000); // reiniciar loop
            }
        }

        // ─── EMOM PRINCIPAL ───
        function iniciarEmom() {
            if (emomRunning) return;
            emomRunning = true;
            solicitarWakeLock();

            const minutos = dataGlobal.minutos_totales || 10;
            emomTotalMin = minutos;

            document.getElementById('btnStartEmom').style.display = "none";

            let minActual = 0;
            document.getElementById('emom-status').innerText = "PREPARATE!";
            document.getElementById('emom-minuto').innerText = "Comienza en 5...";
            let _cd = 5;
            document.getElementById('emom-clock').innerText = _cd;

            const ivPrep = setInterval(function() {
                beep(440);
                _cd--;
                document.getElementById('emom-clock').innerText = _cd;
                if (_cd <= 0) {
                    clearInterval(ivPrep);
                    sig();
                }
            }, 1000);

            function sig() {
                if (minActual >= minutos) {
                    document.getElementById('emom-status').innerText = "COMPLETADO!";
                    document.getElementById('emom-minuto').innerText = "";
                    document.getElementById('emom-clock').innerText = "OK";
                    emomRunning = false;
                    liberarWakeLock();
                    return;
                }
                document.getElementById('emom-status').innerText = "TRABAJA!";
                document.getElementById('emom-minuto').innerText = "Minuto " + (minActual + 1) + " de " + minutos;
                let rem = 60;
                document.getElementById('emom-clock').innerText = rem;
                const fillEl = document.getElementById('emom-progress-fill');
                if (fillEl) {
                    fillEl.style.width = '100%';
                }

                emomInterval = setInterval(function() {
                    rem--;
                    document.getElementById('emom-clock').innerText = rem;
                    if (fillEl) {
                        fillEl.style.width = ((rem / 60) * 100) + '%';
                        fillEl.style.transition = "none";
                    }
                    if (rem <= 3 && rem > 0) beep(400);
                    if (rem <= 0) {
                        clearInterval(emomInterval);
                        beep(800);
                        minActual++;
                        sig();
                    }
                }, 1000);
            }
        }

        // ─── TABATA BLOQUE MIX ───
        const tabataRunningFlags = {};

        function iniciarTabataBloque(btnId, statusId, ejId, infoId, timerId, tc, rutina) {
            const btn = document.getElementById(btnId);
            if (!btn || tabataRunningFlags[btnId]) return;
            tabataRunningFlags[btnId] = true;
            const pausaId = btnId.replace('-btn', '-pausa');
            const pausaBtn = document.getElementById(pausaId);
            btn.disabled = true;
            btn.innerText = "En curso...";
            if (pausaBtn) pausaBtn.style.display = "block";
            solicitarWakeLock();

            const trabajo = tc.trabajo || 20;
            const pausa = tc.pausa || 10;
            const cantidad = tc.cantidad || 8;
            const rondas = tc.rondas || 1;
            const pausaRonda = tc.pausa_entre_rondas || 0;
            let pausado = false;
            if (pausaBtn) pausaBtn.onclick = function() {
                pausado = !pausado;
                pausaBtn.innerText = pausado ? "▶ REANUDAR" : "⏸ PAUSAR";
                if (pausado) liberarWakeLock();
                else solicitarWakeLock();
            };

            function runTabata() {
                let _prep = 5;
                document.getElementById(statusId).innerText = "PREPARATE!";
                document.getElementById(timerId).innerText = _prep;
                const _ivPrep = setInterval(function() {
                    if (pausado) return;
                    beep(600);
                    _prep--;
                    document.getElementById(timerId).innerText = _prep;
                    if (_prep <= 0) {
                        clearInterval(_ivPrep);
                        siguiente(0, 1);
                    }
                }, 1000);

                function siguiente(ejIdx, rondaActual) {
                    if (rondaActual > rondas) {
                        document.getElementById(statusId).innerText = "COMPLETADO!";
                        document.getElementById(timerId).innerText = "OK";
                        if (pausaBtn) pausaBtn.style.display = "none";
                        btn.disabled = false;
                        btn.innerText = "Reiniciar";
                        tabataRunningFlags[btnId] = false;
                        liberarWakeLock();
                        return;
                    }
                    if (ejIdx >= cantidad) {
                        if (pausaRonda > 0 && rondaActual < rondas) {
                            document.getElementById(statusId).innerText = "PAUSA RONDAS";
                            document.getElementById(ejId).innerText = "Ronda " + rondaActual + "/" + rondas;
                            let rp = pausaRonda;
                            document.getElementById(timerId).innerText = rp;
                            const _ivRp = setInterval(function() {
                                if (pausado) return;
                                rp--;
                                document.getElementById(timerId).innerText = rp;
                                if (rp <= 0) {
                                    clearInterval(_ivRp);
                                    siguiente(0, rondaActual + 1);
                                }
                            }, 1000);
                        } else {
                            siguiente(0, rondaActual + 1);
                        }
                        return;
                    }
                    const ej = rutina[ejIdx % rutina.length];
                    const nombre = Array.isArray(ej) ? ej[0] : (ej.nombre || ej);
                    document.getElementById(statusId).innerText = "TRABAJO";
                    document.getElementById(ejId).innerText = nombre;
                    document.getElementById(infoId).innerText = "Serie " + (ejIdx + 1) + "/" + cantidad + " — Ronda " + rondaActual + "/" + rondas;
                    let t = trabajo;
                    document.getElementById(timerId).innerText = t;
                    const _ivT = setInterval(function() {
                        if (pausado) return;
                        t--;
                        document.getElementById(timerId).innerText = t;
                        if (t <= 3 && t > 0) beep(400);
                        if (t <= 0) {
                            clearInterval(_ivT);
                            beep(800);
                            document.getElementById(statusId).innerText = "DESCANSO";
                            document.getElementById(ejId).innerText = "Respira...";
                            let p = pausa;
                            document.getElementById(timerId).innerText = p;
                            const _ivP = setInterval(function() {
                                if (pausado) return;
                                p--;
                                document.getElementById(timerId).innerText = p;
                                if (p <= 0) {
                                    clearInterval(_ivP);
                                    siguiente(ejIdx + 1, rondaActual);
                                }
                            }, 1000);
                        }
                    }, 1000);
                }
            }
            runTabata();
        }

        function togglePausaTabataMix(pausaId, btnId) {
            const pausaBtn = document.getElementById(pausaId);
            if (!pausaBtn) return;
            // Handled inline in iniciarTabataBloque
        }

        // ─── EMOM BLOQUE MIX ───
        function iniciarEmomBloque(btnId, statusId, roundId, clockId, totalMin) {
            const btn = document.getElementById(btnId);
            if (btn.dataset.running === "1") return;
            btn.dataset.running = "1";
            btn.disabled = true;
            btn.innerText = "En curso...";
            solicitarWakeLock();
            let minActual = 0;

            document.getElementById(statusId).innerText = "PREPARATE!";
            let _prepRemEB = 5;
            document.getElementById(clockId).innerText = _prepRemEB;
            const _ivEB = setInterval(function() {
                beep(600);
                _prepRemEB--;
                document.getElementById(clockId).innerText = _prepRemEB;
                if (_prepRemEB <= 0) {
                    clearInterval(_ivEB);
                    sig();
                }
            }, 1000);

            function sig() {
                if (minActual >= totalMin) {
                    document.getElementById(statusId).innerText = "EMOM COMPLETO!";
                    document.getElementById(roundId).innerText = "";
                    btn.dataset.running = "0";
                    btn.disabled = false;
                    btn.innerText = "Reiniciar";
                    liberarWakeLock();
                    return;
                }
                document.getElementById(statusId).innerText = "TRABAJA!";
                document.getElementById(roundId).innerText = "Minuto " + (minActual + 1) + " de " + totalMin;
                let rem = 60;
                document.getElementById(clockId).innerText = rem;
                const iv = setInterval(function() {
                    rem--;
                    document.getElementById(clockId).innerText = rem;
                    if (rem <= 3 && rem > 0) beep(400);
                    if (rem <= 0) {
                        clearInterval(iv);
                        beep(800);
                        minActual++;
                        sig();
                    }
                }, 1000);
            }
            sig();
        }

        // ─── MIX POR INDICE ───
        function iniciarTabataMixEnUI(i) {
            var bloque = bloquesMix[i];
            if (!bloque) return;
            var tc = {
                trabajo: bloque.trabajo || 20,
                pausa: bloque.pausa || 10,
                rondas: bloque.rondas || 1,
                cantidad: bloque.cantidad || 8,
                pausa_entre_rondas: bloque.pausa_entre_rondas || 0
            };
            var rutina = bloque.rutina || [];
            var uid = 'blq-' + (i + 1);
            activarTabataMixEnUI(tc, rutina, uid);
        }

        function activarTabataMixEnUI(tc, rutina, uid) {
            // Falls through to global timer UI
            dataGlobal = dataGlobal || {};
            dataGlobal.config = tc;
            dataGlobal.rutina = rutina;
            document.getElementById('sec-rutina-lista').style.display = "none";
            document.getElementById('sec-timer-ui').style.display = "block";
            const btnPausa = document.getElementById('btnPausaTimer');
            if (btnPausa) {
                btnPausa.style.display = "block";
                btnPausa.innerText = "⏸ PAUSAR";
            }
        }

        function iniciarEmomMix(i, btnId, statusId, roundId, clockId) {
            var bloque = bloquesMix[i];
            if (!bloque) return;
            var totalMin = bloque.minutos_totales || 10;
            iniciarEmomBloque(btnId, statusId, roundId, clockId, totalMin);
        }

        // ─── SALIR DEL TIMER ───
        function salirDelTimer() {
            clearInterval(tInterval);
            clearInterval(pausaRondaInterval);
            clearInterval(emomInterval);
            clearInterval(warmupTabInterval);
            clearInterval(warmupEmomInterval);
            timerActivo = false;
            timerPausado = false;
            emomRunning = false;
            warmupRunning = false;
            document.getElementById('overlay-pausa-ronda').classList.remove('visible');
            document.getElementById('overlay-pausa-ronda').style.display = 'none';
            document.getElementById('sec-timer-ui').style.display = 'none';
            var btnStart = document.getElementById('btnStartTimer');
            if (btnStart) {
                btnStart.style.display = 'block';
                btnStart.innerText = 'EMPEZAR';
            }
            var btnPausa = document.getElementById('btnPausaTimer');
            if (btnPausa) {
                btnPausa.style.display = 'none';
                btnPausa.innerText = '⏸ PAUSAR';
            }
            var secLista = document.getElementById('sec-rutina-lista');
            if (secLista) {
                secLista.style.display = 'block';
                secLista.scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
            }
            liberarWakeLock();
        }

        // ─── CERRAR RUTINA ───
        function cerrar() {
            var secLista = document.getElementById('sec-rutina-lista');
            if (secLista) secLista.style.display = 'block';
            var btnStart = document.getElementById('btnStartTimer');
            if (btnStart) {
                btnStart.style.display = 'block';
                btnStart.innerText = 'EMPEZAR';
            }
            var btnPausa = document.getElementById('btnPausaTimer');
            if (btnPausa) {
                btnPausa.style.display = 'none';
                btnPausa.innerText = '⏸ PAUSAR';
            }
            clearInterval(tInterval);
            clearInterval(dInterval);
            clearInterval(emomInterval);
            clearInterval(pausaRondaInterval);
            clearInterval(warmupTabInterval);
            clearInterval(warmupEmomInterval);
            Object.values(restIntervals).forEach(clearInterval);
            Object.values(bloqueTiempoIntervals).forEach(function(v) {
                if (typeof v === 'number') clearInterval(v);
            });
            document.getElementById('rutina-modal').classList.remove('visible');
            document.getElementById('overlay-descanso').classList.remove('visible');
            document.getElementById('overlay-descanso').style.display = 'none';
            document.getElementById('overlay-pausa-ronda').classList.remove('visible');
            document.getElementById('overlay-pausa-ronda').style.display = 'none';
            emomRunning = false;
            warmupRunning = false;
            timerPausado = false;
            timerActivo = false;
            restIntervals = {};
            bloqueTiempoIntervals = {};
            seriesRestantes = {};
            circVueltasRestantes = 0;
            liberarWakeLock();
        }
    </script>
