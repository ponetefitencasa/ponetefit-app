<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PONETE FIT | Full Training Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
         :root {
            --naranja: #FF6B35;
            --naranja-glow: rgba(255, 107, 53, 0.4);
            --azul: #4FC3F7;
            --azul-glow: rgba(79, 195, 247, 0.35);
            --verde: #69F0AE;
            --verde-glow: rgba(105, 240, 174, 0.4);
            --rojo: #EF5350;
            --rojo-glow: rgba(239, 83, 80, 0.4);
            --amarillo: #FFD54F;
            --amarillo-glow: rgba(255, 213, 79, 0.35);
            --purpura: #CE93D8;
            --purpura-glow: rgba(206, 147, 216, 0.35);
            --fondo: #0a0a0c;
            --fondo-alt: #0f0f13;
            --tarjeta: #141418;
            --tarjeta-alt: #1a1a20;
            --texto: #f0f0f5;
            --texto-suave: #8a8a9a;
            --borde: #2a2a35;
            --borde-sutil: #1e1e28;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            -webkit-overflow-scrolling: touch;
        }
        /* ─── HOME ─── */
        
        .home-screen {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: radial-gradient(ellipse at 50% 30%, #1a1a28 0%, var(--fondo) 70%);
        }
        
        .home-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .home-logo h1 {
            font-family: 'Roboto', sans-serif;
            font-weight: 900;
            font-size: clamp(3rem, 14vw, 5.5rem);
            color: var(--naranja);
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 0 0 40px var(--naranja-glow);
            line-height: 1;
        }
        
        .home-logo h2 {
            font-weight: 300;
            font-size: clamp(1rem, 5vw, 1.8rem);
            color: var(--texto-suave);
            margin: 8px 0 0;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        
        .search-box {
            background: var(--tarjeta);
            padding: 28px 24px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--borde);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
        }
        
        .input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }
        
        .input-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--texto-suave);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }
        
        input#codigoInput {
            width: 100%;
            padding: 18px 20px;
            border-radius: 14px;
            border: 1.5px solid var(--borde);
            background: var(--fondo-alt);
            color: var(--texto);
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            font-family: 'Roboto Mono', monospace;
        }
        
        input#codigoInput:focus {
            border-color: var(--naranja);
            box-shadow: 0 0 0 3px var(--naranja-glow);
        }
        
        input#codigoInput::placeholder {
            color: #3a3a50;
            font-weight: 400;
            letter-spacing: 1px;
            font-size: 1rem;
        }
        
        .btn-principal {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--naranja), #e85500);
            color: white;
            font-weight: 900;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
            box-shadow: 0 8px 24px var(--naranja-glow);
            min-height: 56px;
        }
        
        .btn-principal:active {
            transform: scale(0.97);
            box-shadow: 0 4px 12px var(--naranja-glow);
        }
        /* ─── MODAL ─── */
        
        #rutina-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--fondo);
            z-index: 100;
            overflow: hidden;
            flex-direction: column;
        }
        
        #rutina-modal.visible {
            display: flex;
        }
        
        .header-rutina {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: var(--tarjeta);
            border-bottom: 1px solid var(--borde);
            flex-shrink: 0;
            z-index: 1000;
        }
        
        .header-rutina-info {
            display: flex;
            flex-direction: column;
        }
        
        .tipo-tag {
            display: inline-block;
            background: var(--naranja);
            color: white;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        
        #id-display {
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Roboto Mono', monospace;
            color: var(--texto-suave);
            margin: 0;
        }
        
        .btn-header {
            background: var(--tarjeta-alt);
            color: var(--texto-suave);
            border: 1px solid var(--borde);
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            min-height: 44px;
            transition: background 0.15s, color 0.15s;
        }
        
        .btn-header:active {
            background: var(--borde);
            color: var(--texto);
        }
        
        .container-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 16px 100px;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }
        /* ─── CARDS ─── */
        
        .seccion-card {
            background: var(--tarjeta);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--borde);
        }
        
        .seccion-titulo {
            font-size: 0.75rem;
            font-weight: 900;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .card-ejercicio {
            background: var(--fondo-alt);
            margin-bottom: 10px;
            padding: 14px 16px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--borde-sutil);
            gap: 12px;
        }
        
        .card-ejercicio-nombre {
            font-size: 0.9rem;
            font-weight: 700;
            flex: 1;
            line-height: 1.3;
        }
        
        .card-ejercicio-meta {
            font-size: 0.75rem;
            color: var(--amarillo);
            font-weight: 700;
            white-space: nowrap;
        }
        /* Play button for video */
        
        .btn-play-video {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: white;
            text-decoration: none;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.15s;
        }
        
        .btn-play-video:active {
            background: rgba(255, 255, 255, 0.14);
            transform: scale(0.9);
        }
        
        .btn-play-video svg {
            width: 14px;
            height: 14px;
            fill: white;
            margin-left: 2px;
        }
        /* ─── TIMER UI ─── */
        
        #timer-box {
            background: var(--tarjeta);
            border-radius: 24px;
            padding: 32px 20px;
            text-align: center;
            border: 1px solid var(--borde);
            margin-top: 16px;
        }
        
        #t-status {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--texto-suave);
            margin-bottom: 4px;
        }
        
        #t-ejercicio-nombre {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--texto);
            min-height: 1.6rem;
            margin-bottom: 4px;
        }
        
        #t-ej-restantes {
            font-size: 0.75rem;
            color: var(--texto-suave);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        #clock {
            font-size: clamp(5rem, 22vw, 9rem);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            color: var(--verde);
            margin: 4px 0 12px;
            line-height: 1;
            text-shadow: 0 0 40px var(--verde-glow);
            transition: color 0.3s, text-shadow 0.3s;
        }
        
        #clock.descanso {
            color: var(--rojo);
            text-shadow: 0 0 40px var(--rojo-glow);
        }
        
        #clock.prep {
            color: var(--amarillo);
            text-shadow: 0 0 40px var(--amarillo-glow);
        }
        /* Progress bar */
        
        .timer-progress-bar {
            width: 100%;
            height: 4px;
            background: var(--borde);
            border-radius: 4px;
            margin: 8px 0 20px;
            overflow: hidden;
        }
        
        .timer-progress-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--verde);
            width: 100%;
            transition: width 1s linear, background 0.3s;
        }
        
        #next-ej-container {
            display: none;
            font-size: 0.75rem;
            color: var(--texto-suave);
            letter-spacing: 1px;
            margin-top: 4px;
            margin-bottom: 12px;
        }
        
        #next-ej-name {
            color: var(--amarillo);
            font-weight: 700;
        }
        /* ─── SERIE CARD ─── */
        
        .serie-card {
            background: var(--tarjeta);
            border-radius: 18px;
            margin-bottom: 14px;
            padding: 18px;
            border: 1px solid var(--borde);
        }
        
        .serie-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .serie-nombre {
            font-size: 1rem;
            font-weight: 700;
            flex: 1;
        }
        
        .serie-meta {
            display: flex;
            gap: 12px;
            background: var(--fondo-alt);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        
        .serie-meta-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .serie-meta-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--texto-suave);
            margin-bottom: 2px;
        }
        
        .serie-meta-value {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--texto);
        }
        
        .timer-display {
            font-size: 3rem;
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            color: var(--verde);
            display: none;
            margin: 8px 0;
            text-align: center;
            text-shadow: 0 0 30px var(--verde-glow);
        }
        /* ─── BOTONES ─── */
        
        .btn-rest {
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            min-height: 52px;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s;
        }
        
        .btn-rest:active {
            transform: scale(0.97);
            opacity: 0.85;
        }
        
        .btn-rest.active,
        .btn-rest:disabled {
            background: var(--tarjeta-alt);
            color: var(--texto-suave);
            cursor: not-allowed;
            transform: none;
        }
        /* ─── OVERLAYS ─── */
        
        #overlay-descanso,
        #overlay-pausa-ronda {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 12, 0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 3000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            animation: overlayIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        #overlay-descanso.visible,
        #overlay-pausa-ronda.visible {
            display: flex;
        }
        
        @keyframes overlayIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .overlay-titulo {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        .overlay-clock {
            font-size: clamp(6rem, 28vw, 12rem);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            line-height: 1;
            margin: 8px 0 24px;
        }
        /* ─── EMOM ─── */
        
        #emom-box {
            background: var(--tarjeta);
            border-radius: 24px;
            padding: 32px 20px;
            text-align: center;
            border: 1px solid var(--borde);
            margin-top: 16px;
        }
        
        #emom-status {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--texto-suave);
            margin-bottom: 4px;
        }
        
        #emom-ejercicio-nombre {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--texto);
            min-height: 1.6rem;
            margin-bottom: 4px;
        }
        
        #emom-minuto {
            font-size: 0.75rem;
            color: var(--texto-suave);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        #emom-clock {
            font-size: clamp(5rem, 22vw, 9rem);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            color: var(--verde);
            margin: 4px 0 12px;
            line-height: 1;
            text-shadow: 0 0 40px var(--verde-glow);
            transition: color 0.3s, text-shadow 0.3s;
        }
        
        #emom-clock.prep {
            color: var(--naranja);
            text-shadow: 0 0 40px var(--naranja-glow);
        }
        /* ─── MIX BLOQUES ─── */
        
        .mix-seccion {
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid var(--borde);
            background: var(--tarjeta-alt);
        }
        
        .mix-seccion-titulo {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 14px;
        }
        
        .bloque-mix {
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid var(--borde);
            background: var(--tarjeta-alt);
        }
        
        .bloque-mix-titulo {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 14px;
        }
        /* ─── TOAST ─── */
        
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--verde);
            color: #000;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 1px;
            z-index: 4000;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
        }
        
        #toast.show {
            transform: translateX(-50%) translateY(0);
        }
        /* ─── WARMUP TIMER ─── */
        
        #warmup-timer-box {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: var(--fondo-alt);
            border-radius: 16px;
            border: 1px solid var(--borde-sutil);
        }
        
        #warmup-status {
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--azul);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        #warmup-ej {
            font-size: 0.9rem;
            color: var(--naranja);
            min-height: 1.2rem;
            margin-bottom: 6px;
            font-weight: 700;
        }
        
        #warmup-clock {
            font-size: clamp(3rem, 16vw, 6rem);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            color: var(--texto);
            line-height: 1;
            margin: 6px 0 16px;
        }
        /* ─── PAUSA BUTTON ─── */
        
        .btn-pausa {
            background: var(--tarjeta-alt);
            color: var(--purpura);
            border: 1px solid var(--purpura);
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            width: 100%;
            min-height: 48px;
            transition: background 0.15s;
        }
        
        .btn-pausa:active {
            background: rgba(206, 147, 216, 0.12);
        }
        
        .btn-pausa:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        /* ─── VUELTAS COUNTER ─── */
        
        #warmup-vueltas-counter {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--amarillo);
            margin: 10px 0;
        }
        /* ─── CIRCUITO CARD ─── */
        
        .circ-bloque-header {
            background: linear-gradient(135deg, #1a2a4a, #0d1a33);
            padding: 12px 16px;
            border-radius: 12px;
            margin: 14px 0 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .circ-bloque-label {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--azul);
        }
        /* ─── NUMERO CARD (Tabata) ─── */
        
        .card-numero {
            background: var(--fondo-alt);
            margin-bottom: 8px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--borde-sutil);
        }
        
        .card-numero-header {
            background: rgba(255, 107, 53, 0.1);
            padding: 5px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-numero-idx {
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--naranja);
        }
        
        .card-numero-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            gap: 10px;
        }
        
        .card-numero-nombre {
            font-size: 0.9rem;
            font-weight: 700;
            flex: 1;
            line-height: 1.3;
        }
        /* ─── INFO BLOCKS ─── */
        
        .info-block {
            background: var(--fondo-alt);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 14px;
            border: 1px solid var(--borde-sutil);
        }
        
        .info-block-titulo {
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .info-block-subtitulo {
            font-size: 0.8rem;
            color: var(--texto-suave);
        }
        
        .bloque-descripcion {
            background: var(--fondo-alt);
            border-left: 3px solid var(--verde);
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 14px;
            font-size: 0.85rem;
            color: var(--texto-suave);
            font-style: italic;
            line-height: 1.5;
        }
        
        .nota-tecnica {
            font-size: 0.78rem;
            color: var(--texto-suave);
            font-style: italic;
            background: var(--fondo-alt);
            border-left: 3px solid var(--naranja);
            border-radius: 6px;
            padding: 6px 10px;
            margin-top: 8px;
        }
        /* ─── SCROLL CONTAINER ─── */
        
        .container-scroll::-webkit-scrollbar {
            width: 0;
        }
        /* Wake Lock indicator */
        
        #wakelock-indicator {
            position: fixed;
            top: 12px;
            right: 12px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--verde);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 9999;
        }
        
        #wakelock-indicator.active {
            opacity: 1;
            box-shadow: 0 0 8px var(--verde-glow);
        }
        /* ─── EMOM BLOQUE INLINE ─── */
        
        .emom-inline-box {
            background: var(--fondo);
            border-radius: 14px;
            padding: 16px;
            margin-top: 14px;
            text-align: center;
            border: 1px solid var(--borde-sutil);
        }
        
        .emom-inline-clock {
            font-size: clamp(3.5rem, 18vw, 7rem);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            color: white;
            line-height: 1;
            margin: 6px 0;
        }
    </style>
</head>

<body>
    <!-- Wake Lock indicator dot -->

    <script>
        // ====================================================================
        // BACKGROUND TIMER — Web Worker + Visibility Catch-up
        // ====================================================================
        var _bgWorker = null;
        var _bgListeners = {};
        var _bgTimerId = 1000000;

        (function _initBgWorker() {
            try {
                var code = 'var ts={};self.onmessage=function(e){var d=e.data;if(d.cmd==="start"){ts[d.id]=setInterval(function(){postMessage(d.id)},d.ms)}else if(d.cmd==="stop"){if(ts[d.id]){clearInterval(ts[d.id]);delete ts[d.id]}}else if(d.cmd==="stopAll"){for(var k in ts)clearInterval(ts[k]);ts={}}};';
                var blob = new Blob([code], {
                    type: 'application/javascript'
                });
                _bgWorker = new Worker(URL.createObjectURL(blob));
                _bgWorker.onmessage = function(e) {
                    var id = e.data;
                    if (_bgListeners[id]) _bgListeners[id]();
                };
            } catch (e) {
                _bgWorker = null;
            }
        })();

        function bgSetInterval(fn, ms) {
            if (_bgWorker) {
                var id = ++_bgTimerId;
                _bgListeners[id] = fn;
                _bgWorker.postMessage({
                    cmd: 'start',
                    id: id,
                    ms: ms
                });
                return id;
            }
            return setInterval(fn, ms);
        }

        function bgClearInterval(id) {
            if (typeof id === 'number' && id > 1000000 && _bgListeners[id]) {
                if (_bgWorker) _bgWorker.postMessage({
                    cmd: 'stop',
                    id: id
                });
                delete _bgListeners[id];
            } else {
                clearInterval(id);
            }
        }

        // ─── Visibility catch-up (for phone sleep / background) ───
        var _bgHiddenAt = 0;
        var _bgFastForward = null; // function(missedSeconds) set by active timer

        // Modo silencioso durante fast-forward: suprime beeps y coach
        var _bgFFMode = false;

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') {
                _bgHiddenAt = Date.now();
            } else if (document.visibilityState === 'visible') {
                if (_bgHiddenAt > 0) {
                    var elapsedSec = Math.floor((Date.now() - _bgHiddenAt) / 1000);
                    _bgHiddenAt = 0;
                    if (elapsedSec > 1 && _bgFastForward) {
                        _bgFastForward(elapsedSec);
                    }
                }
            }
        });

        // ─── Audio keepalive (iOS: mantiene el tab activo en segundo plano) ───
        // Toca un buffer de audio silencioso cada 25 segundos cuando hay un timer activo
        var _audioKeepaliveIv = null;

        function _iniciarAudioKeepalive() {
            if (_audioKeepaliveIv) return;
            _audioKeepaliveIv = setInterval(function() {
                if (!timerActivo && !emomRunning && !warmupRunning) return;
                try {
                    var ctx = getAudio();
                    if (ctx.state === 'suspended') ctx.resume();
                    var buf = ctx.createBuffer(1, 1, 22050);
                    var src = ctx.createBufferSource();
                    src.buffer = buf;
                    src.connect(ctx.destination);
                    src.start(0);
                } catch (e) {}
            }, 25000);
        }

        function _detenerAudioKeepalive() {
            if (_audioKeepaliveIv) {
                clearInterval(_audioKeepaliveIv);
                _audioKeepaliveIv = null;
            }
        }

        // ====================================================================
        // COACH DE VOZ ADAPTATIVO — Ponete Fit (Voz Masculina, Acento Argentino)
        // ====================================================================

        // ─── INTERRUPTOR GLOBAL ─────────────────────────────────────────
        var vozActivada = true;

        // ─── SISTEMA DE COLAS ───────────────────────────────────────────
        var _colaVoz = [];
        var _hablando = false;

        // ─── CACHE DE VOZ MASCULINA ────────────────────────────────────
        var _vozMasculinaCache = null;
        var _vozMasculinaCacheResuelta = false;
        var _vozEsMasculinaPorNombre = false;

        // Nombres femeninos conocidos para excluir
        var _femNames = [
            'female', 'femenin', 'mujer', 'paulina', 'monica', 'mónica',
            'elena', 'maria', 'maría', 'laura', 'carmen', 'conchita',
            'lucia', 'lucía', 'miren', 'ines', 'inés', 'silvia', 'ana',
            'rosa', 'sabina', 'elvira', 'catalina', 'francisca',
            'penelope', 'penélope', 'nora', 'helena', 'zira', 'cortana',
            'grandma', 'siri', 'linda', 'joana', 'paola'
        ];

        // Nombres masculinos conocidos y keywords para identificar voces masculinas
        var _maleNames = [
            'male', 'hombre', 'masculin',
            'diego', 'carlos', 'jorge', 'andrés', 'andres',
            'pablo', 'juan', 'enrique', 'pedro', 'miguel',
            'sergio', 'javier', 'raúl', 'raul', 'fernando',
            'ricardo', 'alejandro', 'daniel', 'gabriel',
            'héctor', 'hector', 'marco', 'gonzalo', 'álvaro', 'alvaro',
            'microsoft pablo', 'microsoft jorge', 'microsoft diego',
            'microsoft carlos', 'microsoft raúl', 'microsoft raul',
            'microsoft sergio', 'microsoft enrique',
            'google español'
        ];

        function _esFemenina(n) {
            for (var fi = 0; fi < _femNames.length; fi++) {
                if (n.indexOf(_femNames[fi]) !== -1) return true;
            }
            return false;
        }

        function _esMasculina(n) {
            for (var mi = 0; mi < _maleNames.length; mi++) {
                if (n.indexOf(_maleNames[mi]) !== -1) return true;
            }
            return false;
        }

        // ─── RESOLVER VOZ MASCULINA (con cache) ────────────────────────
        function _resolverVozMasculina() {
            var voces = window.speechSynthesis.getVoices();
            if (!voces || voces.length === 0) return;

            // Categorías de voces (priorizando masculinas)
            var vozARMasc = null;      // es-AR explícitamente masculina
            var vozARNoFem = null;     // es-AR no femenina
            var vozAR = null;          // cualquier es-AR
            var vozLatamMasc = null;   // es-MX/es-US/es-CO/etc masculina
            var vozLatamNoFem = null;  // es-MX/etc no femenina
            var vozESMasc = null;      // es-ES masculina
            var vozESNoFem = null;     // es-ES no femenina
            var vozGoogleEs = null;    // Google español no femenina
            var vozGenMasc = null;     // cualquier es-* masculina
            var vozGenNoFem = null;    // cualquier es-* no femenina

            for (var i = 0; i < voces.length; i++) {
                var vLang = voces[i].lang || '';
                var vName = (voces[i].name || '').toLowerCase();
                var fem = _esFemenina(vName);
                var masc = _esMasculina(vName);

                // es-AR (Argentina)
                if (vLang === 'es-AR') {
                    if (masc && !vozARMasc) vozARMasc = voces[i];
                    if (!fem && !vozARNoFem) vozARNoFem = voces[i];
                    if (!vozAR) vozAR = voces[i];
                }
                // Español latino (MX, US, CO, CL, PE, 419)
                if (vLang === 'es-MX' || vLang === 'es-US' || vLang === 'es-CO' ||
                    vLang === 'es-CL' || vLang === 'es-PE' || vLang === 'es-419') {
                    if (masc && !vozLatamMasc) vozLatamMasc = voces[i];
                    if (!fem && !vozLatamNoFem) vozLatamNoFem = voces[i];
                }
                // es-ES (España)
                if (vLang === 'es-ES') {
                    if (masc && !vozESMasc) vozESMasc = voces[i];
                    if (!fem && !vozESNoFem) vozESNoFem = voces[i];
                }
                // Google español
                if (vName.indexOf('google') !== -1 && vLang.indexOf('es') === 0) {
                    if (!fem && !vozGoogleEs) vozGoogleEs = voces[i];
                }
                // Cualquier es-*
                if (vLang.indexOf('es') === 0) {
                    if (masc && !vozGenMasc) vozGenMasc = voces[i];
                    if (!fem && !vozGenNoFem) vozGenNoFem = voces[i];
                }
            }

            // Prioridad: masculina AR > no-fem AR > masculina Latam > masculina ES >
            //            masculina genérica > no-fem Latam > no-fem ES > Google español >
            //            no-fem genérica > cualquier AR
            var vozSeleccionada = vozARMasc || vozARNoFem || vozLatamMasc || vozESMasc ||
                vozGenMasc || vozLatamNoFem || vozESNoFem || vozGoogleEs ||
                vozGenNoFem || vozAR || null;

            _vozMasculinaCache = vozSeleccionada;
            _vozEsMasculinaPorNombre = !!(vozARMasc || vozLatamMasc || vozESMasc || vozGenMasc);
            _vozMasculinaCacheResuelta = true;
        }

        function hablarCoach(mensaje) {
            if (!vozActivada) return;
            if (_bgFFMode) return; // silencio durante fast-forward
            if (!('speechSynthesis' in window)) return;
            _colaVoz.push(mensaje);
            _procesarCola();
        }

        function _procesarCola() {
            if (_hablando || _colaVoz.length === 0) return;
            _hablando = true;
            var texto = _colaVoz.shift();
            var utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'es-AR';
            utterance.rate = 0.92;
            utterance.volume = 1.0;

            // Re-resolver voz si no se ha cacheado o si las voces cambiaron
            if (!_vozMasculinaCacheResuelta) {
                _resolverVozMasculina();
            }

            utterance.voice = _vozMasculinaCache;

            // Masculinización forzada del pitch (rango 0.7 – 0.8):
            // - Voz masculina confirmada por nombre → pitch 0.8 (refuerza gravedad natural)
            // - Sin voz masculina nativa → pitch 0.7 (masculiniza voz femenina/neutra)
            if (_vozEsMasculinaPorNombre) {
                utterance.pitch = 0.8;
            } else {
                utterance.pitch = 0.7;
            }

            utterance.onend = function() {
                _hablando = false;
                _procesarCola();
            };
            utterance.onerror = function() {
                _hablando = false;
                _procesarCola();
            };
            window.speechSynthesis.speak(utterance);
        }

        // Pre-cargar voces y resolver voz masculina al inicio
        if ('speechSynthesis' in window) {
            window.speechSynthesis.getVoices();
            _resolverVozMasculina();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = function() {
                    window.speechSynthesis.getVoices();
                    _vozMasculinaCacheResuelta = false;
                    _resolverVozMasculina();
                };
            }
        }

        function detenerCoach() {
            _colaVoz = [];
            _hablando = false;
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        }

        // ─── FRASES MOTIVACIONALES ARGENTINAS ───────────────────────────
        var _frasesMotivacionales = [
            'Vamos, no aflojes!',
            'Dale que vos podés!',
            'Mantené el ritmo!',
            'Seguí así!',
            'No pares, falta poco!',

            '¡Metele que ya estamos!',
            '¡Ya lo tenés!',
            '¡Es mental, dale!',
            'Sos una bestia, seguí!'
        ];

        var _frasesMinuto = [
            '¡Seguí así!',
            '¡No aflojes!',
            '¡dale con todo!',
            '¡Dale pura sangre!',
            '¡Queda menos!',
            '¡vamos que se puede!',
            '¡mantené el ritmo!',
            '¡Metele que no pesa!',
            '¡Estás imparable!',
            'eso, bien ahí!'
        ];

        function _fraseRandom(arr) {
            var combinadas = arr.slice();
            if (nombreUsuario) {
                var frasesPersonalizadas = [
                    '¡Dale ' + nombreUsuario + ', no pares!',
                    '¡Vamos ' + nombreUsuario + ', vos podés!',
                    '¡Vamos ' + nombreUsuario + ', sos un pura sangre!',
                    '¡Metele ' + nombreUsuario + ', que no te frena nadie!',
                    '¡Eso ' + nombreUsuario + ', bien ahí!',
                    '¡Seguí así ' + nombreUsuario + ', sos una máquina!',
                    '¡Dale ' + nombreUsuario + ', con todo!',
                    '¡Vamos ' + nombreUsuario + ', no aflojes!',
                    '¡' + nombreUsuario + ', sos una bestia!',
                    '¡' + nombreUsuario + ', dale que ya lo tenés!',
                    '¡Arriba ' + nombreUsuario + ', metele garra!'
                ];
                combinadas = combinadas.concat(frasesPersonalizadas);
            }
            return combinadas[Math.floor(Math.random() * combinadas.length)];

        function _activarVideoFallback() {

        async function solicitarWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('wakelock-indicator').classList.add('active');
                    wakeLock.addEventListener('release', () => {
                        document.getElementById('wakelock-indicator').classList.remove('active');
                    });
                    return;
                } catch (err) {
                    // Caer al fallback si falla la API nativa
                }
            }
            // Fallback para Safari iOS y navegadores sin Wake Lock API
            _activarVideoFallback();
            document.getElementById('wakelock-indicator').classList.add('active');
        }

        async function liberarWakeLock() {
            if (wakeLock) {
                try {
                    await wakeLock.release();
                } catch (e) {}
                wakeLock = null;
            }
            _desactivarVideoFallback();
            document.getElementById('wakelock-indicator').classList.remove('active');
        }

        // AudioContext
        let audio = null;

        function getAudio() {
            if (!audio) audio = new(window.AudioContext || window.webkitAudioContext)();
            return audio;
        }

        function beep(f) {
            if (_bgFFMode) return; // silencio durante fast-forward
            try {
                const ctx = getAudio();
                const o = ctx.createOscillator(),
                    g = ctx.createGain();
                o.connect(g);
                g.connect(ctx.destination);
                o.frequency.value = f;
                o.type = 'square';
                g.gain.setValueAtTime(0.45, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);
                o.start();
                o.stop(ctx.currentTime + 0.4);
            } catch (e) {}
        }

        // ─── COUNTDOWN HELPER (compartido por todos los timers de preparacion) ───
        function prepCountdown(clockEl, statusEl, beepFreq, callback, opts) {
            opts = opts || {};
            var count = opts.startFrom || 5;
            var showArrancamos = opts.showArrancamos !== false;
            var extraBeepAt3 = opts.extraBeepAt3 || false;
            if (statusEl) statusEl.innerText = "PREPARATE!";
            clockEl.innerText = count < 10 && opts.padZero ? "0" + count : count;
            var iv = bgSetInterval(function() {
                beep(beepFreq);
                count--;
                clockEl.innerText = count < 10 && opts.padZero ? "0" + count : count;
                if (extraBeepAt3 && count <= 3 && count > 0) beep(400);
                if (count <= 0) {
                    bgClearInterval(iv);
                    if (extraBeepAt3) beep(800);
                    if (showArrancamos && statusEl) statusEl.innerText = "¡ARRANCAMOS!";
                    clockEl.innerText = "";
                    setTimeout(callback, 1000);
                }
            }, 1000);
            return iv;
        }

        // ─── DESBLOQUEO DE AUDIO PARA iOS ───
        // Safari bloquea el AudioContext y la síntesis de voz hasta que hay
        // una interacción real del usuario. Se desbloquean aquí en el primer toque.
        var _audioDesbloqueado = false;

        function _desbloquearAudioIOS() {
            if (_audioDesbloqueado) return;
            _audioDesbloqueado = true;
            // Desbloquear AudioContext
            try {
                var ctx = getAudio();
                if (ctx.state === 'suspended') {
                    ctx.resume().catch(function() {});
                }
                // Reproducir un buffer vacío para desbloquear el contexto en iOS
                var buf = ctx.createBuffer(1, 1, 22050);
                var src = ctx.createBufferSource();
                src.buffer = buf;
                src.connect(ctx.destination);
                src.start(0);
            } catch (e) {}
            // Desbloquear síntesis de voz en iOS: pronunciar un utterance vacío
            if ('speechSynthesis' in window) {
                var u = new SpeechSynthesisUtterance('');
                u.volume = 0;
                window.speechSynthesis.speak(u);
            }
        }

            var m = Math.floor(seg / 60);

            return m + ':' + (s < 10 ? '0' + s : s);

        // ─── TIMERS CALENTAMIENTO ───
        function iniciarWarmupTimer() {
            const tipo = (dataGlobal && dataGlobal.warmup_tipo) ? dataGlobal.warmup_tipo : "";
            const det = (dataGlobal && dataGlobal.warmup_config_detalle) ? dataGlobal.warmup_config_detalle : {};
            const ejsW = (dataGlobal && dataGlobal.warmup_ejercicios) ? dataGlobal.warmup_ejercicios : [];

            if (tipo === "Tabata" || tipo === "EMOM" || tipo === "Circuito por Tiempo") {
                if (warmupRunning) return;
                warmupRunning = true;
                solicitarWakeLock();
                const btn = document.getElementById('warmup-btn');
                if (btn) {
                    btn.disabled = true;
                    btn.innerText = "En curso...";
                }
                document.getElementById('warmup-ej').innerText = "";
                var clockEl = document.getElementById('warmup-clock');
                var statusEl = document.getElementById('warmup-status');
                // >>> COACH: Arranca el circuito al activar bloque calentamiento (solo Circuito por Tiempo)
                if (tipo === 'Circuito por Tiempo') hablarCoach('Arranca el circuito, vamos con todo!');

                var afterCountdown;
                if (tipo === "Tabata") {
                    afterCountdown = function() {
                        warmupRunning = false;
                        if (btn) btn.disabled = false;
                        iniciarTabataWarmup(ejsW, det);
                    };
                } else if (tipo === "EMOM") {
                    afterCountdown = function() {
                        warmupRunning = false;
                        if (btn) btn.disabled = false;
                        iniciarEmomWarmup(det);
                    };
                } else {
                    afterCountdown = function() {
                        warmupRunning = false;
                        if (btn) btn.disabled = false;
                        var durSeg = (det.duracion_bloque || 3) * 60;
                        statusEl.innerText = "EN CURSO...";
                        iniciarBloqueTiempo('warmup-clock', 'warmup-btn', durSeg);
                    };
                }
                prepCountdown(clockEl, statusEl, 440, afterCountdown);
            }
        }

        let warmupTabInterval = null;

        function iniciarTabataWarmup(ejsW, det) {
            if (warmupRunning) return;
            warmupRunning = true;
            solicitarWakeLock();
            document.getElementById('warmup-btn').disabled = true;
            document.getElementById('warmup-btn').innerText = "En curso...";
            const trabajo = det.trabajo || 20;
            const pausa = det.pausa || 10;
            const totalEjs = ejsW.length;
            let ejIdx = 0;

            var clockEl = document.getElementById('warmup-clock');
            var statusEl = document.getElementById('warmup-status');

            warmupTabInterval = prepCountdown(clockEl, statusEl, 600, function() {
                siguiente();
            });

            function siguiente() {
                if (ejIdx >= totalEjs) {
                    document.getElementById('warmup-status').innerText = "CALENTAMIENTO LISTO!";
                    document.getElementById('warmup-ej').innerText = "";
                    document.getElementById('warmup-clock').innerText = "OK";
                    warmupRunning = false;
                    liberarWakeLock();
                    return;
                }
                const ej = ejsW[ejIdx];
                const nombre = Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio || "");
                document.getElementById('warmup-status').innerText = "TRABAJO — Ej " + (ejIdx + 1) + "/" + totalEjs;
                document.getElementById('warmup-ej').innerText = nombre;
                // >>> COACH: Arrancamos con ejercicio + vamos dale (warmup)
                hablarCoach('Arrancamos con ' + nombre + '. Vamos, dale!');
                let rem = trabajo;
                var _wkWorkDeadline = Date.now() + trabajo * 1000;
                document.getElementById('warmup-clock').innerText = rem < 10 ? "0" + rem : rem;
                warmupTabInterval = bgSetInterval(function() {
                    rem = Math.max(0, Math.round((_wkWorkDeadline - Date.now()) / 1000));
                    document.getElementById('warmup-clock').innerText = rem < 10 ? "0" + rem : rem;
                    if (rem === Math.floor(trabajo / 2) && rem > 3) coachMotivacional();
                    if (rem <= 3 && rem > 0) beep(400);
                    if (rem <= 0) {
                        bgClearInterval(warmupTabInterval);
                        beep(800);
                        document.getElementById('warmup-status').innerText = "DESCANSO";
                        var _esUltimaWarmup = (ejIdx + 1 >= totalEjs);
                        if (_esUltimaWarmup) {
                            hablarCoach('Es la última, no aflojes!');
                        } else {
                            hablarCoach('Pausa.');
                        }
                        const nextIdx = ejIdx + 1;
                        var nextNombre = '';
                        if (nextIdx < totalEjs) {
                            const nextEj = ejsW[nextIdx];
                            nextNombre = Array.isArray(nextEj) ? nextEj[0] : (nextEj.nombre || "");
                            document.getElementById('warmup-ej').innerText = "PROXIMO: " + nextNombre;
                            hablarCoach('El próximo ejercicio es ' + nextNombre + '.');
                        } else {
                            document.getElementById('warmup-ej').innerText = "ULTIMO — CASI LISTO!";
                        }
                        let d = pausa;
                        var _wkPausaDeadline = Date.now() + pausa * 1000;
                        document.getElementById('warmup-clock').innerText = d < 10 ? "0" + d : d;
                        warmupTabInterval = bgSetInterval(function() {
                            d = Math.max(0, Math.round((_wkPausaDeadline - Date.now()) / 1000));
                            document.getElementById('warmup-clock').innerText = d < 10 ? "0" + d : d;
                            if (d <= 0) {
                                bgClearInterval(warmupTabInterval);
                                beep(800);
                                ejIdx++;
                                siguiente();
                            }
                        }, 1000);
                    }
                }, 1000);
            }
        }

        let warmupEmomInterval = null;

        var warmupEmomPausado = false;

        function togglePausaEmomWarmup(pausaBtn) {
            warmupEmomPausado = !warmupEmomPausado;
            if (pausaBtn) pausaBtn.innerText = warmupEmomPausado ? '▶ REANUDAR' : '⏸ PAUSAR';
            if (warmupEmomPausado) {
                liberarWakeLock();
                // >>> COACH: Pausa EMOM warmup
                coachPausa();
            } else {
                solicitarWakeLock();
            }
        }

        function iniciarEmomWarmup(det) {
            if (warmupRunning) return;
            warmupRunning = true;
            warmupEmomPausado = false;
            solicitarWakeLock();
            document.getElementById('warmup-btn').disabled = true;
            document.getElementById('warmup-btn').innerText = "En curso...";
            const mins = det.minutos || 5;
            const ejsW = (dataGlobal && dataGlobal.warmup_ejercicios) ? dataGlobal.warmup_ejercicios : [];
            const ejsPorMin = ejsW.length > 0 ? Math.ceil(ejsW.length / mins) : 1;
            let minActual = 0;

            // Mostrar boton pausa EMOM warmup
            var pausaBtnEW = document.getElementById('warmup-emom-pausa');
            if (pausaBtnEW) pausaBtnEW.style.display = 'block';

            var clockEl = document.getElementById('warmup-clock');
            var statusEl = document.getElementById('warmup-status');

            // Color naranja durante preparación (como en EMOM entrenamiento)
            clockEl.style.color = "var(--naranja)";
            clockEl.style.textShadow = "0 0 40px var(--naranja-glow)";
            var _weFillPrep = document.getElementById('warmup-emom-progress-fill');
            if (_weFillPrep) _weFillPrep.style.background = "var(--amarillo)";

            warmupEmomInterval = prepCountdown(clockEl, statusEl, 600, function() {
                // Cambiar a verde para trabajo
                clockEl.style.color = "var(--verde)";
                clockEl.style.textShadow = "0 0 40px var(--verde-glow)";
                if (_weFillPrep) _weFillPrep.style.background = "var(--verde)";
                sig();
            });

            function sig() {
                if (minActual >= mins) {
                    document.getElementById('warmup-status').innerText = "CALENTAMIENTO LISTO!";
                    document.getElementById('warmup-ej').innerText = "";
                    document.getElementById('warmup-clock').innerText = "OK";
                    warmupRunning = false;
                    warmupEmomPausado = false;
                    if (pausaBtnEW) pausaBtnEW.style.display = 'none';
                    liberarWakeLock();
                    return;
                }
                document.getElementById('warmup-status').innerText = "MINUTO " + (minActual + 1) + "/" + mins;
                var _wEmomNombresMin = _obtenerNombresEmomWarmup(minActual, ejsW, ejsPorMin);
                if (ejsW.length > 0) {
                    const startIdx = minActual * ejsPorMin;
                    const endIdx = Math.min(startIdx + ejsPorMin, ejsW.length);
                    const ejsMinuto = [];
                    for (var ei = startIdx; ei < endIdx; ei++) {
                        const ej = ejsW[ei];
                        ejsMinuto.push(Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio || ""));
                    }
                    document.getElementById('warmup-ej').innerText = ejsMinuto.length > 0 ? ejsMinuto.join(" | ") : (Array.isArray(ejsW[ejsW.length - 1]) ? ejsW[ejsW.length - 1][0] : (ejsW[ejsW.length - 1].nombre || ""));
                }
                // >>> COACH: Anunciar ejercicios del minuto
                var _wEmomEsUltimo = (minActual + 1 >= mins);
                if (_wEmomNombresMin) {
                    hablarCoach('Arrancamos con ' + _wEmomNombresMin + '. ' + _fraseRandom(_frasesMotivacionales));
                    if (_wEmomEsUltimo) hablarCoach('Es el último ejercicio.');
                } else {
                    hablarCoach('Arrancamos. ' + _fraseRandom(_frasesMotivacionales));
                    if (_wEmomEsUltimo) hablarCoach('Es el último ejercicio.');
                }
                let rem = 60;
                document.getElementById('warmup-clock').innerText = rem < 10 ? "0" + rem : rem;
                var _weFillWork = document.getElementById('warmup-emom-progress-fill');
                if (_weFillWork) {
                    _weFillWork.style.width = '100%';
                    _weFillWork.style.transition = 'width 1s linear';
                }
                var _weDeadline = Date.now() + 60000;
                warmupEmomInterval = bgSetInterval(function() {
                    if (warmupEmomPausado) return;
                    rem = Math.max(0, Math.round((_weDeadline - Date.now()) / 1000));
                    document.getElementById('warmup-clock').innerText = rem < 10 ? "0" + rem : rem;
                    if (_weFillWork) {
                        _weFillWork.style.width = ((rem / 60) * 100) + '%';
                        _weFillWork.style.transition = 'none';
                    }
                    // >>> COACH: 15 segundos antes de cambiar de minuto (EMOM warmup)
                    if (rem === 15) {
                        var _wProxMin = minActual + 1;
                        var _wProxNombre = '';
                        if (_wProxMin < mins && ejsW.length > 0) {
                            var _wProxStartIdx = _wProxMin * ejsPorMin;
                            if (_wProxStartIdx < ejsW.length) {
                                var _wProxEj = ejsW[_wProxStartIdx];
                                _wProxNombre = Array.isArray(_wProxEj) ? _wProxEj[0] : (_wProxEj.nombre || '');
                            }
                        }
                        coachConteoEmom(_wProxNombre);
                    }
                    // >>> COACH: Countdown sincronizado al final de cada minuto (EMOM warmup)
                    if (rem <= 3 && rem > 0) beep(400);
                    if (rem <= 0) {
                        bgClearInterval(warmupEmomInterval);
                        beep(800);
                        minActual++;
                        sig();
                    }
                }, 1000);
            }
        }

        // Helper para obtener nombres de ejercicios del minuto en EMOM warmup
        function _obtenerNombresEmomWarmup(minIdx, ejsW, ejsPorMin) {
            if (!ejsW || ejsW.length === 0) return '';
            var startIdx = minIdx * ejsPorMin;
            var endIdx = Math.min(startIdx + ejsPorMin, ejsW.length);
            var nombres = [];
            for (var i = startIdx; i < endIdx; i++) {
                var ej = ejsW[i];
                var n = Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio || '');
                if (n) nombres.push(n);
            }
            return nombres.join(' y ');
        }

        const warmupSeriesRestantes = {};
        const warmupSeriesIntervals = {};

        function marcarSerieWarmup(idx, pausaSeg, totalSeries) {
            const btn = document.getElementById("warmup-serie-btn-" + idx);
            if (!btn || btn.disabled) return;
            btn.disabled = true;
            btn.innerText = "Descansando...";
            solicitarWakeLock();

            document.getElementById('warmup-status').innerText = "DESCANSO — Serie " + (idx + 1) + "/" + totalSeries;
            const clock = document.getElementById('warmup-clock');
            clock.style.display = "block";
            let rem = pausaSeg;
            var _wssDeadline = Date.now() + pausaSeg * 1000;
            clock.innerText = formatearTiempo(rem);
            document.getElementById('warmup-ej').innerText = "Recuperate antes de la siguiente serie";

            // >>> COACH: Anunciar pausa warmup series
            var _wSeriesQuedan = totalSeries - (idx + 1);
            if (_wSeriesQuedan > 0) {
                hablarCoach('Pausa, aprovechá para tomar agua. Te quedan ' + _wSeriesQuedan + ' series.');
            } else {
                hablarCoach('Última serie completada. Bien ahí!');
            }

            warmupSeriesIntervals[idx] = bgSetInterval(function() {
                rem = Math.max(0, Math.round((_wssDeadline - Date.now()) / 1000));
                clock.innerText = formatearTiempo(rem);
                if (rem <= 3 && rem > 0) beep(400);
                if (rem <= 0) {
                    bgClearInterval(warmupSeriesIntervals[idx]);
                    beep(800);
                    btn.innerText = "Serie " + (idx + 1) + " completada";
                    btn.style.background = "linear-gradient(135deg,var(--verde),#00c853)";
                    btn.style.color = "#000";
                    clock.innerText = "--";
                    document.getElementById('warmup-ej').innerText = "";
                    const nextIdx = idx + 1;
                    if (nextIdx < totalSeries) {
                        document.getElementById('warmup-status').innerText = "LISTA PARA SERIE " + (nextIdx + 1) + "/" + totalSeries;
                    } else {
                        document.getElementById('warmup-status').innerText = "CALENTAMIENTO LISTO!";
                        liberarWakeLock();
                    }
                }
            }, 1000);
        }

        // ─── RENDER PRINCIPAL ───
        function render(data) {
            renderWarmup(data);
            document.getElementById('sec-emom-ui').style.display = "none";
            document.getElementById('sec-timer-ui').style.display = "none";
            const pLista = document.getElementById('principal-lista');
            const pTitulo = document.getElementById('principal-titulo');
            pLista.innerHTML = '';
            const ejerciciosPrincipales = data.rutina || data.datos || [];
            if (data.tipo === "Series") renderSeries(data, pTitulo, pLista, ejerciciosPrincipales);
            else if (data.tipo === "Circuito") renderCircuito(data, pTitulo, pLista, ejerciciosPrincipales);
            else if (data.tipo === "Tabata") renderTabata(data, pTitulo, pLista, ejerciciosPrincipales);
            else if (data.tipo === "Circuito por Tiempo") renderCircuitoTiempo(data, pTitulo, pLista, ejerciciosPrincipales);
            else if (data.tipo === "EMOM") renderEmom(data, pTitulo, pLista);
            else if (data.tipo === "ENTRENAMIENTO") renderMix(data, pTitulo, pLista);
            else {
                pTitulo.innerText = "ENTRENAMIENTO";
                ejerciciosPrincipales.forEach(function(ej) {
                    const n = Array.isArray(ej) ? ej[0] : (ej.nombre || "");
                    const l = Array.isArray(ej) ? ej[1] : (ej.link || "");
                    pLista.innerHTML += crearCard(n, l, "");
                });
            }
        }

        // ─── MODO SERIES ───
        function renderSeries(data, pTitulo, pLista, ejercicios) {
            pTitulo.innerText = "SERIES";
            if (data.descripcion) {
                pLista.innerHTML += '<div class="bloque-descripcion">' + data.descripcion + '</div>';

                    '<div class="serie-meta-item"><span class="serie-meta-label">Series</span><span class="serie-meta-value" id="s-val-' + i + '">' + ej.series + '</span></div>' +

        // ─── MODO CIRCUITO ───
        function renderCircuito(data, pTitulo, pLista, ejercicios) {
            pTitulo.innerText = "CIRCUITO";
            if (data.descripcion) {
                pLista.innerHTML += '<div class="bloque-descripcion">' + data.descripcion + '</div>';

                pLista.innerHTML += '<div class="info-block"><span class="info-block-titulo" style="color:var(--naranja)">Pausa entre Vueltas</span><span class="info-block-subtitulo">' + pausaVuelta + ' segundos</span></div>';
            }

        let circVueltasRestantes = 0;

        function marcarVueltaCircuito(pausaVuelta, contId, totalVueltas) {
            if (circVueltasRestantes === 0) circVueltasRestantes = totalVueltas;
            if (circVueltasRestantes <= 0) return;
            circVueltasRestantes--;
            const el = document.getElementById(contId);
            if (el) el.innerText = circVueltasRestantes > 0 ? 'Vueltas restantes: ' + circVueltasRestantes : 'CIRCUITO COMPLETO!';
            // >>> COACH: Pausa circuito vueltas con motivación y vueltas restantes
            coachPausaVueltas(circVueltasRestantes);
            if (circVueltasRestantes <= 0) {
                const btn = document.getElementById('circ-btn-vuelta');
                if (btn) {
                    btn.disabled = true;
                    btn.innerText = "Completado";
                }
                return;
            }
            if (pausaVuelta > 0) iniciarDescansoCircuito(pausaVuelta);
        }

        // ─── MODO CIRCUITO POR TIEMPO ───
        function renderCircuitoTiempo(data, pTitulo, pLista, ejercicios) {
            pTitulo.innerText = "CIRCUITO POR TIEMPO";
            if (data.descripcion) {
                pLista.innerHTML += '<div class="bloque-descripcion">' + data.descripcion + '</div>';
            }
            const tieneBloques = ejercicios.length > 0 && ejercicios[0] && ejercicios[0].ejercicios;

            if (tieneBloques) {
                ejercicios.forEach(function(bloque, bIdx) {
                    const tiempoMin = bloque.tiempo_min || 5;

            if (seriesRestantes[i] <= 0) return;

            const btn = document.getElementById('btn-' + i);
            const timer = document.getElementById('timer-' + i);
            const val = document.getElementById('s-val-' + i);
            if (val) val.innerText = seriesRestantes[i];

                btn.innerText = "Completado";
                btn.disabled = true;
                return;
            }
            btn.classList.add('active');
            btn.innerText = "Descansando...";
            timer.style.display = "block";
            solicitarWakeLock();

            // >>> COACH: Anunciar pausa con series restantes
            coachPausaSeries(seriesRestantes[i]);

            let remaining = pausa;
            var _restDeadline = Date.now() + pausa * 1000;
            timer.innerText = formatearTiempo(remaining);
            restIntervals[i] = bgSetInterval(function() {
                remaining = Math.max(0, Math.round((_restDeadline - Date.now()) / 1000));
                timer.innerText = formatearTiempo(remaining);
                if (remaining <= 3 && remaining > 0) beep(400);
                if (remaining <= 0) {
                    bgClearInterval(restIntervals[i]);
                    beep(800);

                        hablarCoach('Es momento de hacer ' + _nombreEj + '.');

                    timer.style.display = "none";
                    btn.classList.remove('active');
                    btn.innerText = "Marcar Serie (" + seriesRestantes[i] + " rest.)";
                    liberarWakeLock();
                }
            }, 1000);

        // ─── BLOQUE TIEMPO (Circuito por Tiempo) ───
        var bloqueTiempoPausado = {};
        var _btDeadlines = {}; // deadline timestamp por timerId
        var _btRems = {}; // segundos restantes al pausar por timerId

        function iniciarBloqueTiempo(timerId, btnId, totalSeg) {
            const timerEl = document.getElementById(timerId);
            const btnEl = document.getElementById(btnId);
            if (!timerEl || !btnEl) return;
            if (btnEl.dataset.running === "1") return;
            btnEl.dataset.running = "1";
            btnEl.disabled = true;
            btnEl.innerText = "En curso...";
            solicitarWakeLock();
            bloqueTiempoPausado[timerId] = false;

            // Mostrar boton pausa asociado
            var pausaBtnAssoc = document.getElementById('warmup-ct-pausa');
            if (pausaBtnAssoc && timerId === 'warmup-clock') pausaBtnAssoc.style.display = 'block';
            // Buscar boton pausa de bloque entrenamiento (id: xxx-ct-pausa-N)
            var pausaBtnBloque = document.getElementById(timerId.replace('-ct-', '-ct-pausa-'));
            if (pausaBtnBloque) pausaBtnBloque.style.display = 'block';

            // >>> COACH: Arranca el circuito + frase motivacional
            hablarCoach('Arranca el circuito. ' + _fraseRandom(_frasesMotivacionales));

            let rem = totalSeg;
            _btDeadlines[timerId] = Date.now() + totalSeg * 1000;
            var _btLastMinAnnounced = -1;
            bloqueTiempoIntervals[timerId] = bgSetInterval(function() {
                if (bloqueTiempoPausado[timerId]) {
                    _btRems[timerId] = rem; // guardar rem actual mientras está pausado
                    return;
                }
                rem = Math.max(0, Math.round((_btDeadlines[timerId] - Date.now()) / 1000));
                const m = Math.floor(rem / 60),
                    s = rem % 60;
                timerEl.innerText = m + ":" + (s < 10 ? "0" + s : s);

                // >>> COACH: Anunciar cada minuto que pasa
                if (rem > 0 && rem % 60 === 0) {
                    var _minsQuedan = Math.floor(rem / 60);
                    if (_minsQuedan !== _btLastMinAnnounced) {
                        _btLastMinAnnounced = _minsQuedan;
                        coachMinutosRestantes(_minsQuedan);
                    }
                }

                // >>> COACH: Frase motivacional cada 30 segundos (Circuito por Tiempo)
                if (rem > 30 && rem % 30 === 0 && rem % 60 !== 0) coachMotivacional();

                // >>> COACH: Últimos 30 segundos + frase motivacional (Circuito por Tiempo)
                if (rem === 30) hablarCoach('Son los últimos 30 segundos. ' + _fraseRandom(_frasesMotivacionales));

                // >>> COACH: Conteo final a los 12 segundos restantes
                if (rem === 12) coachConteoFinal();

                if (rem <= 3 && rem > 0) beep(400);
                if (rem <= 0) {
                    bgClearInterval(bloqueTiempoIntervals[timerId]);
                    beep(800);
                    timerEl.innerText = "TIEMPO!";
                    btnEl.disabled = false;
                    btnEl.innerText = "Reiniciar";
                    btnEl.dataset.running = "0";
                    bloqueTiempoPausado[timerId] = false;
                    if (pausaBtnAssoc && timerId === 'warmup-clock') pausaBtnAssoc.style.display = 'none';
                    if (pausaBtnBloque) pausaBtnBloque.style.display = 'none';
                    // >>> COACH: Bloque completado
                    coachFinalizacion();
                    liberarWakeLock();
                }
            }, 1000);
        }

        function togglePausaBloqueTiempo(timerId, pausaBtn) {
            bloqueTiempoPausado[timerId] = !bloqueTiempoPausado[timerId];
            if (pausaBtn) pausaBtn.innerText = bloqueTiempoPausado[timerId] ? '▶ REANUDAR' : '⏸ PAUSAR';
            if (bloqueTiempoPausado[timerId]) {
                liberarWakeLock();

            } else {

                if (_btRems[timerId] !== undefined) {
