        // ─── TIMER PRINCIPAL (Tabata / Circuito por Tiempo) ───
        let timerTrabajoCurr = 1;
        var _tPhaseDeadline = 0; // timestamp en ms cuando termina la fase actual

        function iniciarCronometroTiempo() {
            if (timerActivo) return;
            timerActivo = true;
            timerPausado = false;
            solicitarWakeLock();
            _iniciarAudioKeepalive();

            const config = dataGlobal.config || {
                trabajo: 20,
                pausa: 10,
                rondas: 1,
                cantidad: 8,
                pausa_entre_rondas: 0
            };
            const rutina = dataGlobal.rutina || dataGlobal.datos || [];
            const trabajo = config.trabajo || 20;
            const pausa = config.pausa || 10;
            const rondas = config.rondas || 1;
            const cantidad = config.cantidad || rutina.length || 8;
            const pausaRondas = config.pausa_entre_rondas || 0;

            document.getElementById('btnStartTimer').style.display = "none";
            const btnPausa = document.getElementById('btnPausaTimer');
            if (btnPausa) {
                btnPausa.style.display = "block";
                btnPausa.innerText = "⏸ PAUSAR";
            }
            if (dataGlobal && dataGlobal.tipo === 'Circuito por Tiempo') hablarCoach('Arranca el circuito, vamos con todo!');

            tSegs = 5;
            tFase = "prep";
            tIdx = 0;
            tRonda = 1;
            timerTrabajoCurr = trabajo;
            _tPhaseDeadline = Date.now() + 5000;

            const clock = document.getElementById('clock');
            clock.className = 'prep';

            function _setFase(fase, segs) {
                tFase = fase;
                tSegs = segs;
                _tPhaseDeadline = Date.now() + segs * 1000;
            }

            function actualizarUI() {
                document.getElementById('t-status').innerText = tFase === "prep" ? "PREPARATE" : (tFase === "trabajo" ? "TRABAJO" : (tFase === "pausa" ? "DESCANSO" : "LISTO"));
                document.getElementById('clock').className = tFase === "trabajo" ? "" : (tFase === "pausa" ? "descanso" : "prep");

                if (rutina.length > 0) {
                    const ej = rutina[tIdx % rutina.length];
                    const nombre = Array.isArray(ej) ? ej[0] : (ej.nombre || "");
                    document.getElementById('t-ejercicio-nombre').innerText = tFase === "trabajo" ? nombre : (tFase === "pausa" ? "Respira..." : "");
                    document.getElementById('t-ej-restantes').innerText = tFase === "trabajo" ? ("Serie " + (tIdx + 1) + "/" + cantidad + " — Ronda " + tRonda + "/" + rondas) : "";

                    const nextIdx = (tIdx + 1) % rutina.length;
                    if (tFase === "pausa" && tIdx < cantidad - 1) {
                        const nextEj = rutina[nextIdx];
                        document.getElementById('next-ej-container').style.display = "block";
                        document.getElementById('next-ej-name').innerText = Array.isArray(nextEj) ? nextEj[0] : (nextEj.nombre || "");
                    } else {
                        document.getElementById('next-ej-container').style.display = "none";
                    }
                }

                const fillEl = document.getElementById('timer-progress-fill');
                if (fillEl) {
                    const total = tFase === "prep" ? 5 : (tFase === "trabajo" ? trabajo : pausa);
                    fillEl.style.width = ((tSegs / total) * 100) + '%';
                    fillEl.style.background = tFase === "trabajo" ? "var(--verde)" : (tFase === "pausa" ? "var(--rojo)" : "var(--amarillo)");
                    fillEl.style.transition = "width 1s linear, background 0.3s";
                }
                document.getElementById('clock').innerText = tSegs < 10 ? "0" + tSegs : tSegs;
            }

            // Tick: usa timestamp real para corregir drift de ticks perdidos
            function _tick() {
                if (timerPausado) return;

                // Timestamp-based: calcular segundos restantes desde la hora real
                tSegs = Math.max(0, Math.round((_tPhaseDeadline - Date.now()) / 1000));

                if (!_bgFFMode) {
                    document.getElementById('clock').innerText = tSegs < 10 ? "0" + tSegs : tSegs;
                    const total = tFase === "prep" ? 5 : (tFase === "trabajo" ? trabajo : pausa);
                    const fillEl = document.getElementById('timer-progress-fill');
                    if (fillEl) {
                        fillEl.style.width = ((tSegs / total) * 100) + '%';
                        fillEl.style.transition = "none";
                    }
                    if (tSegs <= 3 && tSegs > 0) beep(400);
                    if (tFase === "trabajo" && tSegs === Math.floor(trabajo / 2) && tSegs > 3) coachMotivacional();
                }

                if (tSegs <= 0) {
                    beep(800);
                    if (tFase === "prep") {
                        _setFase("arrancamos", 1);
                        if (!_bgFFMode) {
                            document.getElementById('t-status').innerText = "¡ARRANCAMOS!";
                            document.getElementById('clock').innerText = "";
                            document.getElementById('clock').className = 'prep';
                        }
                    } else if (tFase === "arrancamos") {
                        _setFase("trabajo", trabajo);
                        actualizarUI();
                        if (rutina.length > 0) {
                            var _ejArr = rutina[tIdx % rutina.length];
                            var _nomArr = Array.isArray(_ejArr) ? _ejArr[0] : (_ejArr.nombre || '');
                            hablarCoach('Arrancamos con ' + _nomArr + '. Vamos, dale!');
                        } else {
                            hablarCoach('Vamos, dale!');
                        }
                    } else if (tFase === "trabajo") {
                        tIdx++;
                        _setFase("pausa", pausa);
                        actualizarUI();
                        var _esUltimaTabata = (tIdx >= cantidad - 1);
                        if (tIdx < cantidad && rutina.length > 0) {
                            var _nxt = rutina[tIdx % rutina.length];
                            coachDescanso(pausa, Array.isArray(_nxt) ? _nxt[0] : (_nxt.nombre || ""), _esUltimaTabata);
                        } else if (_esUltimaTabata) {
                            coachDescanso(pausa, '', true);
                        }
                    } else if (tFase === "pausa") {
                        if (tIdx >= cantidad) {
                            if (pausaRondas > 0 && tRonda < rondas) {
                                mostrarPausaRonda(pausaRondas, tRonda, rondas, function() {
                                    tRonda++;
                                    tIdx = 0;
                                    _setFase("trabajo", trabajo);
                                    actualizarUI();
                                    coachRonda(tRonda, rondas);
                                });
                            } else if (tRonda < rondas) {
                                tRonda++;
                                tIdx = 0;
                                _setFase("trabajo", trabajo);
                                actualizarUI();
                                coachRonda(tRonda, rondas);
                            } else {
                                bgClearInterval(tInterval);
                                document.getElementById('t-status').innerText = "COMPLETADO!";
                                document.getElementById('clock').innerText = "00";
                                document.getElementById('clock').className = "";
                                timerActivo = false;
                                liberarWakeLock();
                                _detenerAudioKeepalive();
                                coachFinalizacion();
                            }
                        } else {
                            _setFase("trabajo", trabajo);
                            actualizarUI();
                            if (rutina.length > 0) {
                                var _ejDescanso = rutina[tIdx % rutina.length];
                                var _nomDescanso = Array.isArray(_ejDescanso) ? _ejDescanso[0] : (_ejDescanso.nombre || '');
                                hablarCoach('Arrancamos con ' + _nomDescanso + '. Vamos, dale!');
                            } else {
                                hablarCoach('Vamos, dale!');
                            }
                        }
                    }
                }
            }

            actualizarUI();
            tInterval = bgSetInterval(_tick, 1000);

            // Fast-forward: al volver de segundo plano, simula los ticks perdidos en silencio.
            // Se mueve _tPhaseDeadline 1 segundo hacia atrás en cada iteración para que
            // el cálculo basado en timestamp avance correctamente por las fases.
            _bgFastForward = function(elapsed) {
                if (!timerActivo || timerPausado) return;
                _bgFFMode = true;
                var steps = Math.min(elapsed, 3600);
                for (var i = 0; i < steps && timerActivo; i++) {
                    _tPhaseDeadline -= 1000;
                    _tick();
                }
                _bgFFMode = false;
                if (timerActivo) actualizarUI();
            };
        }

        function togglePausaTimer() {
            timerPausado = !timerPausado;
            const btn = document.getElementById('btnPausaTimer');
            if (btn) btn.innerText = timerPausado ? "▶ REANUDAR" : "⏸ PAUSAR";
            if (timerPausado) {
                liberarWakeLock();
                coachPausa();
            } else {
                // Recalibrar deadline con los segundos que quedaban al pausar
                _tPhaseDeadline = Date.now() + tSegs * 1000;
                solicitarWakeLock();
            }
        }

        // ─── SALIR DEL EMOM ───
        function salirDelEmom() {
            bgClearInterval(emomInterval);
            emomInterval = null;
            emomRunning = false;
            emomPausado = false;
            document.getElementById('emom-clock').className = '';
            document.getElementById('sec-emom-ui').style.display = 'none';

        // ─── EMOM PRINCIPAL — patron identico a Tabata (5 4 3 2 1 ARRANCAMOS) ───
        let emomSegs = 5;
        let emomFase = "prep"; // "prep" | "arrancamos" | "trabajo"
        let emomMinTotal = 10;

        function emomActualizarUI() {
            const clock = document.getElementById('emom-clock');
            const fillEl = document.getElementById('emom-progress-fill');

            document.getElementById('emom-status').innerText = emomFase === "prep" ? "PREPARATE" : (emomFase === "arrancamos" ? "¡ARRANCAMOS!" : "¡TRABAJA!");
            clock.className = (emomFase === "trabajo") ? "" : "prep";

            if (emomFase === "trabajo") {
                document.getElementById('emom-minuto').innerText = "Minuto " + (emomMinActual + 1) + " de " + emomMinTotal;
                document.getElementById('emom-subtexto').innerText = "";
            } else if (emomFase === "prep") {
                document.getElementById('emom-minuto').innerText = "";
                document.getElementById('emom-subtexto').innerText = "Preparate";
            } else {
                document.getElementById('emom-minuto').innerText = "";
                document.getElementById('emom-subtexto').innerText = "";
            }

            if (emomFase === "arrancamos") {
                clock.innerText = "";
            } else {
                clock.innerText = emomSegs < 10 ? "0" + emomSegs : emomSegs;
            }

            if (fillEl) {
                const total = emomFase === "prep" ? 5 : 60;
                fillEl.style.width = ((emomSegs / total) * 100) + '%';
                fillEl.style.background = emomFase === "prep" ? "var(--amarillo)" : "var(--verde)";
                fillEl.style.transition = "width 1s linear, background 0.3s";
            }
        }

        var _emomPhaseDeadline = 0; // timestamp en ms cuando termina la fase EMOM actual

        function iniciarEmom() {
            if (emomRunning) return;
            emomRunning = true;
            emomPausado = false;
            solicitarWakeLock();
            _iniciarAudioKeepalive();

            emomMinTotal = dataGlobal.minutos_totales || 10;
            emomTotalMin = emomMinTotal;
            emomMinActual = 0;
            emomSegs = 5;
            emomFase = "prep";
            _emomPhaseDeadline = Date.now() + 5000;
            emomMinutosCiclo = (dataGlobal.minutos_ciclo && dataGlobal.minutos_ciclo.length > 0) ? dataGlobal.minutos_ciclo : emomMinutosCiclo;

            document.getElementById('btnStartEmom').style.display = "none";
            document.getElementById('btnPausaEmom').style.display = "block";
            document.getElementById('btnReiniciarEmom').style.display = "block";
            document.getElementById('emom-ejercicio-nombre').innerHTML = "";

            var clock = document.getElementById('emom-clock');
            clock.className = 'prep';

            emomActualizarUI();

            function _emomTick() {
                if (emomPausado) return;

                // Timestamp-based: calcular segundos reales restantes
                emomSegs = Math.max(0, Math.round((_emomPhaseDeadline - Date.now()) / 1000));

                if (!_bgFFMode) {
                    document.getElementById('emom-clock').innerText = emomSegs < 10 ? "0" + emomSegs : emomSegs;
                    var total = emomFase === "prep" ? 5 : 60;
                    var fillEl = document.getElementById('emom-progress-fill');
                    if (fillEl) {
                        fillEl.style.width = ((emomSegs / total) * 100) + '%';
                        fillEl.style.transition = "none";
                    }
                    if (emomSegs <= 3 && emomSegs > 0) beep(400);

                    if (emomFase === "trabajo" && emomSegs === 15) {
                        var _emProxIdx = emomMinActual + 1;
                        var _emProxNombre = '';
                        if (emomMinutosCiclo && emomMinutosCiclo.length > 0 && _emProxIdx < emomMinTotal) {
                            var _emProxCiclo = emomMinutosCiclo[_emProxIdx % emomMinutosCiclo.length];
                            if (_emProxCiclo && _emProxCiclo.ejercicios && _emProxCiclo.ejercicios.length > 0) {
                                _emProxNombre = _emProxCiclo.ejercicios[0].nombre || '';
                            }
                        }
                        coachConteoEmom(_emProxNombre);
                    }
                }

                if (emomSegs <= 0) {
                    beep(800);
                    if (emomFase === "prep") {
                        emomFase = "arrancamos";
                        emomSegs = 1;
                        _emomPhaseDeadline = Date.now() + 1000;
                        if (!_bgFFMode) {
                            document.getElementById('emom-status').innerText = "¡ARRANCAMOS!";
                            document.getElementById('emom-clock').innerText = "";
                            document.getElementById('emom-clock').className = 'prep';
                            document.getElementById('emom-subtexto').innerText = "";
                        }
                    } else if (emomFase === "arrancamos") {
                        emomFase = "trabajo";
                        emomSegs = 60;
                        _emomPhaseDeadline = Date.now() + 60000;
                        emomActualizarUI();
                        var _emNombresMin0 = _obtenerNombresEmomMinuto(0, emomMinutosCiclo);
                        var _emEsUltimoMin0 = (emomMinTotal === 1);
                        if (_emNombresMin0) {
                            hablarCoach('Arrancamos con ' + _emNombresMin0 + '. ' + _fraseRandom(_frasesMotivacionales));
                            if (_emEsUltimoMin0) hablarCoach('Es el último ejercicio.');
                        } else {
                            hablarCoach('Arrancamos. ' + _fraseRandom(_frasesMotivacionales));
                            if (_emEsUltimoMin0) hablarCoach('Es el último ejercicio.');
                        }
                    } else {
                        emomMinActual++;
                        if (emomMinActual >= emomMinTotal) {
                            bgClearInterval(emomInterval);
                            emomInterval = null;
                            if (!_bgFFMode) {
                                document.getElementById('emom-status').innerText = "COMPLETADO!";
                                document.getElementById('emom-minuto').innerText = "";
                                document.getElementById('emom-ejercicio-nombre').innerText = "";
                                document.getElementById('emom-clock').innerText = "00";
                                document.getElementById('emom-clock').className = '';
                                var fillEl2 = document.getElementById('emom-progress-fill');
                                if (fillEl2) fillEl2.style.width = '100%';
                                document.getElementById('btnPausaEmom').style.display = "none";
                                document.getElementById('btnReiniciarEmom').style.display = "none";
                                document.getElementById('btnStartEmom').style.display = "block";
                            }
                            emomRunning = false;
                            liberarWakeLock();
                            _detenerAudioKeepalive();
                            coachFinalizacion();
                            return;
                        }
                        emomSegs = 60;
                        _emomPhaseDeadline = Date.now() + 60000;
                        emomActualizarUI();
                        var _emNombresMinN = _obtenerNombresEmomMinuto(emomMinActual, emomMinutosCiclo);
                        var _emEsUltimoMinN = (emomMinActual + 1 >= emomMinTotal);
                        if (_emNombresMinN) {
                            hablarCoach('Arrancamos con ' + _emNombresMinN + '. ' + _fraseRandom(_frasesMotivacionales));
                            if (_emEsUltimoMinN) hablarCoach('Es el último ejercicio.');
                        } else {
                            hablarCoach('Arrancamos. ' + _fraseRandom(_frasesMotivacionales));
                            if (_emEsUltimoMinN) hablarCoach('Es el último ejercicio.');
                        }
                    }
                }

                if (!_bgFFMode) {
                    document.getElementById('emom-clock').innerText = emomSegs < 10 ? "0" + emomSegs : emomSegs;
                    if (emomFase === "arrancamos") document.getElementById('emom-clock').innerText = "";
                }
            }

            emomInterval = bgSetInterval(_emomTick, 1000);

            // Fast-forward al volver del fondo
            _bgFastForward = function(elapsed) {
                if (!emomRunning || emomPausado) return;
                _bgFFMode = true;
                var steps = Math.min(elapsed, 3600);
                for (var i = 0; i < steps && emomRunning; i++) {
                    _emomPhaseDeadline -= 1000;
                    _emomTick();
                }
                _bgFFMode = false;
                if (emomRunning) emomActualizarUI();
            };
        }

        // Helper para obtener nombres de ejercicios del minuto EMOM
        function _obtenerNombresEmomMinuto(minIdx, ciclo) {
            if (!ciclo || ciclo.length === 0) return '';
            var minData = ciclo[minIdx % ciclo.length];
            if (!minData || !minData.ejercicios || minData.ejercicios.length === 0) return '';
            return minData.ejercicios.map(function(e) {
                return e.nombre || '';
            }).filter(function(n) {
                return n;
            }).join(' y ');
        }

        function pausarEmom() {
            if (!emomRunning) return;
            emomPausado = !emomPausado;
            var btnPausa = document.getElementById('btnPausaEmom');
            if (emomPausado) {
                btnPausa.innerText = "▶ REANUDAR";
                liberarWakeLock();
                coachPausa();
            } else {
                btnPausa.innerText = "⏸ PAUSAR";
                // Recalibrar deadline con los segundos que quedaban al pausar
                _emomPhaseDeadline = Date.now() + emomSegs * 1000;
                solicitarWakeLock();
            }
        }

        function reiniciarEmom() {

        // ─── TABATA BLOQUE MIX ───
        const tabataRunningFlags = {};

        function iniciarTabataBloque(btnId, statusId, ejId, infoId, timerId, tc, rutina) {
            const btn = document.getElementById(btnId);
            if (!btn || tabataRunningFlags[btnId]) return;
            tabataRunningFlags[btnId] = true;
            const pausaId = btnId.replace('-btn', '-pausa');
            const pausaBtn = document.getElementById(pausaId);
            btn.disabled = true;
            btn.innerText = "En curso...";
            if (pausaBtn) pausaBtn.style.display = "block";
            solicitarWakeLock();

            const trabajo = tc.trabajo || 20;
            const pausa = tc.pausa || 10;
            const cantidad = tc.cantidad || 8;
            const rondas = tc.rondas || 1;
            const pausaRonda = tc.pausa_entre_rondas || 0;
            let pausado = false;
            if (pausaBtn) pausaBtn.onclick = function() {
                pausado = !pausado;
                pausaBtn.innerText = pausado ? "▶ REANUDAR" : "⏸ PAUSAR";
                if (pausado) {
                    liberarWakeLock();
                    // >>> COACH: Pausa tabata bloque
                    coachPausa();
                } else {
                    solicitarWakeLock();
                }
            };

            function runTabata() {
                prepCountdown(
                    document.getElementById(timerId),
                    document.getElementById(statusId),
                    600,
                    function() {
                        siguiente(0, 1);
                    }
                );

                function siguiente(ejIdx, rondaActual) {
                    if (rondaActual > rondas) {
                        document.getElementById(statusId).innerText = "COMPLETADO!";
                        document.getElementById(timerId).innerText = "OK";
                        if (pausaBtn) pausaBtn.style.display = "none";
                        btn.disabled = false;
                        btn.innerText = "Reiniciar";
                        tabataRunningFlags[btnId] = false;
                        liberarWakeLock();
                        return;
                    }
                    if (ejIdx >= cantidad) {
                        if (pausaRonda > 0 && rondaActual < rondas) {
                            document.getElementById(statusId).innerText = "PAUSA RONDAS";
                            document.getElementById(ejId).innerText = "Ronda " + rondaActual + "/" + rondas;
                            let rp = pausaRonda;
                            var _ivRpDeadline = Date.now() + pausaRonda * 1000;
                            document.getElementById(timerId).innerText = rp;
                            const _ivRp = bgSetInterval(function() {
                                if (pausado) return;
                                rp = Math.max(0, Math.round((_ivRpDeadline - Date.now()) / 1000));
                                document.getElementById(timerId).innerText = rp;
                                if (rp <= 0) {
                                    bgClearInterval(_ivRp);
                                    siguiente(0, rondaActual + 1);
                                }
                            }, 1000);
                        } else {
                            siguiente(0, rondaActual + 1);
                        }
                        return;
                    }
                    const ej = rutina[ejIdx % rutina.length];
                    const nombre = Array.isArray(ej) ? ej[0] : (ej.nombre || ej);
                    document.getElementById(statusId).innerText = "TRABAJO";
                    document.getElementById(ejId).innerText = nombre;
                    document.getElementById(infoId).innerText = "Serie " + (ejIdx + 1) + "/" + cantidad + " — Ronda " + rondaActual + "/" + rondas;
                    // >>> COACH: Arrancamos con ejercicio + vamos dale (Tabata Mix)
                    hablarCoach('Arrancamos con ' + nombre + '. Vamos, dale!');
                    let t = trabajo;
                    var _ivTDeadline = Date.now() + trabajo * 1000;
                    document.getElementById(timerId).innerText = t;
                    const _ivT = bgSetInterval(function() {
                        if (pausado) return;
                        t = Math.max(0, Math.round((_ivTDeadline - Date.now()) / 1000));
                        document.getElementById(timerId).innerText = t;
                        // >>> COACH: Motivacional a la mitad del trabajo (Tabata Mix)
                        if (t === Math.floor(trabajo / 2) && t > 3) coachMotivacional();
                        if (t <= 3 && t > 0) beep(400);
                        if (t <= 0) {
                            bgClearInterval(_ivT);
                            beep(800);
                            document.getElementById(statusId).innerText = "DESCANSO";
                            // >>> COACH: Pausa + próximo ejercicio (Tabata Mix) - sin 3 2 1 en rest
                            var _esUltimaMix = (ejIdx + 1 >= cantidad);
                            if (_esUltimaMix) {
                                hablarCoach('Es la última, no aflojes!');
                            } else {
                                hablarCoach('Pausa.');
                            }
                            var _nxtMix = rutina[(ejIdx + 1) % rutina.length];
                            var _nxtNombreMix = Array.isArray(_nxtMix) ? _nxtMix[0] : (_nxtMix.nombre || _nxtMix || '');
                            if (ejIdx + 1 < cantidad) {
                                document.getElementById(ejId).innerText = "PROXIMO: " + _nxtNombreMix;
                                hablarCoach('El próximo ejercicio es ' + _nxtNombreMix + '.');
                            } else {
                                document.getElementById(ejId).innerText = "Respira...";
                            }
                            let p = pausa;
                            var _ivPDeadline = Date.now() + pausa * 1000;
                            document.getElementById(timerId).innerText = p;
                            const _ivP = bgSetInterval(function() {
                                if (pausado) return;
                                p = Math.max(0, Math.round((_ivPDeadline - Date.now()) / 1000));
                                document.getElementById(timerId).innerText = p;
                                // >>> COACH: Tabata Mix - NO decir 3 2 1 en descanso
                                if (p <= 0) {
                                    bgClearInterval(_ivP);
                                    siguiente(ejIdx + 1, rondaActual);
                                }
                            }, 1000);
                        }
                    }, 1000);
                }
            }
            runTabata();
        }

                        if (ciclo.length > 0 && _emcProxIdx < totalMin) {
                            var _emcProxMin = ciclo[_emcProxIdx % ciclo.length];
                            if (_emcProxMin && _emcProxMin.ejercicios && _emcProxMin.ejercicios.length > 0) {
                                _emcProxNombre = _emcProxMin.ejercicios[0].nombre || '';
                            }
                        }
                        coachConteoEmom(_emcProxNombre);
                    }
                    // >>> COACH: Countdown sincronizado al final del minuto
                    if (rem <= 3 && rem > 0) beep(400);
                    if (rem <= 0) {
                        bgClearInterval(iv);
                        beep(800);
                        minActual++;
                        sig();
                    }
                }, 1000);
            }
        }

        function iniciarEmomMix(i, btnId, statusId, roundId, clockId, ejId) {
            var bloque = bloquesMix[i];
            if (!bloque) return;
            var totalMin = bloque.minutos_totales || 10;
            var ciclo = bloque.minutos_ciclo || [];
            iniciarEmomBloqueConCiclo(btnId, statusId, roundId, clockId, ejId || null, totalMin, ciclo);
        }

        // ─── SALIR DEL TIMER ───
        function salirDelTimer() {
            bgClearInterval(tInterval);
            bgClearInterval(pausaRondaInterval);
            bgClearInterval(emomInterval);
            bgClearInterval(warmupTabInterval);
            bgClearInterval(warmupEmomInterval);
            timerActivo = false;
            timerPausado = false;
            emomRunning = false;
            warmupRunning = false;
            document.getElementById('overlay-pausa-ronda').classList.remove('visible');
            document.getElementById('overlay-pausa-ronda').style.display = 'none';
            document.getElementById('sec-timer-ui').style.display = 'none';
            var btnStart = document.getElementById('btnStartTimer');
            if (btnStart) {
                btnStart.style.display = 'block';
                btnStart.innerText = 'EMPEZAR';
            }
            var btnPausa = document.getElementById('btnPausaTimer');
            if (btnPausa) {
                btnPausa.style.display = 'none';
                btnPausa.innerText = '⏸ PAUSAR';
            }
            var secLista = document.getElementById('sec-rutina-lista');
            if (secLista) {
                secLista.style.display = 'block';
                secLista.scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
            }
            liberarWakeLock();
        }

        // ─── CERRAR RUTINA ───
        function cerrar() {
            var secLista = document.getElementById('sec-rutina-lista');
            if (secLista) secLista.style.display = 'block';
            var btnStart = document.getElementById('btnStartTimer');
            if (btnStart) {
                btnStart.style.display = 'block';
                btnStart.innerText = 'EMPEZAR';
            }
            var btnPausa = document.getElementById('btnPausaTimer');
            if (btnPausa) {
                btnPausa.style.display = 'none';
                btnPausa.innerText = '⏸ PAUSAR';
            }
            bgClearInterval(tInterval);
            bgClearInterval(dInterval);
            bgClearInterval(emomInterval);
            bgClearInterval(pausaRondaInterval);
            bgClearInterval(warmupTabInterval);
            bgClearInterval(warmupEmomInterval);
            Object.values(restIntervals).forEach(bgClearInterval);
            Object.values(bloqueTiempoIntervals).forEach(function(v) {
                if (typeof v === 'number') bgClearInterval(v);
            });
            document.getElementById('rutina-modal').classList.remove('visible');
            document.getElementById('overlay-descanso').classList.remove('visible');
            document.getElementById('overlay-descanso').style.display = 'none';
            document.getElementById('overlay-pausa-ronda').classList.remove('visible');
            document.getElementById('overlay-pausa-ronda').style.display = 'none';
            emomRunning = false;
            warmupRunning = false;
            timerPausado = false;
            timerActivo = false;
            restIntervals = {};
            bloqueTiempoIntervals = {};
            seriesRestantes = {};
            circVueltasRestantes = 0;
            detenerCoach();
            liberarWakeLock();
            _detenerAudioKeepalive();
            _bgFastForward = null;
            _bgFFMode = false;
        }
    </script>
</body>
