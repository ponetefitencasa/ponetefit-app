<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONETE FIT | Full Training Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=Impact&display=swap" rel="stylesheet">
    <style>
         :root {
            --naranja: #FF4500;
            --azul: #3498db;
            --verde: #2ecc71;
            --rojo: #e74c3c;
            --amarillo: #f1c40f;
            --purpura: #9b59b6;
            --fondo: #0f172a;
            --tarjeta: #1e293b;
            --texto: #f8fafc;
            --borde: #334155;
        }
        
        * {
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        .font-impact {
            font-family: 'Impact', sans-serif;
        }
        
        .home-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }
        
        .search-box {
            background: var(--tarjeta);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--borde);
            text-align: center;
        }
        
        input {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: 2px solid var(--borde);
            background: #0f172a;
            color: white;
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        
        .btn-principal {
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            border: none;
            background: var(--naranja);
            color: white;
            font-weight: 900;
            cursor: pointer;
            font-size: 1.1rem;
            text-transform: uppercase;
        }
        
        #rutina-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--fondo);
            z-index: 100;
            overflow-y: auto;
            padding-bottom: 80px;
        }
        
        .header-rutina {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #1a2537;
            border-bottom: 3px solid var(--naranja);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .btn-header {
            background: #475569;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .container-scroll {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .seccion-card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid var(--borde);
        }
        
        .seccion-titulo {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        
        .card-ejercicio {
            background: #111827;
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #374151;
        }
        
        .btn-youtube {
            background: var(--rojo);
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 900;
        }
        
        #timer-box {
            background: var(--tarjeta);
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            border: 5px solid var(--verde);
            margin-top: 20px;
        }
        
        #clock {
            font-size: 7rem;
            font-family: 'Impact';
            color: var(--verde);
            margin: 10px 0;
        }
        
        .serie-card {
            background: #1e293b;
            border-radius: 20px;
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid var(--borde);
        }
        
        .serie-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }
        
        .timer-display {
            font-size: 4rem;
            font-family: 'Impact';
            color: var(--verde);
            display: none;
            margin: 10px 0;
        }
        
        .btn-rest {
            background: #e67e22;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }
        
        .btn-rest.active {
            background: #7f8c8d;
        }
        
        #overlay-descanso,
        #overlay-pausa-ronda {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 3000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .emom-box {
            background: #1a2537;
            border: 3px solid var(--amarillo);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            margin-top: 20px;
        }
        
        .emom-clock {
            font-size: 6rem;
            font-family: 'Impact';
            color: var(--amarillo);
        }
        
        .mix-seccion {
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 24px;
            border: 2px solid var(--borde);
            background: #111827;
        }
        
        .mix-seccion-titulo {
            font-size: 1.2rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--verde);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            display: none;
            z-index: 4000;
        }
        
        .warmup-box {
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 24px;
        }
        
        .bloque-mix {
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 24px;
            border: 2px solid var(--borde);
            background: #0f172a;
        }
        
        .bloque-mix-titulo {
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        .btn-pausa {
            background: #8e44ad;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-top: 8px;
            width: 100%;
        }
        
        .btn-pausa:disabled {
            background: #4a3558;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <div id="toast">Rutina sincronizada</div>

    <!-- Overlay descanso circuito -->
    <div id="overlay-descanso">
        <h1 class="font-impact" style="color:var(--purpura); font-size:3rem;">DESCANSO DE VUELTA</h1>
        <div id="descanso-clock" style="font-size:10rem; font-family:'Impact'; color:white;">60</div>
        <button class="btn-header" onclick="cerrarDescansoCircuito()">SALTAR DESCANSO</button>
    </div>

    <!-- Overlay pausa entre rondas Tabata -->
    <div id="overlay-pausa-ronda">
        <h1 class="font-impact" style="color:var(--purpura); font-size:2.5rem;">PAUSA ENTRE RONDAS</h1>
        <div id="pausa-ronda-clock" style="font-size:10rem; font-family:'Impact'; color:white;">30</div>
        <div id="pausa-ronda-info" style="font-size:1.3rem; color:var(--amarillo); margin-top:10px;"></div>
        <button class="btn-header" style="margin-top:20px;" onclick="salterPausaRonda()">SALTAR PAUSA</button>
    </div>

    <!-- Home -->
    <div class="home-screen" id="view-home">
        <h1 class="font-impact" style="color:var(--naranja); font-size:5rem; margin:0;">PONETE FIT</h1>
        <h2 class="font-impact" style="color:white; font-size:2.5rem; margin-bottom:30px;">PRO COACH</h2>
        <div class="search-box">
            <input type="text" id="codigoInput" placeholder="CODIGO DE RUTINA">
            <button class="btn-principal" onclick="consultarRutina()">ENTRAR A ENTRENAR</button>
        </div>
    </div>

    <!-- Modal de rutina -->
    <div id="rutina-modal">
        <div class="header-rutina">
            <div>
                <span id="tipo-tag" style="background:var(--naranja); padding:4px 8px; border-radius:4px; font-weight:900; font-size:0.7rem;">MODO</span>
                <h3 id="id-display" style="margin:0;">---</h3>
            </div>
            <div>
                <button class="btn-header" onclick="cerrar()">SALIR</button>
            </div>
        </div>

        <div class="container-scroll">
            <div id="sec-warmup" class="seccion-card">
                <div class="seccion-titulo" style="color:var(--azul);">CALENTAMIENTO</div>
                <div id="warmup-meta" style="color:var(--amarillo); font-weight:bold; margin-bottom:15px;"></div>
                <div id="warmup-lista"></div>
                <div id="warmup-timer-box" style="display:none; text-align:center; margin-top:16px;">
                    <div id="warmup-status" style="font-size:1.2rem; font-weight:900; color:var(--azul);"></div>
                    <div id="warmup-ej" style="font-size:1rem; color:var(--naranja); min-height:1.2rem;"></div>
                    <div id="warmup-clock" style="font-size:5rem; font-family:Impact; color:white;">--</div>
                    <button class="btn-rest" id="warmup-btn" onclick="iniciarWarmupTimer()" style="max-width:280px; margin:0 auto; background:var(--azul);">INICIAR CALENTAMIENTO</button>
                </div>
            </div>

            <div id="sec-rutina-lista">
                <div id="sec-principal">
                    <div id="principal-titulo" class="seccion-titulo" style="color:var(--verde);">ENTRENAMIENTO</div>
                    <div id="principal-lista"></div>
                </div>
            </div>

            <!-- Timer para Tabata / Circuito por Tiempo -->
            <div id="sec-timer-ui" style="display:none;">
                <div style="margin-bottom:10px;">
                    <button class="btn-header" onclick="salirDelTimer()" style="background:#d35400; color:white; font-size:1rem; padding:12px 20px; width:100%; border-radius:10px;">⬅ VOLVER A RUTINA MIX</button>
                </div>
                <div id="timer-box">
                    <div id="t-status" style="font-size:1.8rem; font-weight:900;">LISTO?</div>
                    <div id="t-ejercicio-nombre" style="font-size:1.4rem; color:var(--naranja); font-weight:bold; min-height:2rem;"></div>
                    <div id="t-ej-restantes" style="font-size:0.95rem; color:var(--amarillo); margin-bottom:6px;"></div>
                    <div id="clock">05</div>
                    <div id="t-ejercicio" style="font-size:1.1rem; color:#94a3b8;">Preparate</div>
                    <div id="next-ej-container" style="display:none; color:var(--amarillo); margin-top:10px;">
                        PROXIMO: <span id="next-ej-name">---</span>
                    </div>
                    <button class="btn-principal" id="btnStartTimer" onclick="iniciarCronometroTiempo()" style="background:var(--verde); margin-top:20px;">EMPEZAR</button>
                    <!-- PAUSA para Tabata / Circuito por Tiempo -->
                    <button class="btn-pausa" id="btnPausaTimer" onclick="togglePausaTimer()" style="display:none; max-width:300px; margin:8px auto 0;">⏸ PAUSAR</button>
                </div>
            </div>

            <!-- EMOM -->
            <div id="sec-emom-ui" style="display:none;">
                <div class="emom-box">
                    <div id="emom-status" style="font-size:1.5rem; font-weight:900;">LISTO?</div>
                    <div id="emom-minuto" style="font-size:1rem; color:var(--amarillo); margin:6px 0;"></div>
                    <div class="emom-clock" id="emom-clock">60</div>
                    <button class="btn-principal" id="btnStartEmom" onclick="iniciarEmom()" style="background:var(--amarillo); color:#000; margin-top:20px;">INICIAR EMOM</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dataGlobal = null;
        let restIntervals = {};
        let seriesRestantes = {};
        let tInterval = null,
            dInterval = null,
            emomInterval = null,
            pausaRondaInterval = null;
        let tSegs = 5,
            tFase = "prep",
            tIdx = 0,
            tRonda = 1;
        let tPausaRondaResolve = null;
        let currentCode = "";
        let bloqueTiempoIntervals = {};
        let emomRunning = false,
            emomMinActual = 0;
        let warmupRunning = false,
            warmupInterval = null;

        // Estado de pausa para el timer principal (Tabata / Circuito por Tiempo)
        let timerPausado = false;
        let timerActivo = false;

        const audio = new(window.AudioContext || window.webkitAudioContext)();

        function beep(f) {
            const o = audio.createOscillator(),
                g = audio.createGain();
            o.connect(g);
            g.connect(audio.destination);
            o.frequency.value = f;
            g.gain.value = 0.1;
            o.start();
            setTimeout(() => o.stop(), 200);
        }

        async function consultarRutina() {
            const cod = document.getElementById('codigoInput').value.trim().toLowerCase();
            if (!cod) return;
            try {
                const res = await fetch("https://ponetefit-app-default-rtdb.firebaseio.com/rutinas/" + cod + ".json");
                const data = await res.json();
                if (!data) return alert("Codigo no encontrado");
                dataGlobal = data;
                currentCode = cod;
                document.getElementById('id-display').innerText = cod.toUpperCase();
                document.getElementById('tipo-tag').innerText = data.tipo.toUpperCase();
                render(data);
                document.getElementById('rutina-modal').style.display = "block";
            } catch (e) {
                alert("Error al conectar con la base de datos");
            }
        }

        function calcularPausa(reps) {
            const r = parseInt(reps);
            if (isNaN(r)) return 60;
            if (r <= 2) return 120;
            if (r <= 4) return 105;
            if (r <= 6) return 90;
            if (r <= 8) return 75;
            if (r <= 10) return 60;
            if (r <= 12) return 50;
            return 45;
        }

        // ─── RENDER CALENTAMIENTO DINAMICO ───
        function renderWarmup(data) {
            const tipo = data.warmup_tipo || "Circuito (Vueltas)";
            const ejsW = data.warmup_ejercicios || [];
            const det = data.warmup_config_detalle || {};

            const colorMap = {
                "Circuito (Vueltas)": "var(--azul)",
                "Circuito por Tiempo": "#1a8bc0",
                "Tabata": "#d35400",
                "EMOM": "var(--amarillo)",
                "Series/Reps": "var(--verde)"
            };
            const color = colorMap[tipo] || "var(--azul)";

            document.getElementById('warmup-meta').innerHTML =
                '<span style="color:' + color + '; font-weight:900;">' + tipo.toUpperCase() + '</span>';

            const wLista = document.getElementById('warmup-lista');
            wLista.innerHTML = '';

            if (ejsW.length === 0) {
                document.getElementById('sec-warmup').style.display = "none";
                return;
            }
            document.getElementById('sec-warmup').style.display = "block";

            // Metadata segun tipo
            let metaText = "";
            if (tipo === "Circuito (Vueltas)") {
                const vueltas = data.warmup_vueltas || det.vueltas || 2;
                const pausaV = det.pausa_vuelta || 0;
                metaText = vueltas + " VUELTAS" + (pausaV > 0 ? " | Pausa entre vueltas: " + pausaV + "s" : "");
            } else if (tipo === "Circuito por Tiempo") {
                metaText = (det.duracion_bloque || 3) + " MINUTOS";
            } else if (tipo === "Tabata") {
                metaText = (det.trabajo || 20) + "s TRABAJO / " + (det.pausa || 10) + "s DESCANSO";
            } else if (tipo === "EMOM") {
                metaText = (det.minutos || 5) + " MINUTOS EMOM";
            } else if (tipo === "Series/Reps") {
                metaText = (det.series || 3) + " SERIES × " + (det.reps || 10) + " REPS";
            }

            if (metaText) {
                wLista.innerHTML += '<div style="color:var(--amarillo); font-weight:bold; margin-bottom:10px; font-size:0.95rem;">' + metaText + '</div>';
            }

            ejsW.forEach(function(ej) {
                const n = Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio);
                const l = Array.isArray(ej) ? ej[1] : (ej.link || "");
                const r = Array.isArray(ej) ? ej[2] : (ej.reps || "");
                wLista.innerHTML += crearCard(n, l, r ? r + " REPS" : "");
            });

            // Timer interactivo segun tipo
            const tBox = document.getElementById('warmup-timer-box');
            const tStatus = document.getElementById('warmup-status');
            const tEj = document.getElementById('warmup-ej');
            const tClock = document.getElementById('warmup-clock');
            const tBtn = document.getElementById('warmup-btn');

            if (tipo === "Circuito (Vueltas)") {
                const vueltas = data.warmup_vueltas || det.vueltas || 2;
                const pausaV = det.pausa_vuelta || 0;
                tBox.style.display = "block";
                tStatus.innerText = "VUELTAS DEL CALENTAMIENTO";
                tClock.style.display = "none";

                // Contador de vueltas
                let vRestantes = vueltas;
                const vCounter = document.createElement('div');
                vCounter.id = 'warmup-vueltas-counter';
                vCounter.style.cssText = 'font-size:2rem; font-weight:900; color:var(--amarillo); margin:8px 0;';
                vCounter.innerText = 'Vueltas restantes: ' + vRestantes;
                tBox.insertBefore(vCounter, tBtn);

                tBtn.innerText = "✅ VUELTA COMPLETADA";
                tBtn.style.background = "var(--naranja)";
                tBtn.onclick = function() {
                    if (vRestantes <= 0) return;
                    vRestantes--;
                    vCounter.innerText = vRestantes > 0 ?
                        'Vueltas restantes: ' + vRestantes :
                        '🏆 ¡CALENTAMIENTO COMPLETO!';
                    if (pausaV > 0 && vRestantes > 0) {
                        iniciarDescansoCircuito(pausaV);
                    }
                    if (vRestantes <= 0) {
                        tBtn.disabled = true;
                        tBtn.style.background = "#27ae60";
                        tBtn.innerText = "COMPLETADO";
                    }
                };
            } else if (tipo === "Circuito por Tiempo") {
                // FIX: usar duracion_bloque del config de calentamiento, no defaults de Tabata
                const dur = det.duracion_bloque || 3;
                const durSeg = dur * 60;
                tBox.style.display = "block";
                tStatus.innerText = "TIEMPO TOTAL: " + dur + " min";
                tClock.style.display = "block";
                tClock.innerText = dur + ":00";
                tBtn.innerText = "▶ INICIAR TIEMPO";
                tBtn.onclick = function() {
                    iniciarBloqueTiempo('warmup-clock', 'warmup-btn', durSeg);
                };
            } else if (tipo === "Tabata") {
                tBox.style.display = "block";
                tStatus.innerText = "TABATA CALENTAMIENTO";
                tClock.style.display = "block";
                tClock.innerText = det.trabajo || 20;
                tBtn.innerText = "INICIAR TABATA WARMUP";
                tBtn.onclick = function() {
                    iniciarTabataWarmup(ejsW, det);
                };
            } else if (tipo === "EMOM") {
                tBox.style.display = "block";
                tStatus.innerText = "EMOM CALENTAMIENTO";
                tClock.style.display = "block";
                tClock.innerText = "60";
                tBtn.innerText = "INICIAR EMOM WARMUP";
                tBtn.onclick = function() {
                    iniciarEmomWarmup(det);
                };
            } else if (tipo === "Series/Reps") {
                const seriesW = det.series || 3;
                const repsW = det.reps || 10;
                const pausaSerieW = calcularPausa(repsW);
                tBox.style.display = "block";
                tStatus.innerText = "SERIES DE CALENTAMIENTO — " + seriesW + " SERIES x " + repsW + " REPS";
                tEj.innerText = "Descanso entre series: " + pausaSerieW + "s";
                tClock.style.display = "block";
                tClock.innerText = "--";
                tBtn.style.background = "var(--verde)";

                // Construir botones por serie con countdown de descanso
                let wSeriesHtml = '';
                for (let si = 0; si < seriesW; si++) {
                    wSeriesHtml += '<div id="warmup-serie-' + si + '" style="margin-top:8px;">' +
                        '<button class="btn-rest" id="warmup-serie-btn-' + si + '" onclick="marcarSerieWarmup(' + si + ',' + pausaSerieW + ',' + seriesW + ')">' +
                        'SERIE ' + (si + 1) + ' DE ' + seriesW + '</button>' +
                        '</div>';
                }
                tBtn.style.display = "none";
                const wSeriesContainer = document.createElement('div');
                wSeriesContainer.id = 'warmup-series-btns';
                wSeriesContainer.innerHTML = wSeriesHtml;
                tBox.appendChild(wSeriesContainer);
            }
        }

        // ─── TIMERS DEL CALENTAMIENTO ───
        // Dispatcher para el boton de calentamiento (fallback HTML)
        function iniciarWarmupTimer() {
            const tipo = (dataGlobal && dataGlobal.warmup_tipo) ? dataGlobal.warmup_tipo : "";
            const det = (dataGlobal && dataGlobal.warmup_config_detalle) ? dataGlobal.warmup_config_detalle : {};
            const ejsW = (dataGlobal && dataGlobal.warmup_ejercicios) ? dataGlobal.warmup_ejercicios : [];
            if (tipo === "Tabata") {
                iniciarTabataWarmup(ejsW, det);
            } else if (tipo === "EMOM") {
                iniciarEmomWarmup(det);
            } else if (tipo === "Circuito por Tiempo") {
                const durSeg = (det.duracion_bloque || 3) * 60;
                iniciarBloqueTiempo('warmup-clock', 'warmup-btn', durSeg);
            }
        }

        let warmupTabInterval = null;

        function iniciarTabataWarmup(ejsW, det) {
            if (warmupRunning) return;
            warmupRunning = true;
            document.getElementById('warmup-btn').disabled = true;
            document.getElementById('warmup-btn').innerText = "EN CURSO...";
            const trabajo = det.trabajo || 20;
            const pausa = det.pausa || 10;
            const totalEjs = ejsW.length;
            let ejIdx = 0;

            // Mostrar total de ejercicios al inicio
            document.getElementById('warmup-status').innerText = "TABATA CALENTAMIENTO — " + totalEjs + " EJERCICIO(S)";

            function siguiente() {
                if (ejIdx >= totalEjs) {
                    document.getElementById('warmup-status').innerText = "CALENTAMIENTO LISTO!";
                    document.getElementById('warmup-status').style.color = "var(--azul)";
                    document.getElementById('warmup-ej').innerText = "";
                    document.getElementById('warmup-clock').innerText = "OK";
                    warmupRunning = false;
                    return;
                }
                const ej = ejsW[ejIdx];
                const nombre = Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio || "");
                document.getElementById('warmup-status').innerText = "TRABAJO — Ej " + (ejIdx + 1) + "/" + totalEjs;
                document.getElementById('warmup-status').style.color = "var(--verde)";
                document.getElementById('warmup-ej').innerText = nombre;
                let rem = trabajo;
                document.getElementById('warmup-clock').innerText = rem < 10 ? "0" + rem : rem;
                warmupTabInterval = setInterval(function() {
                    rem--;
                    document.getElementById('warmup-clock').innerText = rem < 10 ? "0" + rem : rem;
                    if (rem <= 0) {
                        clearInterval(warmupTabInterval);
                        document.getElementById('warmup-status').innerText = "DESCANSO";
                        document.getElementById('warmup-status').style.color = "var(--rojo)";
                        // Mostrar PROXIMO ejercicio durante el descanso
                        const nextIdx = ejIdx + 1;
                        if (nextIdx < totalEjs) {
                            const nextEj = ejsW[nextIdx];
                            const nextNombre = Array.isArray(nextEj) ? nextEj[0] : (nextEj.nombre || nextEj.ejercicio || "");
                            document.getElementById('warmup-ej').innerText = "PROXIMO: " + nextNombre;
                        } else {
                            document.getElementById('warmup-ej').innerText = "ULTIMO EJERCICIO — CASI LISTO!";
                        }
                        let d = pausa;
                        document.getElementById('warmup-clock').innerText = d < 10 ? "0" + d : d;
                        warmupTabInterval = setInterval(function() {
                            d--;
                            document.getElementById('warmup-clock').innerText = d < 10 ? "0" + d : d;
                            if (d <= 0) {
                                clearInterval(warmupTabInterval);
                                ejIdx++;
                                siguiente();
                            }
                        }, 1000);
                    }
                }, 1000);
            }
            siguiente();
        }

        let warmupEmomInterval = null;

        function iniciarEmomWarmup(det) {
            if (warmupRunning) return;
            warmupRunning = true;
            document.getElementById('warmup-btn').disabled = true;
            document.getElementById('warmup-btn').innerText = "EN CURSO...";
            const mins = det.minutos || 5;
            // Leer lista de ejercicios del warmup desde dataGlobal
            const ejsW = (dataGlobal && dataGlobal.warmup_ejercicios) ? dataGlobal.warmup_ejercicios : [];
            const ejsPorMin = ejsW.length > 0 ? Math.ceil(ejsW.length / mins) : 1;
            let minActual = 0;

            function sig() {
                if (minActual >= mins) {
                    document.getElementById('warmup-status').innerText = "CALENTAMIENTO LISTO!";
                    document.getElementById('warmup-status').style.color = "var(--azul)";
                    document.getElementById('warmup-ej').innerText = "";
                    document.getElementById('warmup-clock').innerText = "OK";
                    warmupRunning = false;
                    return;
                }
                document.getElementById('warmup-status').innerText = "MINUTO " + (minActual + 1) + "/" + mins;
                // Mostrar ejercicio(s) del minuto actual
                if (ejsW.length > 0) {
                    const startIdx = minActual * ejsPorMin;
                    const endIdx = Math.min(startIdx + ejsPorMin, ejsW.length);
                    const ejsMinuto = [];
                    for (var ei = startIdx; ei < endIdx; ei++) {
                        const ej = ejsW[ei];
                        ejsMinuto.push(Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio || ""));
                    }
                    if (ejsMinuto.length > 0) {
                        document.getElementById('warmup-ej').innerText = ejsMinuto.join(" | ");
                    } else {
                        // Si ya se agotaron los ejercicios, mostrar el ultimo
                        const lastEj = ejsW[ejsW.length - 1];
                        document.getElementById('warmup-ej').innerText = Array.isArray(lastEj) ? lastEj[0] : (lastEj.nombre || lastEj.ejercicio || "");
                    }
                }
                let rem = 60;
                document.getElementById('warmup-clock').innerText = rem;
                warmupEmomInterval = setInterval(function() {
                    rem--;
                    document.getElementById('warmup-clock').innerText = rem;
                    if (rem <= 0) {
                        clearInterval(warmupEmomInterval);
                        beep(800);
                        minActual++;
                        sig();
                    }
                }, 1000);
            }
            sig();
        }

        // ─── TIMER SERIES WARMUP ───
        const warmupSeriesRestantes = {};
        const warmupSeriesIntervals = {};

        function marcarSerieWarmup(idx, pausaSeg, totalSeries) {
            if (warmupSeriesRestantes[idx] === undefined) warmupSeriesRestantes[idx] = 1;
            // Solo puede ejecutarse una vez por boton
            const btn = document.getElementById("warmup-serie-btn-" + idx);
            if (!btn || btn.disabled) return;
            btn.disabled = true;
            btn.classList.add('active');
            btn.innerText = "DESCANSANDO...";

            // Mostrar countdown en warmup-clock y warmup-ej
            document.getElementById('warmup-status').innerText = "DESCANSO — Serie " + (idx + 1) + "/" + totalSeries;
            document.getElementById('warmup-status').style.color = "var(--rojo)";
            const clock = document.getElementById('warmup-clock');
            clock.style.display = "block";
            let rem = pausaSeg;
            clock.innerText = rem;
            document.getElementById('warmup-ej').innerText = "Recuperate antes de la siguiente serie";

            warmupSeriesIntervals[idx] = setInterval(function() {
                rem--;
                clock.innerText = rem;
                if (rem <= 3 && rem > 0) beep(400);
                if (rem <= 0) {
                    clearInterval(warmupSeriesIntervals[idx]);
                    beep(800);
                    btn.innerText = "SERIE " + (idx + 1) + " COMPLETADA";
                    btn.style.background = "#27ae60";
                    clock.innerText = "--";
                    document.getElementById('warmup-ej').innerText = "";
                    // Verificar si hay mas series
                    const nextIdx = idx + 1;
                    if (nextIdx < totalSeries) {
                        document.getElementById('warmup-status').innerText = "LISTA PARA SERIE " + (nextIdx + 1) + "/" + totalSeries;
                        document.getElementById('warmup-status').style.color = "var(--verde)";
                    } else {
                        document.getElementById('warmup-status').innerText = "CALENTAMIENTO LISTO!";
                        document.getElementById('warmup-status').style.color = "var(--azul)";
                    }
                }
            }, 1000);
        }

        // ─── RENDER PRINCIPAL ───
        function render(data) {
            renderWarmup(data);

            document.getElementById('sec-emom-ui').style.display = "none";
            document.getElementById('sec-timer-ui').style.display = "none";

            const pLista = document.getElementById('principal-lista');
            const pTitulo = document.getElementById('principal-titulo');
            pLista.innerHTML = '';

            const ejerciciosPrincipales = data.rutina || data.datos || [];

            if (data.tipo === "Series") renderSeries(data, pTitulo, pLista, ejerciciosPrincipales);
            else if (data.tipo === "Circuito") renderCircuito(data, pTitulo, pLista, ejerciciosPrincipales);
            else if (data.tipo === "Tabata") renderTabata(data, pTitulo, pLista, ejerciciosPrincipales);
            else if (data.tipo === "Circuito por Tiempo") renderCircuitoTiempo(data, pTitulo, pLista, ejerciciosPrincipales);
            else if (data.tipo === "EMOM") renderEmom(data, pTitulo, pLista);
            else if (data.tipo === "MIX") renderMix(data, pTitulo, pLista);
            else {
                pTitulo.innerText = "ENTRENAMIENTO";
                ejerciciosPrincipales.forEach(function(ej) {
                    const n = Array.isArray(ej) ? ej[0] : (ej.nombre || "");
                    const l = Array.isArray(ej) ? ej[1] : (ej.link || "");
                    pLista.innerHTML += crearCard(n, l, "");
                });
            }
        }

        // ─── MODO SERIES ───
        function renderSeries(data, pTitulo, pLista, ejercicios) {
            pTitulo.innerText = "MODO SERIES";
            ejercicios.forEach(function(ej, i) {
                const pausa = calcularPausa(ej.reps);
                seriesRestantes[i] = parseInt(ej.series);
                pLista.innerHTML += '<div class="serie-card">' +

                    '<b style="font-size:1.2rem;">' + ej.nombre + '</b>' +

                    '</div><div class="serie-meta">' +
                    '<div>SERIES: <b id="s-val-' + i + '">' + ej.series + '</b></div>' +

        // ─── MODO CIRCUITO ───
        function renderCircuito(data, pTitulo, pLista, ejercicios) {
            pTitulo.innerText = "MODO CIRCUITO";
            const vBloque = data.vueltas_bloque || 3;
            const pausaVuelta = data.pausa_vuelta || 60;

            // FIX: contador de vueltas con descuento
            let vRestantes = vBloque;
            const vContId = 'circ-vueltas-counter';
            if (pausaVuelta > 0) {
                pLista.innerHTML += '<div style="background:#1a2537; border:1px solid var(--naranja); border-radius:12px; padding:12px 18px; margin-bottom:16px; color:var(--naranja); font-weight:bold;">PAUSA ENTRE VUELTAS: ' + pausaVuelta + 's</div>';
            }
            pLista.innerHTML += '<div id="' + vContId + '" style="text-align:center; font-size:1.5rem; font-weight:900; color:var(--amarillo); padding:12px; background:#1a2537; border-radius:12px; margin-bottom:12px;">Vueltas restantes: ' + vRestantes + '</div>';
            ejercicios.forEach(function(b, bIdx) {
                pLista.innerHTML += '<div style="background:var(--purpura); color:white; padding:12px; border-radius:12px; margin-top:20px; display:flex; justify-content:space-between; align-items:center;"><b>CIRCUITO ' + (bIdx + 1) + ' (' + vBloque + ' VUELTAS)</b></div>';
                b.ejercicios.forEach(function(ej) {
                    pLista.innerHTML += crearCard(ej.nombre, ej.link, ej.reps + " REPS");
                });
            });
            // Botón vuelta completada con descuento
            pLista.innerHTML += '<div style="margin-top:16px; text-align:center;">' +
                '<button id="circ-btn-vuelta" class="btn-rest" onclick="marcarVueltaCircuito(' + pausaVuelta + ',\'' + vContId + '\',' + vBloque + ')" style="max-width:400px; margin:0 auto;">✅ VUELTA COMPLETADA</button>' +
                '</div>';
        }

        let circVueltasRestantes = 0;

        function marcarVueltaCircuito(pausaVuelta, contId, totalVueltas) {
            if (circVueltasRestantes === 0) circVueltasRestantes = totalVueltas;
            if (circVueltasRestantes <= 0) return;
            circVueltasRestantes--;
            const el = document.getElementById(contId);
            if (el) el.innerText = circVueltasRestantes > 0 ?
                'Vueltas restantes: ' + circVueltasRestantes :
                '🏆 ¡CIRCUITO COMPLETO!';
            if (circVueltasRestantes <= 0) {
                const btn = document.getElementById('circ-btn-vuelta');
                if (btn) {
                    btn.disabled = true;
                    btn.innerText = "COMPLETADO";
                    btn.style.background = "#27ae60";
                }
                return;
            }
            if (pausaVuelta > 0) {
                iniciarDescansoCircuito(pausaVuelta);
            }
        }

        // ─── MODO CIRCUITO POR TIEMPO ───
        // FIX: pasar nombre y video_url en el array de ejercicios; usar tiempo del bloque para el timer
        function renderCircuitoTiempo(data, pTitulo, pLista, ejercicios) {
            pTitulo.innerText = "CIRCUITO POR TIEMPO";

            // Si los ejercicios vienen en formato de bloques (con tiempo_min)
            const tieneBloques = ejercicios.length > 0 && ejercicios[0] && ejercicios[0].ejercicios;

            if (tieneBloques) {
                // Formato de bloques: cada elemento es un bloque con ejercicios y tiempo_min
                ejercicios.forEach(function(bloque, bIdx) {
                    const tiempoMin = bloque.tiempo_min || 5;
                    const tiempoSeg = tiempoMin * 60;
                    const timerId = 'ct-timer-' + bIdx;
                    const btnId = 'ct-btn-' + bIdx;

                    let html = '<div style="background:#0f172a; border:2px solid #1a8bc0; border-radius:16px; padding:18px; margin-bottom:20px;">' +
                        '<div style="color:#1a8bc0; font-size:1.1rem; font-weight:900; margin-bottom:10px;">BLOQUE #' + (bloque.id || (bIdx + 1)) + ' — ' + tiempoMin + ' MINUTOS</div>';
                    (bloque.ejercicios || []).forEach(function(ej) {
                        // FIX: mostrar nombre y video correctamente
                        const nombre = ej.nombre || ej[0] || "";
                        const link = ej.link || ej[1] || "";
                        const reps = ej.reps || ej[2] || "";
                        html += crearCard(nombre, link, reps ? reps + " REPS" : "");
                    });
                    html += '<div id="' + timerId + '" style="font-size:3rem; font-family:Impact; color:var(--amarillo); text-align:center; margin:10px 0;">' + tiempoMin + ':00</div>' +
                        '<button id="' + btnId + '" class="btn-rest" onclick="iniciarBloqueTiempoConDescuento(\'' + timerId + '\',\'' + btnId + '\',' + tiempoSeg + ')">▶ INICIAR BLOQUE</button>' +
                        '</div>';
                    pLista.innerHTML += html;
                });
            } else {
                // Formato plano: lista de ejercicios con timer global
                // FIX: usar el tiempo configurado desde dataGlobal, no el default de Tabata
                const tiempoConfig = (dataGlobal && dataGlobal.config && dataGlobal.config.trabajo) ?
                    null // Es Tabata, no aplica aqui
                    :
                    null;

                document.getElementById('sec-timer-ui').style.display = "block";
                const btnPausa = document.getElementById('btnPausaTimer');
                if (btnPausa) btnPausa.style.display = "block";

                ejercicios.forEach(function(ej, i) {
                    // FIX: soportar tanto array como objeto para incluir nombre y video
                    const n = Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio || "");
                    const l = Array.isArray(ej) ? ej[1] : (ej.link || "");
                    const r = Array.isArray(ej) ? (ej[2] || "") : (ej.reps || "");
                    pLista.innerHTML += crearCard(n, l, r ? r + " REPS" : "TIEMPO");
                });

                // FIX: establecer config de tiempo para Circuito por Tiempo (no Tabata)
                // Si dataGlobal no tiene config.trabajo/pausa, usar valores del bloque de tiempo
                if (dataGlobal && (!dataGlobal.config || !dataGlobal.config.trabajo)) {
                    const tiempoMin = (dataGlobal.datos && dataGlobal.datos[0] && dataGlobal.datos[0].tiempo_min) ||
                        (dataGlobal.config && dataGlobal.config.duracion_bloque) ||
                        5;
                    dataGlobal.config = dataGlobal.config || {};
                    dataGlobal.config.trabajo = tiempoMin * 60;
                    dataGlobal.config.pausa = 0;
                    dataGlobal.config.rondas = 1;
                    dataGlobal.config.pausa_entre_rondas = 0;
                }
            }
        }

            document.getElementById('sec-timer-ui').style.display = "block";

                const l = Array.isArray(ej) ? ej[1] : (ej.link || "");

        // ─── MODO EMOM ───
        function renderEmom(data, pTitulo, pLista) {
            pTitulo.innerText = "MODO EMOM";
            document.getElementById('sec-emom-ui').style.display = "block";
            const minutos = data.minutos_totales || 10;
            const ejsPorMin = data.ejercicios_por_minuto || 1;
            const repsDict = data.reps_por_ejercicio || {};

            rutina.forEach(function(ej, i) {
                const n = Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio);
                const l = Array.isArray(ej) ? ej[1] : (ej.link || "");
                const reps = repsDict[n] || "";
                pLista.innerHTML += crearCard(n, l, reps ? reps + " REPS" : "EMOM");

            document.getElementById('emom-minuto').innerText = "0 de " + minutos + " minutos";
            document.getElementById('btnStartEmom').style.display = "inline-block";

        // ─── MODO MIX ───
        // Variable global para almacenar los bloques del Mix y acceder desde iniciarTabataMixEnUI e iniciarEmomMix
        var bloquesMix = [];

        function renderMix(data, pTitulo, pLista) {
            pTitulo.innerText = "MODO MIX";

            // Nuevo formato: bloques[]
            const bloques = data.bloques || [];

            // Guardar en variable global para que iniciarTabataMixEnUI e iniciarEmomMix puedan leerlos por indice
            bloquesMix = bloques;

            if (bloques.length > 0) {
                bloques.forEach(function(bloque, idx) {
                    renderBloqueMix(pLista, bloque, idx + 1);
                });
                return;
            }

            // Fallback: formato antiguo (campos separados)
            const modos = data.modos_seleccionados || [];

            if (data.circuito && data.circuito.length > 0 && modos.indexOf("circuito") !== -1) {
                const vueltas = data.circuito_vueltas || 3;
                const pausaV = data.pausa_vuelta || 0;
                let html = '<div class="mix-seccion" style="border-color:#2980b9;"><div class="mix-seccion-titulo" style="color:#2980b9;">CIRCUITO POR VUELTAS (' + vueltas + ' vueltas)</div>' + (pausaV > 0 ? '<div style="color:var(--naranja); font-size:0.9rem; margin-bottom:10px;">Pausa entre vueltas: ' + pausaV + 's</div>' : '');
                data.circuito.forEach(function(b) {
                    html += '<div style="color:#5dade2; font-weight:bold; margin-top:10px; margin-bottom:4px;">Bloque #' + b.id + '</div>';
                    b.ejercicios.forEach(function(ej) {
                        html += crearCard(ej.nombre, ej.link, ej.reps + " REPS");
                    });
                });
                html += '<div style="margin-top:12px;" id="mix-old-circ-cont"><div id="mix-old-circ-vcount" style="color:var(--amarillo); font-weight:900; text-align:center; margin-bottom:8px;">Vueltas restantes: ' + vueltas + '</div>';
                if (pausaV > 0) html += '<button class="btn-rest" onclick="marcarVueltaMixOld(\'mix-old-circ-vcount\',' + pausaV + ',' + vueltas + ')">✅ VUELTA COMPLETADA</button>';
                html += '</div></div>';
                pLista.innerHTML += html;
            }

            if (data.circuito_tiempo && data.circuito_tiempo.length > 0 && modos.indexOf("circ_tiempo") !== -1) {
                let html = '<div class="mix-seccion" style="border-color:#1a8bc0;"><div class="mix-seccion-titulo" style="color:#1a8bc0;">CIRCUITO POR TIEMPO</div>';
                data.circuito_tiempo.forEach(function(b, bIdx) {
                    const tiempo = b.tiempo_min || 5;
                    const timerIdVal = "mix-ct-" + bIdx;
                    const btnIdVal = "mix-ct-btn-" + bIdx;
                    html += '<div style="background:#0f172a; border-radius:12px; padding:12px; margin-bottom:12px;"><div style="color:#5dade2; font-weight:bold; margin-bottom:8px;">Bloque #' + b.id + ' — ' + tiempo + ' min</div>';
                    b.ejercicios.forEach(function(ej) {
                        html += crearCard(ej.nombre, ej.link, ej.reps + " REPS");
                    });
                    html += '<div id="' + timerIdVal + '" style="font-size:2.5rem; font-family:Impact; color:var(--amarillo); text-align:center; margin:8px 0;">' + tiempo + ':00</div><button id="' + btnIdVal + '" class="btn-rest" onclick="iniciarBloqueTiempoConDescuento(\'' + timerIdVal + '\',\'' + btnIdVal + '\',' + (tiempo * 60) + ')">INICIAR BLOQUE</button></div>';
                });
                html += '</div>';
                pLista.innerHTML += html;
            }

            if (data.tabata && data.tabata.length > 0 && modos.indexOf("tabata") !== -1) {
                const tc = data.tabata_config || {
                    trabajo: 20,
                    pausa: 10,
                    rondas: 1,
                    cantidad: 8,
                    pausa_entre_rondas: 0
                };
                pLista.innerHTML += renderTabataMixInline(data.tabata, tc, "mix-tab");
            }

            if (data.emom && data.emom.length > 0 && modos.indexOf("emom") !== -1) {
                const ec = data.emom_config || {
                    minutos_totales: 10,
                    ejercicios_por_minuto: 1
                };
                pLista.innerHTML += renderEmomMixInline(data.emom, ec, data.reps_por_ejercicio || {}, "mix-emom");
            }

            if (data.series && data.series.length > 0 && modos.indexOf("series") !== -1) {
                renderSeriesMixInline(pLista, data.series, 9000);
            }
        }

        // Helper para modo antiguo circuito mix (vuelta con descuento)
        const mixOldCircVueltas = {};

        function marcarVueltaMixOld(contId, pausaVuelta, totalVueltas) {
            if (!mixOldCircVueltas[contId]) mixOldCircVueltas[contId] = totalVueltas;
            if (mixOldCircVueltas[contId] <= 0) return;
            mixOldCircVueltas[contId]--;
            const el = document.getElementById(contId);
            if (el) el.innerText = mixOldCircVueltas[contId] > 0 ?

        // ─── SERIES TIMER ───
        function marcarSerie(idx, time) {
            if (seriesRestantes[idx] <= 0) return;
            seriesRestantes[idx]--;
            document.getElementById("s-val-" + idx).innerText = seriesRestantes[idx];
            const btn = document.getElementById("btn-" + idx);
            const clock = document.getElementById("timer-" + idx);
            btn.disabled = true;
            btn.classList.add('active');
            btn.innerText = "DESCANSO...";
            clock.style.display = "block";
            let rem = time;
            clock.innerText = rem;
            restIntervals[idx] = setInterval(function() {
                rem--;
                clock.innerText = rem;
                if (rem <= 3 && rem > 0) beep(400);
                if (rem <= 0) {
                    clearInterval(restIntervals[idx]);
                    beep(800);
                    btn.disabled = false;
                    btn.classList.remove('active');
                    btn.innerText = seriesRestantes[idx] > 0 ? "MARCAR SERIE" : "COMPLETADO!";
                    clock.style.display = "none";
                }
            }, 1000);
        }

            overlay.style.display = "flex";
            clearInterval(dInterval);
            let rem = dur;
            clock.innerText = rem;
            dInterval = setInterval(function() {
                rem--;
                clock.innerText = rem;
                if (rem <= 3 && rem > 0) beep(400);
                if (rem <= 0) cerrarDescansoCircuito();
            }, 1000);
        }

            clearInterval(dInterval);

        function siguienteFase() {
            const config = dataGlobal.config || {
                trabajo: 30,
                pausa: 15,
                rondas: 3,
                pausa_entre_rondas: 0
            };
            const lista = dataGlobal.rutina || dataGlobal.datos || [];
            const pausaEntreRondas = config.pausa_entre_rondas || 0;
            if (tFase === "prep") {
                tFase = "work";
                tSegs = config.trabajo;
            } else if (tFase === "work") {
                if (config.pausa && config.pausa > 0) {
                    tFase = "rest";
                    tSegs = config.pausa;
                } else {
                    // Circuito por Tiempo sin pausa: ir al siguiente ejercicio directamente
                    tIdx++;
                    if (tIdx >= lista.length) {
                        tIdx = 0;
                        tRonda++;
                    }
                    if (tRonda > config.rondas) {
                        clearInterval(tInterval);
                        timerActivo = false;
                        document.getElementById('t-status').innerText = (dataGlobal && (dataGlobal.tipo === "Tabata" || (dataGlobal.config && dataGlobal.config.pausa > 0))) ? "TABATA REALIZADO CON EXITO" : "COMPLETO!";
                        document.getElementById('t-status').style.color = "var(--amarillo)";
                        document.getElementById('t-ejercicio-nombre').innerText = "Excelente trabajo!";
                        document.getElementById('t-ej-restantes').innerText = "";
                        document.getElementById('next-ej-container').style.display = "none";
                        const btnPausa2 = document.getElementById('btnPausaTimer');
                        if (btnPausa2) btnPausa2.style.display = "none";
                        // Si estamos en Modo Mix, volver automaticamente a la lista
                        if (dataGlobal && dataGlobal.tipo === "MIX") {
                            setTimeout(function() {
                                salirDelTimer();
                            }, 2500);
                        }
                        return;
                    }
                    tFase = "work";
                    tSegs = config.trabajo;
                }
            } else {
                tIdx++;
                if (tIdx >= lista.length) {
                    tIdx = 0;
                    tRonda++;
                    if (pausaEntreRondas > 0 && tRonda <= config.rondas) {
                        clearInterval(tInterval);
                        mostrarPausaRonda(pausaEntreRondas, tRonda, config.rondas, function() {
                            tInterval = setInterval(function() {
                                if (tSegs <= 3 && tSegs > 0) beep(400);
                                if (tSegs <= 0) {
                                    beep(800);
                                    siguienteFase();
                                } else tSegs--;
                                actualizarUITimer();
                            }, 1000);
                        });
                        return;
                    }
                }
                if (tRonda > config.rondas) {
                    clearInterval(tInterval);
                    timerActivo = false;
                    document.getElementById('t-status').innerText = (dataGlobal && (dataGlobal.tipo === "Tabata" || (dataGlobal.config && dataGlobal.config.pausa > 0))) ? "TABATA REALIZADO CON EXITO" : "COMPLETO!";
                    document.getElementById('t-status').style.color = "var(--amarillo)";
                    document.getElementById('t-ejercicio-nombre').innerText = "Excelente trabajo!";
                    document.getElementById('t-ej-restantes').innerText = "";
                    document.getElementById('next-ej-container').style.display = "none";
                    const btnPausa = document.getElementById('btnPausaTimer');
                    if (btnPausa) btnPausa.style.display = "none";
                    // Si estamos en Modo Mix, volver automaticamente a la lista
                    if (dataGlobal && dataGlobal.tipo === "MIX") {
                        setTimeout(function() {
                            salirDelTimer();
                        }, 2500);
                    }
                    return;
                }
                tFase = "work";
                tSegs = config.trabajo;
            }
        }

        function mostrarPausaRonda(duracion, siguienteRonda, totalRondas, callback) {
            tPausaRondaResolve = callback;
            document.getElementById('pausa-ronda-info').innerText = "Siguiente: RONDA " + siguienteRonda + " de " + totalRondas;
            document.getElementById('overlay-pausa-ronda').style.display = "flex";
            clearInterval(pausaRondaInterval);
            let rem = duracion;
            document.getElementById('pausa-ronda-clock').innerText = rem;
            pausaRondaInterval = setInterval(function() {
                rem--;
                document.getElementById('pausa-ronda-clock').innerText = rem;
                if (rem <= 3 && rem > 0) beep(400);
                if (rem <= 0) salterPausaRonda();
            }, 1000);
        }

        function salterPausaRonda() {
            clearInterval(pausaRondaInterval);
            beep(800);
            document.getElementById('overlay-pausa-ronda').style.display = "none";
            if (tPausaRondaResolve) {
                const cb = tPausaRondaResolve;
                tPausaRondaResolve = null;
                cb();
            }
        }

        function actualizarUITimer() {
            const clock = document.getElementById('clock');
            const status = document.getElementById('t-status');
            const ejNombre = document.getElementById('t-ejercicio-nombre');
            const ejRest = document.getElementById('t-ej-restantes');
            const ej = document.getElementById('t-ejercicio');
            const next = document.getElementById('next-ej-name');
            const lista = dataGlobal.rutina || dataGlobal.datos || [];
            const config = dataGlobal.config || {
                trabajo: 30,
                pausa: 15,
                rondas: 3,
                pausa_entre_rondas: 0
            };
            const totalEjs = lista.length;
            clock.innerText = tSegs < 10 ? "0" + tSegs : tSegs;
            if (tFase === "prep") {
                status.innerText = "PREPARATE!";
                status.style.color = "var(--amarillo)";
                clock.style.color = "var(--amarillo)";
                ejNombre.innerText = "";
                ejRest.innerText = "";
                ej.innerText = "Preparate para el primer ejercicio";
            } else if (tFase === "work") {
                status.innerText = "RONDA " + tRonda + " / " + config.rondas + " — TRABAJO";
                status.style.color = "var(--verde)";
                clock.style.color = "var(--verde)";
                const item = lista[tIdx % totalEjs];
                // FIX: soportar array [nombre, link] y objeto {nombre, link}
                const nombre = Array.isArray(item) ? item[0] : (item.nombre || item.ejercicio || "");
                ejNombre.innerText = nombre;
                const ejsRestantes = totalEjs - (tIdx % totalEjs) - 1;
                ejRest.innerText = ejsRestantes > 0 ? "Quedan " + ejsRestantes + " ejercicio(s) en esta ronda" : "Ultimo ejercicio de la ronda";
                ej.innerText = "Ejercicio " + ((tIdx % totalEjs) + 1) + " de " + totalEjs;
            } else if (tFase === "rest") {
                status.innerText = "DESCANSO";
                status.style.color = "var(--rojo)";
                clock.style.color = "var(--rojo)";
                ejNombre.innerText = "Respira...";
                ejRest.innerText = "";
                ej.innerText = "";
                let ni = tIdx + 1,
                    nr = tRonda;
                if (ni >= totalEjs) {
                    ni = 0;
                    nr++;
                }
                if (nr <= config.rondas) {
                    const nItem = lista[ni % totalEjs];
                    // FIX: soportar array y objeto
                    next.innerText = Array.isArray(nItem) ? nItem[0] : (nItem.nombre || nItem.ejercicio || "");
                    document.getElementById('next-ej-container').style.display = "block";
                } else {
                    document.getElementById('next-ej-container').style.display = "none";
                }
            }
        }

        // ─── EMOM STANDALONE ───
        function iniciarEmom() {
            if (emomRunning) return;
            emomRunning = true;
            document.getElementById('btnStartEmom').style.display = "none";
            const minutos = dataGlobal.minutos_totales || 10;
            emomMinActual = 0;
            correrEmomMin(minutos);
        }

        function correrEmomMin(totalMin) {
            if (emomMinActual >= totalMin) {
                document.getElementById('emom-status').innerText = "EMOM COMPLETO!";
                document.getElementById('emom-status').style.color = "var(--amarillo)";
                document.getElementById('emom-minuto').innerText = "Excelente trabajo!";
                emomRunning = false;
                return;
            }
            document.getElementById('emom-status').innerText = "TRABAJA!";
            document.getElementById('emom-status').style.color = "var(--verde)";
            document.getElementById('emom-minuto').innerText = "Minuto " + (emomMinActual + 1) + " de " + totalMin;
            let rem = 60;
            document.getElementById('emom-clock').innerText = rem;
            clearInterval(emomInterval);
            emomInterval = setInterval(function() {
                rem--;
                document.getElementById('emom-clock').innerText = rem;
                if (rem <= 3 && rem > 0) beep(400);
                if (rem <= 0) {
                    clearInterval(emomInterval);
                    beep(800);
                    emomMinActual++;
                    correrEmomMin(totalMin);
                }
            }, 1000);
        }

        // ─── BLOQUE TIEMPO ───
        function iniciarBloqueTiempo(timerId, btnId, totalSec) {
            const btn = document.getElementById(btnId),
                timerEl = document.getElementById(timerId);
            if (bloqueTiempoIntervals[btnId]) return;
            btn.disabled = true;
            btn.innerText = "EN CURSO...";
            let rem = totalSec;
            bloqueTiempoIntervals[btnId] = setInterval(function() {
                rem--;
                const m = Math.floor(rem / 60),
                    s = rem % 60;
                timerEl.innerText = (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
                if (rem <= 0) {
                    clearInterval(bloqueTiempoIntervals[btnId]);
                    delete bloqueTiempoIntervals[btnId];
                    beep(800);
                    timerEl.innerText = "TIEMPO!";
                    btn.disabled = false;
                    btn.innerText = "REINICIAR BLOQUE";
                }
            }, 1000);
        }

        // FIX: Bloque tiempo con pausa y descuento de vuelta al completar
        const bloquePausados = {};

        function iniciarBloqueTiempoConDescuento(timerId, btnId, totalSec) {
            const btn = document.getElementById(btnId),
                timerEl = document.getElementById(timerId);
            if (bloqueTiempoIntervals[btnId]) {
                // Si ya corre, actuar como PAUSA
                if (!bloquePausados[btnId]) {
                    bloquePausados[btnId] = true;
                    clearInterval(bloqueTiempoIntervals[btnId]);
                    bloqueTiempoIntervals[btnId] = null;
                    btn.innerText = "▶ REANUDAR";
                    btn.style.background = "#8e44ad";
                } else {
                    // Reanudar
                    bloquePausados[btnId] = false;
                    btn.innerText = "⏸ PAUSAR";
                    btn.style.background = "#7f8c8d";
                    _correrBloqueTiempo(timerId, btnId, bloqueTiempoIntervals['rem_' + btnId] || 0);
                }
                return;
            }
            bloquePausados[btnId] = false;
            btn.style.background = "#7f8c8d";
            btn.innerText = "⏸ PAUSAR";
            _correrBloqueTiempo(timerId, btnId, totalSec);
        }

        function _correrBloqueTiempo(timerId, btnId, totalSec) {
            const btn = document.getElementById(btnId),
                timerEl = document.getElementById(timerId);
            let rem = totalSec;
            bloqueTiempoIntervals[btnId] = setInterval(function() {
                rem--;
                bloqueTiempoIntervals['rem_' + btnId] = rem;
                const m = Math.floor(rem / 60),
                    s = rem % 60;
                timerEl.innerText = (m < 10 ? "0" + m : m) + ":" + (s < 10 ? "0" + s : s);
                if (rem <= 0) {
                    clearInterval(bloqueTiempoIntervals[btnId]);
                    delete bloqueTiempoIntervals[btnId];
                    delete bloqueTiempoIntervals['rem_' + btnId];
                    beep(800);
                    timerEl.innerText = "TIEMPO!";
                    btn.disabled = false;
                    btn.style.background = "#27ae60";
                    btn.innerText = "REINICIAR BLOQUE";
                }
            }, 1000);
        }

        // ─── TABATA BLOQUE MIX con PAUSA ───
        const tabataMixPausados = {};
        const tabataMixCallbacks = {};

        function togglePausaTabataMix(pausaId, btnId) {
            const btn = document.getElementById(pausaId);
            if (!tabataMixPausados[btnId]) {
                tabataMixPausados[btnId] = true;
                if (btn) btn.innerText = "▶ REANUDAR";
            } else {
                tabataMixPausados[btnId] = false;
                if (btn) btn.innerText = "⏸ PAUSAR";
            }
        }

        function iniciarTabataBloque(btnId, statusId, ejId, infoId, timerId, tc, rutina) {
            const btn = document.getElementById(btnId);
            if (btn.dataset.running === "1") return;
            btn.dataset.running = "1";
            btn.disabled = true;
            btn.innerText = "EN CURSO...";

            // FIX: mostrar boton de pausa
            const pausaBtn = document.getElementById(btnId.replace('-btn', '-pausa'));
            if (pausaBtn) pausaBtn.style.display = "block";
            tabataMixPausados[btnId] = false;

            const totalEjs = rutina.length;
            const totalRondas = tc.rondas || 1;
            const pausaR = tc.pausa_entre_rondas || 0;
            const cant = tc.cantidad || 8;
            let r = 0,
                ejIdx = 0;

            function countdownMix(segundos, timerId, callback) {
                let rem = segundos;
                document.getElementById(timerId).innerText = rem < 10 ? "0" + rem : rem;
                const iv = setInterval(function() {
                    // Soporte de pausa
                    if (tabataMixPausados[btnId]) return;
                    rem--;
                    document.getElementById(timerId).innerText = rem < 10 ? "0" + rem : rem;
                    if (rem <= 0) {
                        clearInterval(iv);
                        beep(800);
                        callback();
                    }
                }, 1000);
            }

            function siguiente() {
                if (r >= totalRondas) {
                    document.getElementById(statusId).innerText = "TABATA COMPLETO!";
                    document.getElementById(statusId).style.color = "var(--amarillo)";
                    document.getElementById(ejId).innerText = "";
                    btn.dataset.running = "0";
                    btn.disabled = false;
                    btn.innerText = "REINICIAR";
                    if (pausaBtn) pausaBtn.style.display = "none";
                    return;
                }
                if (ejIdx >= cant) {
                    ejIdx = 0;
                    r++;
                    if (pausaR > 0 && r < totalRondas) {
                        document.getElementById(statusId).innerText = "PAUSA ENTRE RONDAS";
                        document.getElementById(statusId).style.color = "var(--purpura)";
                        countdownMix(pausaR, timerId, siguiente);
                        return;
                    }
                    siguiente();
                    return;
                }
                const item = rutina[ejIdx % totalEjs];
                // FIX: nombre desde array o objeto
                const nombre = Array.isArray(item) ? item[0] : (item.nombre || item);
                document.getElementById(statusId).innerText = "RONDA " + (r + 1) + "/" + totalRondas + " — TRABAJO";
                document.getElementById(statusId).style.color = "var(--verde)";
                document.getElementById(ejId).innerText = nombre;
                document.getElementById(infoId).innerText = "Ej " + ((ejIdx % totalEjs) + 1) + "/" + totalEjs + " — Serie " + (ejIdx + 1) + "/" + cant;
                countdownMix(tc.trabajo || 20, timerId, function() {
                    document.getElementById(statusId).innerText = "DESCANSO";
                    document.getElementById(statusId).style.color = "var(--rojo)";
                    document.getElementById(ejId).innerText = "Respira...";
                    countdownMix(tc.pausa || 10, timerId, function() {
                        ejIdx++;
                        siguiente();
                    });
                });
            }
            siguiente();
        }

        // ─── EMOM BLOQUE MIX ───
        function iniciarEmomBloque(btnId, statusId, roundId, clockId, totalMin) {
            const btn = document.getElementById(btnId);
            if (btn.dataset.running === "1") return;
            btn.dataset.running = "1";
            btn.disabled = true;
            btn.innerText = "EN CURSO...";
            let minActual = 0;

            function sig() {
                if (minActual >= totalMin) {
                    document.getElementById(statusId).innerText = "EMOM COMPLETO!";
                    document.getElementById(roundId).innerText = "";
                    btn.dataset.running = "0";
                    btn.disabled = false;
                    btn.innerText = "REINICIAR";
                    return;
                }
                document.getElementById(statusId).innerText = "TRABAJA!";
                document.getElementById(statusId).style.color = "var(--verde)";
                document.getElementById(roundId).innerText = "Minuto " + (minActual + 1) + " de " + totalMin;
                let rem = 60;
                document.getElementById(clockId).innerText = rem;
                const iv = setInterval(function() {
                    rem--;
                    document.getElementById(clockId).innerText = rem;
                    if (rem <= 3 && rem > 0) beep(400);
                    if (rem <= 0) {
                        clearInterval(iv);
                        beep(800);
                        minActual++;
                        sig();
                    }
                }, 1000);
            }
            sig();
        }

        // ─── INICIO POR INDICE DE BLOQUE MIX ───
        // iniciarTabataMixEnUI(i): lee bloquesMix[i] y activa la UI unificada de Tabata
        function iniciarTabataMixEnUI(i) {
            var bloque = bloquesMix[i];
            if (!bloque) {
                console.error('bloquesMix[' + i + '] no encontrado');
                return;
            }
            var tc = {
                trabajo: bloque.trabajo || 20,
                pausa: bloque.pausa || 10,
                rondas: bloque.rondas || 1,
                cantidad: bloque.cantidad || 8,
                pausa_entre_rondas: bloque.pausa_entre_rondas || 0
            };
            var rutina = bloque.rutina || [];
            var uid = 'blq-' + (i + 1);
            activarTabataMixEnUI(tc, rutina, uid);
        }

        // iniciarEmomMix(i, btnId, statusId, roundId, clockId): lee bloquesMix[i] y corre el timer EMOM
        function iniciarEmomMix(i, btnId, statusId, roundId, clockId) {
            var bloque = bloquesMix[i];
            if (!bloque) {
                console.error('bloquesMix[' + i + '] no encontrado');
                return;
            }
            var totalMin = bloque.minutos_totales || 10;
            iniciarEmomBloque(btnId, statusId, roundId, clockId, totalMin);
        }

        // ─── SALIR DEL TIMER (Volver a Rutina Mix) ───
        function salirDelTimer() {
            clearInterval(tInterval);
            clearInterval(pausaRondaInterval);
            timerActivo = false;
            timerPausado = false;
            // Cerrar overlay de pausa de ronda si estuviera visible
            document.getElementById('overlay-pausa-ronda').style.display = 'none';
            // Ocultar el timer y volver a mostrar la lista de rutina
            document.getElementById('sec-timer-ui').style.display = 'none';
            var secLista = document.getElementById('sec-rutina-lista');
            if (secLista) secLista.style.display = 'block';
            // Hacer scroll al principio de la lista
            if (secLista) secLista.scrollIntoView({
                behavior: 'smooth',
                block: 'start'
            });
        }

        function cerrar() {
            // Restaurar visibilidad de la lista de rutina
            var secLista = document.getElementById('sec-rutina-lista');
            if (secLista) secLista.style.display = 'block';
            clearInterval(tInterval);
            clearInterval(dInterval);
            clearInterval(emomInterval);
            clearInterval(pausaRondaInterval);
            clearInterval(warmupTabInterval);
            clearInterval(warmupEmomInterval);
            Object.values(restIntervals).forEach(clearInterval);
            Object.values(bloqueTiempoIntervals).forEach(function(v) {
                if (typeof v === 'number') clearInterval(v);
            });
            document.getElementById('rutina-modal').style.display = "none";
            document.getElementById('overlay-descanso').style.display = "none";
            document.getElementById('overlay-pausa-ronda').style.display = "none";
            emomRunning = false;
            warmupRunning = false;
            timerPausado = false;
            timerActivo = false;
            restIntervals = {};
            bloqueTiempoIntervals = {};
            seriesRestantes = {};
            circVueltasRestantes = 0;
        }
    </script>
