<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PONETE FIT | Full Training Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&family=Roboto+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
         :root {
            --naranja: #FF6B35;
            --naranja-glow: rgba(255, 107, 53, 0.4);
            --azul: #4FC3F7;
            --azul-glow: rgba(79, 195, 247, 0.35);
            --verde: #69F0AE;
            --verde-glow: rgba(105, 240, 174, 0.4);
            --rojo: #EF5350;
            --rojo-glow: rgba(239, 83, 80, 0.4);
            --amarillo: #FFD54F;
            --amarillo-glow: rgba(255, 213, 79, 0.35);
            --purpura: #CE93D8;
            --purpura-glow: rgba(206, 147, 216, 0.35);
            --fondo: #0a0a0c;
            --fondo-alt: #0f0f13;
            --tarjeta: #141418;
            --tarjeta-alt: #1a1a20;
            --texto: #f0f0f5;
            --texto-suave: #8a8a9a;
            --borde: #2a2a35;
            --borde-sutil: #1e1e28;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100dvh;
            width: 100vw;
            -webkit-overflow-scrolling: touch;
        }
        /* ─── HOME ─── */
        
        .home-screen {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: radial-gradient(ellipse at 50% 30%, #1a1a28 0%, var(--fondo) 70%);
        }
        
        .home-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .home-logo h1 {
            font-family: 'Roboto', sans-serif;
            font-weight: 900;
            font-size: clamp(3rem, 14vw, 5.5rem);
            color: var(--naranja);
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 0 0 40px var(--naranja-glow);
            line-height: 1;
        }
        
        .home-logo h2 {
            font-weight: 300;
            font-size: clamp(1rem, 5vw, 1.8rem);
            color: var(--texto-suave);
            margin: 8px 0 0;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        
        .search-box {
            background: var(--tarjeta);
            padding: 28px 24px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--borde);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
        }
        
        .input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }
        
        .input-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--texto-suave);
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }
        
        input#codigoInput {
            width: 100%;
            padding: 18px 20px;
            border-radius: 14px;
            border: 1.5px solid var(--borde);
            background: var(--fondo-alt);
            color: var(--texto);
            font-size: 1.4rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
            font-family: 'Roboto Mono', monospace;
        }
        
        input#codigoInput:focus {
            border-color: var(--naranja);
            box-shadow: 0 0 0 3px var(--naranja-glow);
        }
        
        input#codigoInput::placeholder {
            color: #3a3a50;
            font-weight: 400;
            letter-spacing: 1px;
            font-size: 1rem;
        }
        
        .btn-principal {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, var(--naranja), #e85500);
            color: white;
            font-weight: 900;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
            box-shadow: 0 8px 24px var(--naranja-glow);
            min-height: 56px;
        }
        
        .btn-principal:active {
            transform: scale(0.97);
            box-shadow: 0 4px 12px var(--naranja-glow);
        }
        /* ─── MODAL ─── */
        
        #rutina-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--fondo);
            z-index: 100;
            overflow: hidden;
            flex-direction: column;
        }
        
        #rutina-modal.visible {
            display: flex;
        }
        
        .header-rutina {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            background: var(--tarjeta);
            border-bottom: 1px solid var(--borde);
            flex-shrink: 0;
            z-index: 1000;
        }
        
        .header-rutina-info {
            display: flex;
            flex-direction: column;
        }
        
        .tipo-tag {
            display: inline-block;
            background: var(--naranja);
            color: white;
            padding: 3px 10px;
            border-radius: 6px;
            font-weight: 900;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }
        
        #id-display {
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Roboto Mono', monospace;
            color: var(--texto-suave);
            margin: 0;
        }
        
        .btn-header {
            background: var(--tarjeta-alt);
            color: var(--texto-suave);
            border: 1px solid var(--borde);
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            min-height: 44px;
            transition: background 0.15s, color 0.15s;
        }
        
        .btn-header:active {
            background: var(--borde);
            color: var(--texto);
        }
        
        .container-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 16px 100px;
            max-width: 700px;
            margin: 0 auto;
            width: 100%;
            -webkit-overflow-scrolling: touch;
        }
        /* ─── CARDS ─── */
        
        .seccion-card {
            background: var(--tarjeta);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--borde);
        }
        
        .seccion-titulo {
            font-size: 0.75rem;
            font-weight: 900;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        
        .card-ejercicio {
            background: var(--fondo-alt);
            margin-bottom: 10px;
            padding: 14px 16px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--borde-sutil);
            gap: 12px;
        }
        
        .card-ejercicio-nombre {
            font-size: 0.9rem;
            font-weight: 700;
            flex: 1;
            line-height: 1.3;
        }
        
        .card-ejercicio-meta {
            font-size: 0.75rem;
            color: var(--amarillo);
            font-weight: 700;
            white-space: nowrap;
        }
        /* Play button for video */
        
        .btn-play-video {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            color: white;
            text-decoration: none;
            flex-shrink: 0;
            transition: background 0.15s, transform 0.15s;
        }
        
        .btn-play-video:active {
            background: rgba(255, 255, 255, 0.14);
            transform: scale(0.9);
        }
        
        .btn-play-video svg {
            width: 14px;
            height: 14px;
            fill: white;
            margin-left: 2px;
        }
        /* ─── TIMER UI ─── */
        
        #timer-box {
            background: var(--tarjeta);
            border-radius: 24px;
            padding: 32px 20px;
            text-align: center;
            border: 1px solid var(--borde);
            margin-top: 16px;
        }
        
        #t-status {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--texto-suave);
            margin-bottom: 4px;
        }
        
        #t-ejercicio-nombre {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--texto);
            min-height: 1.6rem;
            margin-bottom: 4px;
        }
        
        #t-ej-restantes {
            font-size: 0.75rem;
            color: var(--texto-suave);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        #clock {
            font-size: clamp(5rem, 22vw, 9rem);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            color: var(--verde);
            margin: 4px 0 12px;
            line-height: 1;
            text-shadow: 0 0 40px var(--verde-glow);
            transition: color 0.3s, text-shadow 0.3s;
        }
        
        #clock.descanso {
            color: var(--rojo);
            text-shadow: 0 0 40px var(--rojo-glow);
        }
        
        #clock.prep {
            color: var(--amarillo);
            text-shadow: 0 0 40px var(--amarillo-glow);
        }
        /* Progress bar */
        
        .timer-progress-bar {
            width: 100%;
            height: 4px;
            background: var(--borde);
            border-radius: 4px;
            margin: 8px 0 20px;
            overflow: hidden;
        }
        
        .timer-progress-fill {
            height: 100%;
            border-radius: 4px;
            background: var(--verde);
            width: 100%;
            transition: width 1s linear, background 0.3s;
        }
        
        #next-ej-container {
            display: none;
            font-size: 0.75rem;
            color: var(--texto-suave);
            letter-spacing: 1px;
            margin-top: 4px;
            margin-bottom: 12px;
        }
        
        #next-ej-name {
            color: var(--amarillo);
            font-weight: 700;
        }
        /* ─── SERIE CARD ─── */
        
        .serie-card {
            background: var(--tarjeta);
            border-radius: 18px;
            margin-bottom: 14px;
            padding: 18px;
            border: 1px solid var(--borde);
        }
        
        .serie-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .serie-nombre {
            font-size: 1rem;
            font-weight: 700;
            flex: 1;
        }
        
        .serie-meta {
            display: flex;
            gap: 12px;
            background: var(--fondo-alt);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        
        .serie-meta-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .serie-meta-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--texto-suave);
            margin-bottom: 2px;
        }
        
        .serie-meta-value {
            font-size: 1.1rem;
            font-weight: 900;
            color: var(--texto);
        }
        
        .timer-display {
            font-size: 3rem;
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            color: var(--verde);
            display: none;
            margin: 8px 0;
            text-align: center;
            text-shadow: 0 0 30px var(--verde-glow);
        }
        /* ─── BOTONES ─── */
        
        .btn-rest {
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85rem;
            min-height: 52px;
            transition: transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.15s;
        }
        
        .btn-rest:active {
            transform: scale(0.97);
            opacity: 0.85;
        }
        
        .btn-rest.active,
        .btn-rest:disabled {
            background: var(--tarjeta-alt);
            color: var(--texto-suave);
            cursor: not-allowed;
            transform: none;
        }
        /* ─── OVERLAYS ─── */
        
        #overlay-descanso,
        #overlay-pausa-ronda {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 10, 12, 0.96);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 3000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
            animation: overlayIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        #overlay-descanso.visible,
        #overlay-pausa-ronda.visible {
            display: flex;
        }
        
        @keyframes overlayIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .overlay-titulo {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        
        .overlay-clock {
            font-size: clamp(6rem, 28vw, 12rem);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            line-height: 1;
            margin: 8px 0 24px;
        }
        /* ─── EMOM ─── */
        
        .emom-box {
            background: var(--tarjeta);
            border: 1px solid var(--borde);
            border-radius: 20px;
            padding: 28px 20px;
            text-align: center;
            margin-top: 16px;
        }
        
        #emom-status {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--texto-suave);
            margin-bottom: 4px;
        }
        
        #emom-minuto {
            font-size: 0.85rem;
            color: var(--amarillo);
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        .emom-clock {
            font-size: clamp(5rem, 22vw, 9rem);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            color: var(--amarillo);
            line-height: 1;
            text-shadow: 0 0 40px var(--amarillo-glow);
        }
        /* ─── MIX BLOQUES ─── */
        
        .mix-seccion {
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid var(--borde);
            background: var(--tarjeta-alt);
        }
        
        .mix-seccion-titulo {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 14px;
        }
        
        .bloque-mix {
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 20px;
            border: 1px solid var(--borde);
            background: var(--tarjeta-alt);
        }
        
        .bloque-mix-titulo {
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 14px;
        }
        /* ─── TOAST ─── */
        
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--verde);
            color: #000;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 1px;
            z-index: 4000;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
        }
        
        #toast.show {
            transform: translateX(-50%) translateY(0);
        }
        /* ─── WARMUP TIMER ─── */
        
        #warmup-timer-box {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: var(--fondo-alt);
            border-radius: 16px;
            border: 1px solid var(--borde-sutil);
        }
        
        #warmup-status {
            font-size: 0.7rem;
            font-weight: 900;
            color: var(--azul);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        #warmup-ej {
            font-size: 0.9rem;
            color: var(--naranja);
            min-height: 1.2rem;
            margin-bottom: 6px;
            font-weight: 700;
        }
        
        #warmup-clock {
            font-size: clamp(3rem, 16vw, 6rem);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            color: var(--texto);
            line-height: 1;
            margin: 6px 0 16px;
        }
        /* ─── PAUSA BUTTON ─── */
        
        .btn-pausa {
            background: var(--tarjeta-alt);
            color: var(--purpura);
            border: 1px solid var(--purpura);
            padding: 14px 20px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            width: 100%;
            min-height: 48px;
            transition: background 0.15s;
        }
        
        .btn-pausa:active {
            background: rgba(206, 147, 216, 0.12);
        }
        
        .btn-pausa:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }
        /* ─── VUELTAS COUNTER ─── */
        
        #warmup-vueltas-counter {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--amarillo);
            margin: 10px 0;
        }
        /* ─── CIRCUITO CARD ─── */
        
        .circ-bloque-header {
            background: linear-gradient(135deg, #1a2a4a, #0d1a33);
            padding: 12px 16px;
            border-radius: 12px;
            margin: 14px 0 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .circ-bloque-label {
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--azul);
        }
        /* ─── NUMERO CARD (Tabata) ─── */
        
        .card-numero {
            background: var(--fondo-alt);
            margin-bottom: 8px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--borde-sutil);
        }
        
        .card-numero-header {
            background: rgba(255, 107, 53, 0.1);
            padding: 5px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .card-numero-idx {
            font-size: 0.65rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--naranja);
        }
        
        .card-numero-body {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            gap: 10px;
        }
        
        .card-numero-nombre {
            font-size: 0.9rem;
            font-weight: 700;
            flex: 1;
            line-height: 1.3;
        }
        /* ─── INFO BLOCKS ─── */
        
        .info-block {
            background: var(--fondo-alt);
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 14px;
            border: 1px solid var(--borde-sutil);
        }
        
        .info-block-titulo {
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .info-block-subtitulo {
            font-size: 0.8rem;
            color: var(--texto-suave);
        }
        /* ─── SCROLL CONTAINER ─── */
        
        .container-scroll::-webkit-scrollbar {
            width: 0;
        }
        /* Wake Lock indicator */
        
        #wakelock-indicator {
            position: fixed;
            top: 12px;
            right: 12px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--verde);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 9999;
        }
        
        #wakelock-indicator.active {
            opacity: 1;
            box-shadow: 0 0 8px var(--verde-glow);
        }
        /* ─── EMOM BLOQUE INLINE ─── */
        
        .emom-inline-box {
            background: var(--fondo);
            border-radius: 14px;
            padding: 16px;
            margin-top: 14px;
            text-align: center;
            border: 1px solid var(--borde-sutil);
        }
        
        .emom-inline-clock {
            font-size: clamp(3.5rem, 18vw, 7rem);
            font-family: 'Roboto Mono', monospace;
            font-weight: 700;
            color: white;
            line-height: 1;
            margin: 6px 0;
        }
    </style>
</head>

<body>
    <!-- Wake Lock indicator dot -->
    <div id="wakelock-indicator"></div>

    <div id="toast">Rutina cargada</div>

    <!-- Overlay descanso circuito -->
    <div id="overlay-descanso">
        <div class="overlay-titulo" style="color:var(--purpura)">DESCANSO DE VUELTA</div>
        <div class="overlay-clock" id="descanso-clock" style="color:white;">60</div>
        <div class="timer-progress-bar" style="max-width:280px;">
            <div class="timer-progress-fill" id="descanso-progress" style="background:var(--purpura);"></div>
        </div>
        <button class="btn-header" onclick="cerrarDescansoCircuito()">SALTAR DESCANSO</button>
    </div>

    <!-- Overlay pausa entre rondas Tabata -->
    <div id="overlay-pausa-ronda">
        <div class="overlay-titulo" style="color:var(--purpura)">PAUSA ENTRE RONDAS</div>
        <div class="overlay-clock" id="pausa-ronda-clock" style="color:white;">30</div>
        <div class="timer-progress-bar" style="max-width:280px;">
            <div class="timer-progress-fill" id="pausa-ronda-progress" style="background:var(--purpura);"></div>
        </div>
        <div id="pausa-ronda-info" style="font-size:1rem; color:var(--amarillo); margin-top:8px; font-weight:700;"></div>
        <button class="btn-header" style="margin-top:24px;" onclick="salterPausaRonda()">SALTAR PAUSA</button>
    </div>

    <!-- HOME -->
    <div class="home-screen" id="view-home">
        <div class="home-logo">
            <h1>PONETE FIT</h1>

    <div id="rutina-modal">

            <button class="btn-header" onclick="cerrar()">Salir</button>

                <div id="warmup-timer-box" style="display:none;">

                    <button class="btn-rest" id="warmup-btn" onclick="iniciarWarmupTimer()" style="background:linear-gradient(135deg,var(--azul),#0288d1); color:#000; max-width:300px; margin:0 auto;">Iniciar Calentamiento</button>
                </div>
            </div>

            <div id="sec-rutina-lista">
                <div id="sec-principal">
                    <div id="principal-titulo" class="seccion-titulo" style="color:var(--verde);">Entrenamiento</div>
                    <div id="principal-lista"></div>
                </div>
            </div>

            <!-- Timer Tabata / Circuito por Tiempo -->
            <div id="sec-timer-ui" style="display:none;">
                <div style="margin-bottom:12px;">
                    <button class="btn-header" onclick="salirDelTimer()" style="width:100%; border-radius:12px; font-size:0.85rem; min-height:48px;">← Volver a Rutina Mix</button>
                </div>
                <div id="timer-box">
                    <div id="t-status">LISTO</div>
                    <div id="t-ejercicio-nombre"></div>
                    <div id="t-ej-restantes"></div>
                    <div class="timer-progress-bar">
                        <div class="timer-progress-fill" id="timer-progress-fill"></div>
                    </div>
                    <div id="clock">05</div>
                    <div id="t-ejercicio" style="font-size:0.85rem; color:var(--texto-suave); margin-bottom:12px;">Preparate</div>
                    <div id="next-ej-container">
                        PROXIMO: <span id="next-ej-name">---</span>
                    </div>
                    <button class="btn-principal" id="btnStartTimer" onclick="iniciarCronometroTiempo()" style="background:linear-gradient(135deg,var(--verde),#00c853); color:#000; margin-bottom:10px;">EMPEZAR</button>
                    <button class="btn-pausa" id="btnPausaTimer" onclick="togglePausaTimer()" style="display:none;">⏸ PAUSAR</button>

            <!-- EMOM -->
            <div id="sec-emom-ui" style="display:none;">

                    <div id="emom-status">LISTO</div>
                    <div id="emom-minuto"></div>
                    <div class="timer-progress-bar">
                        <div class="timer-progress-fill" id="emom-progress-fill" style="background:var(--amarillo);"></div>
                    </div>
                    <div class="emom-clock" id="emom-clock">60</div>
                    <button class="btn-principal" id="btnStartEmom" onclick="iniciarEmom()" style="background:linear-gradient(135deg,var(--amarillo),#f9a825); color:#000; margin-top:20px;">INICIAR EMOM</button>
                </div>
            </div>

    </div>

    <script>
        // ─── WAKE LOCK API ───
        let wakeLock = null;

        async function solicitarWakeLock() {
            if (!('wakeLock' in navigator)) return;
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                document.getElementById('wakelock-indicator').classList.add('active');
                wakeLock.addEventListener('release', () => {
                    document.getElementById('wakelock-indicator').classList.remove('active');
                });
            } catch (err) {
                // Silently handle — older browsers
            }
        }

        async function liberarWakeLock() {
            if (wakeLock) {
                try {
                    await wakeLock.release();
                } catch (e) {}
                wakeLock = null;
                document.getElementById('wakelock-indicator').classList.remove('active');
            }
        }

        // Re-solicitar WakeLock si la pestaña vuelve a ganar foco
        document.addEventListener('visibilitychange', async() => {
            if (document.visibilityState === 'visible' && timerActivo) {
                await solicitarWakeLock();
            }
        });

        // ─── ESTADO GLOBAL ───
        let dataGlobal = null;
        let restIntervals = {};
        let seriesRestantes = {};
        let tInterval = null,
            dInterval = null,
            emomInterval = null,
            pausaRondaInterval = null;
        let tSegs = 5,
            tFase = "prep",
            tIdx = 0,
            tRonda = 1;
        let tPausaRondaResolve = null;
        let currentCode = "";
        let bloqueTiempoIntervals = {};
        let emomRunning = false,
            emomMinActual = 0;
        let warmupRunning = false,
            warmupInterval = null;
        let timerPausado = false;
        let timerActivo = false;
        let timerTotalSeg = 1; // para progress bar
        let emomTotalMin = 1; // para progress bar

        // AudioContext
        let audio = null;

        function getAudio() {
            if (!audio) audio = new(window.AudioContext || window.webkitAudioContext)();
            return audio;
        }

        function beep(f) {
            try {
                const ctx = getAudio();
                const o = ctx.createOscillator(),
                    g = ctx.createGain();
                o.connect(g);
                g.connect(ctx.destination);
                o.frequency.value = f;
                g.gain.setValueAtTime(0.08, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
                o.start();
                o.stop(ctx.currentTime + 0.2);
            } catch (e) {}
        }

        // ─── TOAST ───
        function mostrarToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2800);
        }

        // ─── CONSULTAR RUTINA ───
        async function consultarRutina() {
            const cod = document.getElementById('codigoInput').value.trim().toLowerCase();
            if (!cod) return;
            const btn = document.querySelector('.btn-principal');
            btn.innerText = 'Cargando...';
            btn.disabled = true;
            try {
                const res = await fetch("https://ponetefit-app-default-rtdb.firebaseio.com/rutinas/" + cod + ".json");
                const data = await res.json();
                if (!data) {
                    alert("Codigo no encontrado");
                    return;
                }
                dataGlobal = data;
                currentCode = cod;
                document.getElementById('id-display').innerText = cod.toUpperCase();
                document.getElementById('tipo-tag').innerText = data.tipo.toUpperCase();
                render(data);
                document.getElementById('rutina-modal').classList.add('visible');
                mostrarToast('Rutina cargada');
            } catch (e) {
                alert("Error al conectar con la base de datos");
            } finally {
                btn.innerText = 'Entrar a Entrenar';
                btn.disabled = false;
            }
        }

        // Enter key
        document.getElementById('codigoInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') consultarRutina();
        });

        function calcularPausa(reps) {
            const r = parseInt(reps);
            if (isNaN(r)) return 60;
            if (r <= 2) return 120;
            if (r <= 4) return 105;
            if (r <= 6) return 90;
            if (r <= 8) return 75;
            if (r <= 10) return 60;
            if (r <= 12) return 50;
            return 45;
        }

        // ─── CREAR CARDS ───
        function svgPlay() {
            return '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M8 5v14l11-7z"/></svg>';
        }

        function crearCard(nombre, link, meta) {
            const videoBtn = link ? '<a href="' + link + '" target="_blank" class="btn-play-video">' + svgPlay() + '</a>' : '';
            const metaHtml = meta ? '<span class="card-ejercicio-meta">' + meta + '</span>' : '';
            return '<div class="card-ejercicio"><span class="card-ejercicio-nombre">' + nombre + '</span>' + metaHtml + videoBtn + '</div>';
        }

        function crearCardNumero(idx, total, nombre, link) {
            const videoBtn = link ? '<a href="' + link + '" target="_blank" class="btn-play-video">' + svgPlay() + '</a>' : '';
            return '<div class="card-numero">' +
                '<div class="card-numero-header"><span class="card-numero-idx">EJ ' + idx + ' / ' + total + '</span></div>' +
                '<div class="card-numero-body"><span class="card-numero-nombre">' + nombre + '</span>' + videoBtn + '</div>' +
                '</div>';
        }

        // ─── RENDER CALENTAMIENTO ───
        function renderWarmup(data) {
            const tipo = data.warmup_tipo || "Circuito (Vueltas)";
            const ejsW = data.warmup_ejercicios || [];
            const det = data.warmup_config_detalle || {};

            const colorMap = {
                "Circuito (Vueltas)": "var(--azul)",
                "Circuito por Tiempo": "#4fc3f7",
                "Tabata": "var(--naranja)",
                "EMOM": "var(--amarillo)",
                "Series/Reps": "var(--verde)"
            };
            const color = colorMap[tipo] || "var(--azul)";

            document.getElementById('warmup-meta').innerHTML =
                '<span style="color:' + color + '; font-weight:900; letter-spacing:2px; font-size:0.7rem;">' + tipo.toUpperCase() + '</span>';

            const wLista = document.getElementById('warmup-lista');
            wLista.innerHTML = '';

            if (ejsW.length === 0) {
                document.getElementById('sec-warmup').style.display = "none";
                return;
            }
            document.getElementById('sec-warmup').style.display = "block";

            let metaText = "";
            if (tipo === "Circuito (Vueltas)") {
                const vueltas = data.warmup_vueltas || det.vueltas || 2;
                const pausaV = det.pausa_vuelta || 0;
                metaText = vueltas + " VUELTAS" + (pausaV > 0 ? " | Pausa: " + pausaV + "s" : "");
            } else if (tipo === "Circuito por Tiempo") {
                metaText = (det.duracion_bloque || 3) + " MINUTOS";
            } else if (tipo === "Tabata") {
                metaText = (det.trabajo || 20) + "s / " + (det.pausa || 10) + "s";
            } else if (tipo === "EMOM") {
                metaText = (det.minutos || 5) + " MINUTOS EMOM";
            } else if (tipo === "Series/Reps") {
                metaText = (det.series || 3) + " SERIES × " + (det.reps || 10) + " REPS";
            }

            if (metaText) {
                wLista.innerHTML += '<div style="color:var(--amarillo); font-weight:700; margin-bottom:12px; font-size:0.8rem; letter-spacing:1px;">' + metaText + '</div>';
            }

            ejsW.forEach(function(ej) {
                const n = Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio);
                const l = Array.isArray(ej) ? ej[1] : (ej.link || "");
                const r = Array.isArray(ej) ? ej[2] : (ej.reps || "");
                wLista.innerHTML += crearCard(n, l, r ? r + " REPS" : "");
            });

            const tBox = document.getElementById('warmup-timer-box');
            const tStatus = document.getElementById('warmup-status');
            const tEj = document.getElementById('warmup-ej');
            const tClock = document.getElementById('warmup-clock');
            const tBtn = document.getElementById('warmup-btn');

            // Limpiar botones adicionales si existen
            const oldExtra = document.getElementById('warmup-vueltas-counter');
            if (oldExtra) oldExtra.remove();
            const oldSeries = document.getElementById('warmup-series-btns');
            if (oldSeries) oldSeries.remove();

            if (tipo === "Circuito (Vueltas)") {
                const vueltas = data.warmup_vueltas || det.vueltas || 2;
                const pausaV = det.pausa_vuelta || 0;
                tBox.style.display = "block";
                tStatus.innerText = "VUELTAS DEL CALENTAMIENTO";
                tClock.style.display = "none";

                let vRestantes = vueltas;
                const vCounter = document.createElement('div');
                vCounter.id = 'warmup-vueltas-counter';
                vCounter.style.cssText = 'font-size:1.6rem; font-weight:900; color:var(--amarillo); margin:12px 0;';
                vCounter.innerText = 'Vueltas restantes: ' + vRestantes;
                tBox.insertBefore(vCounter, tBtn);

                tBtn.innerText = "ACTIVAR PAUSA";
                tBtn.style.background = "linear-gradient(135deg,var(--naranja),#d35400)";
                tBtn.onclick = function() {
                    if (vRestantes <= 0) return;
                    vRestantes--;
                    vCounter.innerText = vRestantes > 0 ? 'Vueltas restantes: ' + vRestantes : 'CALENTAMIENTO COMPLETO!';
                    if (pausaV > 0 && vRestantes > 0) iniciarDescansoCircuito(pausaV);
                    if (vRestantes <= 0) {
                        tBtn.disabled = true;
                        tBtn.innerText = "Completado";
                    }
                };
            } else if (tipo === "Circuito por Tiempo") {
                const dur = det.duracion_bloque || 3;
                const durSeg = dur * 60;
                tBox.style.display = "block";
                tStatus.innerText = "TIEMPO: " + dur + " min";
                tClock.style.display = "block";
                tClock.innerText = dur + ":00";
                tBtn.innerText = "Iniciar Tiempo";
                tBtn.onclick = function() {
                    iniciarBloqueTiempo('warmup-clock', 'warmup-btn', durSeg);
                };
            } else if (tipo === "Tabata") {
                tBox.style.display = "block";
                tStatus.innerText = "TABATA CALENTAMIENTO";
                tClock.style.display = "block";
                tClock.innerText = det.trabajo || 20;
                tBtn.innerText = "Iniciar Tabata Warmup";
                tBtn.onclick = function() {
                    iniciarTabataWarmup(ejsW, det);
                };
            } else if (tipo === "EMOM") {
                tBox.style.display = "block";
                tStatus.innerText = "EMOM CALENTAMIENTO";
                tClock.style.display = "block";
                tClock.innerText = "60";
                tBtn.innerText = "Iniciar EMOM Warmup";
                tBtn.onclick = function() {
                    iniciarEmomWarmup(det);
                };
            } else if (tipo === "Series/Reps") {
                const seriesW = det.series || 3;
                const repsW = det.reps || 10;
                const pausaSerieW = calcularPausa(repsW);
                tBox.style.display = "block";
                tStatus.innerText = seriesW + " SERIES × " + repsW + " REPS";
                tEj.innerText = "Descanso entre series: " + pausaSerieW + "s";
                tClock.style.display = "block";
                tClock.innerText = "--";
                tBtn.style.display = "none";

                let wSeriesHtml = '';
                for (let si = 0; si < seriesW; si++) {
                    wSeriesHtml += '<div style="margin-top:8px;">' +
                        '<button class="btn-rest" id="warmup-serie-btn-' + si + '" onclick="marcarSerieWarmup(' + si + ',' + pausaSerieW + ',' + seriesW + ')">' +
                        'Serie ' + (si + 1) + ' de ' + seriesW + '</button></div>';
                }
                const wSeriesContainer = document.createElement('div');
                wSeriesContainer.id = 'warmup-series-btns';
                wSeriesContainer.innerHTML = wSeriesHtml;
                tBox.appendChild(wSeriesContainer);
            }
        }

        // ─── TIMERS CALENTAMIENTO ───
        function iniciarWarmupTimer() {
            const tipo = (dataGlobal && dataGlobal.warmup_tipo) ? dataGlobal.warmup_tipo : "";
            const det = (dataGlobal && dataGlobal.warmup_config_detalle) ? dataGlobal.warmup_config_detalle : {};
            const ejsW = (dataGlobal && dataGlobal.warmup_ejercicios) ? dataGlobal.warmup_ejercicios : [];

            if (tipo === "Tabata") {
                if (warmupRunning) return;
                warmupRunning = true;
                solicitarWakeLock();
                const btn = document.getElementById('warmup-btn');
                if (btn) {
                    btn.disabled = true;
                    btn.innerText = "En curso...";
                }
                document.getElementById('warmup-status').innerText = "PREPARATE!";
                document.getElementById('warmup-ej').innerText = "";
                let _cd = 5;
                document.getElementById('warmup-clock').innerText = _cd;
                const _ivW = setInterval(function() {
                    beep(440);
                    _cd--;
                    document.getElementById('warmup-clock').innerText = _cd;
                    if (_cd <= 0) {
                        clearInterval(_ivW);
                        warmupRunning = false;
                        if (btn) btn.disabled = false;
                        iniciarTabataWarmup(ejsW, det);
                    }
                }, 1000);
            } else if (tipo === "EMOM") {
                if (warmupRunning) return;
                warmupRunning = true;
                solicitarWakeLock();
                const btn = document.getElementById('warmup-btn');
                if (btn) {
                    btn.disabled = true;
                    btn.innerText = "En curso...";
                }
                document.getElementById('warmup-status').innerText = "PREPARATE!";
                document.getElementById('warmup-ej').innerText = "";
                let _cdE = 5;
                document.getElementById('warmup-clock').innerText = _cdE;
                const _ivE = setInterval(function() {
                    beep(440);
                    _cdE--;
                    document.getElementById('warmup-clock').innerText = _cdE;
                    if (_cdE <= 0) {
                        clearInterval(_ivE);
                        warmupRunning = false;
                        if (btn) btn.disabled = false;
                        iniciarEmomWarmup(det);
                    }
                }, 1000);
            } else if (tipo === "Circuito por Tiempo") {
                solicitarWakeLock();
                const durSeg = (det.duracion_bloque || 3) * 60;
                iniciarBloqueTiempo('warmup-clock', 'warmup-btn', durSeg);
            }
        }

        let warmupTabInterval = null;

        function iniciarTabataWarmup(ejsW, det) {
            if (warmupRunning) return;
            warmupRunning = true;
            solicitarWakeLock();
            document.getElementById('warmup-btn').disabled = true;
            document.getElementById('warmup-btn').innerText = "En curso...";
            const trabajo = det.trabajo || 20;
            const pausa = det.pausa || 10;
            const totalEjs = ejsW.length;
            let ejIdx = 0;

            document.getElementById('warmup-status').innerText = "PREPARATE!";
            let _prepRemTW = 5;
            document.getElementById('warmup-clock').innerText = _prepRemTW;
            warmupTabInterval = setInterval(function() {
                beep(600);
                _prepRemTW--;
                document.getElementById('warmup-clock').innerText = _prepRemTW;
                if (_prepRemTW <= 0) {
                    clearInterval(warmupTabInterval);
                    siguiente();
                }
            }, 1000);

            function siguiente() {
                if (ejIdx >= totalEjs) {
                    document.getElementById('warmup-status').innerText = "CALENTAMIENTO LISTO!";
                    document.getElementById('warmup-ej').innerText = "";
                    document.getElementById('warmup-clock').innerText = "OK";
                    warmupRunning = false;
                    liberarWakeLock();
                    return;
                }
                const ej = ejsW[ejIdx];
                const nombre = Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio || "");
                document.getElementById('warmup-status').innerText = "TRABAJO — Ej " + (ejIdx + 1) + "/" + totalEjs;
                document.getElementById('warmup-ej').innerText = nombre;
                let rem = trabajo;
                document.getElementById('warmup-clock').innerText = rem < 10 ? "0" + rem : rem;
                warmupTabInterval = setInterval(function() {
                    rem--;
                    document.getElementById('warmup-clock').innerText = rem < 10 ? "0" + rem : rem;
                    if (rem <= 0) {
                        clearInterval(warmupTabInterval);
                        document.getElementById('warmup-status').innerText = "DESCANSO";
                        const nextIdx = ejIdx + 1;
                        if (nextIdx < totalEjs) {
                            const nextEj = ejsW[nextIdx];
                            document.getElementById('warmup-ej').innerText = "PROXIMO: " + (Array.isArray(nextEj) ? nextEj[0] : (nextEj.nombre || ""));
                        } else {
                            document.getElementById('warmup-ej').innerText = "ULTIMO — CASI LISTO!";
                        }
                        let d = pausa;
                        document.getElementById('warmup-clock').innerText = d < 10 ? "0" + d : d;
                        warmupTabInterval = setInterval(function() {
                            d--;
                            document.getElementById('warmup-clock').innerText = d < 10 ? "0" + d : d;
                            if (d <= 0) {
                                clearInterval(warmupTabInterval);
                                ejIdx++;
                                siguiente();
                            }
                        }, 1000);
                    }
                }, 1000);
            }
            siguiente();
        }

        let warmupEmomInterval = null;

        function iniciarEmomWarmup(det) {
            if (warmupRunning) return;
            warmupRunning = true;
            solicitarWakeLock();
            document.getElementById('warmup-btn').disabled = true;
            document.getElementById('warmup-btn').innerText = "En curso...";
            const mins = det.minutos || 5;
            const ejsW = (dataGlobal && dataGlobal.warmup_ejercicios) ? dataGlobal.warmup_ejercicios : [];
            const ejsPorMin = ejsW.length > 0 ? Math.ceil(ejsW.length / mins) : 1;
            let minActual = 0;

            document.getElementById('warmup-status').innerText = "PREPARATE!";
            let _prepRemEW = 5;
            document.getElementById('warmup-clock').innerText = _prepRemEW;
            warmupEmomInterval = setInterval(function() {
                beep(600);
                _prepRemEW--;
                document.getElementById('warmup-clock').innerText = _prepRemEW;
                if (_prepRemEW <= 0) {
                    clearInterval(warmupEmomInterval);
                    sig();
                }
            }, 1000);

            function sig() {
                if (minActual >= mins) {
                    document.getElementById('warmup-status').innerText = "CALENTAMIENTO LISTO!";
                    document.getElementById('warmup-ej').innerText = "";
                    document.getElementById('warmup-clock').innerText = "OK";
                    warmupRunning = false;
                    liberarWakeLock();
                    return;
                }
                document.getElementById('warmup-status').innerText = "MINUTO " + (minActual + 1) + "/" + mins;
                if (ejsW.length > 0) {
                    const startIdx = minActual * ejsPorMin;
                    const endIdx = Math.min(startIdx + ejsPorMin, ejsW.length);
                    const ejsMinuto = [];
                    for (var ei = startIdx; ei < endIdx; ei++) {
                        const ej = ejsW[ei];
                        ejsMinuto.push(Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio || ""));
                    }
                    document.getElementById('warmup-ej').innerText = ejsMinuto.length > 0 ? ejsMinuto.join(" | ") : (Array.isArray(ejsW[ejsW.length - 1]) ? ejsW[ejsW.length - 1][0] : (ejsW[ejsW.length - 1].nombre || ""));
                }
                let rem = 60;
                document.getElementById('warmup-clock').innerText = rem;
                warmupEmomInterval = setInterval(function() {
                    rem--;
                    document.getElementById('warmup-clock').innerText = rem;
                    if (rem <= 0) {
                        clearInterval(warmupEmomInterval);
                        beep(800);
                        minActual++;
                        sig();
                    }
                }, 1000);
            }
            sig();
        }

        const warmupSeriesRestantes = {};
        const warmupSeriesIntervals = {};

        function marcarSerieWarmup(idx, pausaSeg, totalSeries) {
            const btn = document.getElementById("warmup-serie-btn-" + idx);
            if (!btn || btn.disabled) return;
            btn.disabled = true;
            btn.innerText = "Descansando...";
            solicitarWakeLock();

            document.getElementById('warmup-status').innerText = "DESCANSO — Serie " + (idx + 1) + "/" + totalSeries;
            const clock = document.getElementById('warmup-clock');
            clock.style.display = "block";
            let rem = pausaSeg;
            clock.innerText = rem;
            document.getElementById('warmup-ej').innerText = "Recuperate antes de la siguiente serie";

            warmupSeriesIntervals[idx] = setInterval(function() {
                rem--;
                clock.innerText = rem;
                if (rem <= 3 && rem > 0) beep(400);
                if (rem <= 0) {
                    clearInterval(warmupSeriesIntervals[idx]);
                    beep(800);
                    btn.innerText = "Serie " + (idx + 1) + " completada";
                    btn.style.background = "linear-gradient(135deg,var(--verde),#00c853)";
                    btn.style.color = "#000";
                    clock.innerText = "--";
                    document.getElementById('warmup-ej').innerText = "";
                    const nextIdx = idx + 1;
                    if (nextIdx < totalSeries) {
                        document.getElementById('warmup-status').innerText = "LISTA PARA SERIE " + (nextIdx + 1) + "/" + totalSeries;
                    } else {
                        document.getElementById('warmup-status').innerText = "CALENTAMIENTO LISTO!";
                        liberarWakeLock();
                    }
                }
            }, 1000);
        }

        // ─── RENDER PRINCIPAL ───
        function render(data) {
            renderWarmup(data);
            document.getElementById('sec-emom-ui').style.display = "none";
            document.getElementById('sec-timer-ui').style.display = "none";
            const pLista = document.getElementById('principal-lista');
            const pTitulo = document.getElementById('principal-titulo');
            pLista.innerHTML = '';
            const ejerciciosPrincipales = data.rutina || data.datos || [];
            if (data.tipo === "Series") renderSeries(data, pTitulo, pLista, ejerciciosPrincipales);
            else if (data.tipo === "Circuito") renderCircuito(data, pTitulo, pLista, ejerciciosPrincipales);
            else if (data.tipo === "Tabata") renderTabata(data, pTitulo, pLista, ejerciciosPrincipales);
            else if (data.tipo === "Circuito por Tiempo") renderCircuitoTiempo(data, pTitulo, pLista, ejerciciosPrincipales);
            else if (data.tipo === "EMOM") renderEmom(data, pTitulo, pLista);
            else if (data.tipo === "MIX") renderMix(data, pTitulo, pLista);
            else {
                pTitulo.innerText = "ENTRENAMIENTO";
                ejerciciosPrincipales.forEach(function(ej) {
                    const n = Array.isArray(ej) ? ej[0] : (ej.nombre || "");
                    const l = Array.isArray(ej) ? ej[1] : (ej.link || "");
                    pLista.innerHTML += crearCard(n, l, "");
                });
            }
        }

        // ─── MODO SERIES ───
        function renderSeries(data, pTitulo, pLista, ejercicios) {
            pTitulo.innerText = "SERIES";
            ejercicios.forEach(function(ej, i) {
                const pausa = calcularPausa(ej.reps);
                seriesRestantes[i] = parseInt(ej.series);
                pLista.innerHTML += '<div class="serie-card">' +
                    '<div class="serie-header"><span class="serie-nombre">' + ej.nombre + '</span>' +
                    '<a href="' + ej.link + '" target="_blank" class="btn-play-video">' + svgPlay() + '</a></div>' +
                    '<div class="serie-meta">' +
                    '<div class="serie-meta-item"><span class="serie-meta-label">Series</span><span class="serie-meta-value" id="s-val-' + i + '">' + ej.series + '</span></div>' +
                    '<div class="serie-meta-item"><span class="serie-meta-label">Reps</span><span class="serie-meta-value">' + ej.reps + '</span></div>' +
                    '<div class="serie-meta-item"><span class="serie-meta-label">Descanso</span><span class="serie-meta-value" style="color:var(--naranja)">' + pausa + 's</span></div>' +
                    '</div>' +
                    '<div style="text-align:center;">' +
                    '<div class="timer-display" id="timer-' + i + '">' + pausa + '</div>' +
                    '<button class="btn-rest" id="btn-' + i + '" onclick="marcarSerie(' + i + ',' + pausa + ')">Marcar Serie</button>' +
                    '</div></div>';
            });
        }

        // ─── MODO CIRCUITO ───
        function renderCircuito(data, pTitulo, pLista, ejercicios) {
            pTitulo.innerText = "CIRCUITO";
            const vBloque = data.vueltas_bloque || 3;
            const pausaVuelta = data.pausa_vuelta || 60;
            let vRestantes = vBloque;
            const vContId = 'circ-vueltas-counter';

            if (pausaVuelta > 0) {
                pLista.innerHTML += '<div class="info-block"><span class="info-block-titulo" style="color:var(--naranja)">Pausa entre Vueltas</span><span class="info-block-subtitulo">' + pausaVuelta + ' segundos</span></div>';
            }
            pLista.innerHTML += '<div id="' + vContId + '" style="text-align:center; font-size:1.4rem; font-weight:900; color:var(--amarillo); padding:14px; background:var(--tarjeta-alt); border-radius:14px; margin-bottom:14px; border:1px solid var(--borde-sutil);">Vueltas restantes: ' + vRestantes + '</div>';

            ejercicios.forEach(function(b, bIdx) {
                pLista.innerHTML += '<div class="circ-bloque-header"><span class="circ-bloque-label">Circuito ' + (bIdx + 1) + ' — ' + vBloque + ' Vueltas</span></div>';
                b.ejercicios.forEach(function(ej) {
                    pLista.innerHTML += crearCard(ej.nombre, ej.link, ej.reps + " REPS");
                });
            });

            pLista.innerHTML += '<div style="margin-top:16px;">' +
                '<button id="circ-btn-vuelta" class="btn-rest" onclick="marcarVueltaCircuito(' + pausaVuelta + ',\'' + vContId + '\',' + vBloque + ')">ACTIVAR PAUSA</button></div>';
        }

        let circVueltasRestantes = 0;

        function marcarVueltaCircuito(pausaVuelta, contId, totalVueltas) {
            if (circVueltasRestantes === 0) circVueltasRestantes = totalVueltas;
            if (circVueltasRestantes <= 0) return;
            circVueltasRestantes--;
            const el = document.getElementById(contId);
            if (el) el.innerText = circVueltasRestantes > 0 ? 'Vueltas restantes: ' + circVueltasRestantes : 'CIRCUITO COMPLETO!';
            if (circVueltasRestantes <= 0) {
                const btn = document.getElementById('circ-btn-vuelta');
                if (btn) {
                    btn.disabled = true;
                    btn.innerText = "Completado";
                }
                return;
            }
            if (pausaVuelta > 0) iniciarDescansoCircuito(pausaVuelta);
        }

        // ─── MODO CIRCUITO POR TIEMPO ───
        function renderCircuitoTiempo(data, pTitulo, pLista, ejercicios) {
            pTitulo.innerText = "CIRCUITO POR TIEMPO";
            const tieneBloques = ejercicios.length > 0 && ejercicios[0] && ejercicios[0].ejercicios;

            if (tieneBloques) {
                ejercicios.forEach(function(bloque, bIdx) {
                    const tiempoMin = bloque.tiempo_min || 5;
                    const tiempoSeg = tiempoMin * 60;
                    const timerId = 'ct-timer-' + bIdx;
                    const btnId = 'ct-btn-' + bIdx;

                    let html = '<div style="background:var(--tarjeta-alt); border:1px solid #1a8bc0; border-radius:18px; padding:18px; margin-bottom:18px;">' +
                        '<div style="color:var(--azul); font-size:0.7rem; font-weight:900; letter-spacing:2px; margin-bottom:12px;">BLOQUE ' + (bloque.id || (bIdx + 1)) + ' — ' + tiempoMin + ' MINUTOS</div>';
                    (bloque.ejercicios || []).forEach(function(ej) {
                        const nombre = ej.nombre || ej[0] || "";
                        const link = ej.link || ej[1] || "";
                        const reps = ej.reps || ej[2] || "";
                        html += crearCard(nombre, link, reps ? reps + " REPS" : "");
                    });
                    html += '<div id="' + timerId + '" style="font-size:3rem; font-family:Roboto Mono,monospace; font-weight:700; color:var(--amarillo); text-align:center; margin:12px 0; text-shadow:0 0 20px var(--amarillo-glow);">' + tiempoMin + ':00</div>' +
                        '<button id="' + btnId + '" class="btn-rest" onclick="iniciarBloqueTiempoConDescuento(\'' + timerId + '\',\'' + btnId + '\',' + tiempoSeg + ')">Iniciar Bloque</button>' +
                        '</div>';
                    pLista.innerHTML += html;
                });
            } else {
                document.getElementById('sec-timer-ui').style.display = "block";
                const btnPausa = document.getElementById('btnPausaTimer');
                if (btnPausa) btnPausa.style.display = "block";

                ejercicios.forEach(function(ej, i) {
                    const n = Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio || "");
                    const l = Array.isArray(ej) ? ej[1] : (ej.link || "");
                    const r = Array.isArray(ej) ? (ej[2] || "") : (ej.reps || "");
                    pLista.innerHTML += crearCard(n, l, r ? r + " REPS" : "TIEMPO");
                });

                if (dataGlobal && (!dataGlobal.config || !dataGlobal.config.trabajo)) {
                    const tiempoMin = (dataGlobal.datos && dataGlobal.datos[0] && dataGlobal.datos[0].tiempo_min) ||
                        (dataGlobal.config && dataGlobal.config.duracion_bloque) || 5;
                    dataGlobal.config = dataGlobal.config || {};
                    dataGlobal.config.trabajo = tiempoMin * 60;
                    dataGlobal.config.pausa = 0;
                    dataGlobal.config.rondas = 1;
                    dataGlobal.config.pausa_entre_rondas = 0;
                }
            }
        }

        // ─── MODO TABATA ───
        function renderTabata(data, pTitulo, pLista, ejercicios) {
            pTitulo.innerText = "TABATA";
            document.getElementById('sec-timer-ui').style.display = "block";
            const btnPausa = document.getElementById('btnPausaTimer');
            if (btnPausa) {
                btnPausa.style.display = "block";
                btnPausa.innerText = "⏸ PAUSAR";
                timerPausado = false;
            }

            const config = data.config || {
                trabajo: 20,
                pausa: 10,
                rondas: 1,
                cantidad: 8,
                pausa_entre_rondas: 0
            };

            pLista.innerHTML += '<div class="info-block" style="border-color:var(--naranja);">' +
                '<span class="info-block-titulo" style="color:var(--naranja)">' + config.trabajo + 's TRABAJO / ' + config.pausa + 's DESCANSO</span>' +
                '<span class="info-block-subtitulo">' + config.rondas + ' RONDA(S)' + (config.cantidad ? ' × ' + config.cantidad + ' SERIES' : '') + (pr > 0 ? ' | Pausa rondas: ' + pr + 's' : '') + '</span></div>';

                const n = Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio || "");
                const l = Array.isArray(ej) ? ej[1] : (ej.link || "");
                pLista.innerHTML += crearCardNumero(i + 1, ejercicios.length, n, l);
            });
        }

        // ─── MODO EMOM ───
        function renderEmom(data, pTitulo, pLista) {
            pTitulo.innerText = "EMOM";
            document.getElementById('sec-emom-ui').style.display = "block";

            const ejsPorMin = data.ejercicios_por_minuto || 1;

                '<span class="info-block-titulo" style="color:var(--amarillo)">' + minutos + ' MINUTOS — ' + ejsPorMin + ' EJ/MIN</span></div>';
            rutina.forEach(function(ej, i) {
                const n = Array.isArray(ej) ? ej[0] : (ej.nombre || ej.ejercicio);
                const l = Array.isArray(ej) ? ej[1] : (ej.link || "");

        // ─── MODO MIX ───
        var bloquesMix = [];

        function renderMix(data, pTitulo, pLista) {
            pTitulo.innerText = "MIX";
            const bloques = data.bloques || [];
            bloquesMix = bloques;

            if (bloques.length > 0) {
                bloques.forEach(function(bloque, idx) {
                    renderBloqueMix(pLista, bloque, idx + 1);
                });
                return;
            }

            // Fallback formato antiguo
            const modos = data.modos_seleccionados || [];

            if (data.circuito && data.circuito.length > 0 && modos.indexOf("circuito") !== -1) {
                const vueltas = data.circuito_vueltas || 3;

                let html = '<div class="mix-seccion" style="border-color:#4fc3f7;">' +
                    '<div class="mix-seccion-titulo" style="color:var(--azul);">CIRCUITO (' + vueltas + ' VUELTAS)</div>' +
                    (pausaV > 0 ? '<div style="color:var(--naranja); font-size:0.8rem; margin-bottom:10px;">Pausa entre vueltas: ' + pausaV + 's</div>' : '');
                data.circuito.forEach(function(b) {
                    html += '<div class="circ-bloque-header"><span class="circ-bloque-label">Bloque #' + b.id + '</span></div>';
                    b.ejercicios.forEach(function(ej) {
                        html += crearCard(ej.nombre, ej.link, ej.reps + " REPS");

                if (pausaV > 0) html += '<button class="btn-rest" onclick="marcarVueltaMixOld(\'mix-old-circ-vcount\',' + pausaV + ',' + vueltas + ')">ACTIVAR PAUSA</button>';
                html += '</div>';
                pLista.innerHTML += html;
            }

            if (data.circuito_tiempo && data.circuito_tiempo.length > 0 && modos.indexOf("circ_tiempo") !== -1) {
                let html = '<div class="mix-seccion" style="border-color:#4fc3f7;">' +
                    '<div class="mix-seccion-titulo" style="color:var(--azul);">CIRCUITO POR TIEMPO</div>';
                data.circuito_tiempo.forEach(function(b, bIdx) {
                    const tiempo = b.tiempo_min || 5;
                    const timerIdVal = "mix-ct-" + bIdx;
                    const btnIdVal = "mix-ct-btn-" + bIdx;
                    html += '<div style="background:var(--fondo); border-radius:12px; padding:12px; margin-bottom:12px;">' +
                        '<div style="color:var(--azul); font-weight:bold; margin-bottom:8px; font-size:0.8rem; letter-spacing:1px;">BLOQUE #' + b.id + ' — ' + tiempo + ' min</div>';
                    b.ejercicios.forEach(function(ej) {
                        html += crearCard(ej.nombre, ej.link, ej.reps + " REPS");
                    });
                    html += '<div id="' + timerIdVal + '" style="font-size:2.5rem; font-family:Roboto Mono,monospace; font-weight:700; color:var(--amarillo); text-align:center; margin:8px 0;">' + tiempo + ':00</div>' +
                        '<button id="' + btnIdVal + '" class="btn-rest" onclick="iniciarBloqueTiempoConDescuento(\'' + timerIdVal + '\',\'' + btnIdVal + '\',' + (tiempo * 60) + ')">Iniciar Bloque</button></div>';
                });
                html += '</div>';
                pLista.innerHTML += html;
            }

            if (data.tabata && data.tabata.length > 0 && modos.indexOf("tabata") !== -1) {
                const tc = data.tabata_config || {
                    trabajo: 20,
                    pausa: 10,
                    rondas: 1,
                    cantidad: 8,
                    pausa_entre_rondas: 0

                pLista.innerHTML += renderTabataMixInline(data.tabata, tc, "mix-tab");

            if (data.emom && data.emom.length > 0 && modos.indexOf("emom") !== -1) {

                    minutos_totales: 10,
                    ejercicios_por_minuto: 1
                };
                pLista.innerHTML += renderEmomMixInline(data.emom, ec, data.reps_por_ejercicio || {}, "mix-emom");
            }

            if (data.series && data.series.length > 0 && modos.indexOf("series") !== -1) {
                renderSeriesMixInline(pLista, data.series, 9000);

        function marcarVueltaMixOld(contId, pausaVuelta, totalVueltas) {
            if (!mixOldCircVueltas[contId]) mixOldCircVueltas[contId] = totalVueltas;

                (bloque.rutina || []).forEach(function(b) {
                    html += '<div class="circ-bloque-header"><span class="circ-bloque-label">Bloque #' + b.id + '</span></div>';
                    b.ejercicios.forEach(function(ej) {
                        html += crearCard(ej.nombre, ej.link, ej.reps + " REPS");

                (bloque.rutina || []).forEach(function(b, bIdx) {

                    pausa: bloque.pausa || 10,
                    rondas: bloque.rondas || 1,
                    cantidad: bloque.cantidad || 8,
                    pausa_entre_rondas: bloque.pausa_entre_rondas || 0
                };
                const rutinaTab = bloque.rutina || [];
                let htmlTab = '<div class="bloque-mix" style="border-color:var(--naranja);">' +
                    '<div class="bloque-mix-titulo" style="color:var(--naranja);">BLOQUE ' + idx + ' — TABATA</div>' +
                    '<div class="info-block" style="border-color:var(--naranja);">' +
                    '<span class="info-block-titulo" style="color:var(--naranja)">' + tc.trabajo + 's / ' + tc.pausa + 's</span>' +
                    '<span class="info-block-subtitulo">' + tc.rondas + ' ronda(s) × ' + tc.cantidad + ' series' + (tc.pausa_entre_rondas > 0 ? ' | Pausa: ' + tc.pausa_entre_rondas + 's' : '') + '</span></div>';
                rutinaTab.forEach(function(ej, i) {

        // ─── MARCAR SERIE (con WakeLock) ───
        function marcarSerie(i, pausa) {
            if (seriesRestantes[i] <= 0) return;
            seriesRestantes[i]--;
            const btn = document.getElementById('btn-' + i);
            const timer = document.getElementById('timer-' + i);
            const val = document.getElementById('s-val-' + i);
            if (val) val.innerText = seriesRestantes[i];
            if (seriesRestantes[i] <= 0) {
                btn.innerText = "Completado";
                btn.disabled = true;
                return;
            }
            btn.classList.add('active');
            btn.innerText = "Descansando...";
            timer.style.display = "block";
            solicitarWakeLock();

            let remaining = pausa;
            timer.innerText = remaining;
            restIntervals[i] = setInterval(function() {
                remaining--;
                timer.innerText = remaining;
                if (remaining <= 3 && remaining > 0) beep(400);
                if (remaining <= 0) {
                    clearInterval(restIntervals[i]);
                    beep(800);
                    timer.style.display = "none";
                    btn.classList.remove('active');
                    btn.innerText = "Marcar Serie (" + seriesRestantes[i] + " rest.)";
                    liberarWakeLock();
                }
            }, 1000);
        }

        // ─── DESCANSO CIRCUITO (overlay) ───
        function iniciarDescansoCircuito(segundos) {
            clearInterval(dInterval);
            const clock = document.getElementById('descanso-clock');
            const progress = document.getElementById('descanso-progress');
            const total = segundos;
            clock.innerText = segundos;
            if (progress) progress.style.width = '100%';
            document.getElementById('overlay-descanso').classList.add('visible');
            document.getElementById('overlay-descanso').style.display = 'flex';
            solicitarWakeLock();

            let rem = segundos;
            dInterval = setInterval(function() {
                rem--;
                clock.innerText = rem;
                if (progress) progress.style.width = ((rem / total) * 100) + '%';
                if (rem <= 3 && rem > 0) beep(400);
                if (rem <= 0) {
                    clearInterval(dInterval);
                    beep(800);
                    cerrarDescansoCircuito();
                }
            }, 1000);
        }

        function cerrarDescansoCircuito() {
            clearInterval(dInterval);
            document.getElementById('overlay-descanso').classList.remove('visible');
            document.getElementById('overlay-descanso').style.display = 'none';
