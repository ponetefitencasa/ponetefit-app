<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONETE FIT | Full Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
         :root {
            --naranja: #FF4500;
            --azul: #2980b9;
            --verde: #27ae60;
            --rojo: #c0392b;
            --fondo: #0f172a;
            --tarjeta: #1e293b;
            --texto: #f8fafc;
        }
        
        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        /* PANTALLA DE INICIO */
        
        .home-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        
        .search-box {
            background: var(--tarjeta);
            padding: 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        input {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 15px;
        }
        
        .btn-principal {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: var(--naranja);
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            text-transform: uppercase;
        }
        /* VENTANA DE RUTINA (MODAL) */
        
        #rutina-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--fondo);
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
            animation: slideUp 0.3s ease-out;
        }
        
        @keyframes slideUp {
            from {
                transform: translateY(100%);
            }
            to {
                transform: translateY(0);
            }
        }
        
        .header-rutina {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--naranja);
            padding-bottom: 10px;
            position: sticky;
            top: 0;
            background: var(--fondo);
            z-index: 10;
        }
        
        .btn-cerrar {
            background: #475569;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        /* SECCIONES Y CARDS */
        
        h2 {
            color: var(--azul);
            font-size: 1.4rem;
            margin-top: 30px;
            border-left: 5px solid var(--azul);
            padding-left: 12px;
        }
        
        .bloque-titulo {
            color: #94a3b8;
            font-size: 1.1rem;
            margin: 25px 0 10px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            border-bottom: 1px solid #334155;
            padding-bottom: 5px;
        }
        
        .card {
            background: var(--tarjeta);
            margin: 10px 0;
            padding: 16px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .card-info b {
            display: block;
            font-size: 1.1rem;
            color: #fff;
            margin-bottom: 4px;
        }
        
        .card-info span {
            color: #f1c40f;
            font-size: 0.9rem;
            font-weight: 900;
        }
        
        .btn-video {
            background: var(--rojo);
            color: white;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 900;
        }
        
        .config-pill {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border: 1px dashed #475569;
            line-height: 1.4;
        }
        /* TIMER AL FINAL */
        
        #timer-container {
            background: var(--tarjeta);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 50px 0 80px 0;
            border: 4px solid var(--verde);
            box-shadow: 0 0 25px rgba(39, 174, 96, 0.2);
        }
        
        #timer-status {
            font-size: 1.6rem;
            font-weight: 900;
        }
        
        #timer-clock {
            font-size: 6.5rem;
            font-family: 'Courier New', monospace;
            font-weight: 900;
            margin: 10px 0;
        }
        
        #timer-ejercicio {
            font-size: 1.3rem;
            color: var(--naranja);
            font-weight: bold;
            min-height: 1.5em;
        }
        
        .btn-timer {
            width: 100%;
            padding: 20px;
            border-radius: 15px;
            border: none;
            font-weight: 900;
            cursor: pointer;
            margin-top: 20px;
            font-size: 1.2rem;
            background: var(--verde);
            color: white;
        }
    </style>
</head>

<body>

    <div class="home-screen" id="view-home">
        <h1 style="color: var(--naranja); font-size: 3.5rem; margin: 0;">PONETE FIT</h1>
        <h1 style="color: var(--yellow); font-size: 3.5rem; margin: 0;">EN CASA</h1>
        <div class="search-box">
            <input type="text" id="codigoInput" placeholder="INGRESA TU CÓDIGO">
            <button class="btn-principal" onclick="buscarRutina()">VER MI RUTINA</button>
        </div>
    </div>

    <div id="rutina-modal">
        <div class="header-rutina">
            <h3 id="modal-titulo" style="margin:0; font-size: 1.5rem;">ENTRENAMIENTO</h3>
            <button class="btn-cerrar" onclick="cerrarModal()">VOLVER</button>
        </div>

        <div id="contenido-rutina"></div>

        <div id="timer-container" style="display:none;">
            <div id="timer-status">¿LISTO?</div>
            <div id="timer-clock">05</div>
            <div id="timer-ejercicio">Prepárate para arrancar</div>
            <button class="btn-timer" id="btnPlay" onclick="iniciarConPreparacion()">▶ EMPEZAR TABATA</button>
        </div>
    </div>

    <script>
        let rutinaActual = [];
        let configTabata = {};
        let timerInterval;
        let tiempoRestante = 5;
        let fase = "preparacion";
        let indiceEjercicio = 0;
        let rondaActual = 1;

        const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

        function playBeep(f) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.frequency.value = f;
            g.gain.value = 0.06;
            o.start();
            setTimeout(() => o.stop(), 150);
        }

        async function buscarRutina() {
            const cod = document.getElementById('codigoInput').value.trim().toLowerCase();
            if (!cod) return;

            try {
                const response = await fetch(`https://ponetefit-app-default-rtdb.firebaseio.com/rutinas/${cod}.json`);
                const data = await response.json();
                if (!data) {
                    alert("Código no encontrado");
                    return;
                }

                rutinaActual = data.rutina;
                let html = `<h2>🔥 ENTRADA EN CALOR</h2>`;
                html += `<div class="config-pill">Realizar <b>${data.warmup_vueltas} vueltas</b> de forma continua.</div>`;
                data.warmup_ejercicios.forEach(ej => {
                    html += crearTarjeta(ej[0], ej[1], ej[2] + " REPS");
                });

                // Lógica corregida para Circuitos Múltiples
                if (data.tipo === "Circuito") {
                    document.getElementById('timer-container').style.display = "none";
                    html += `<h2 style="color:var(--verde); border-color:var(--verde)">🔄 CIRCUITO PRINCIPAL</h2>`;
                    html += `<div class="config-pill">Dar un total de <b>${data.vueltas_bloque} vueltas</b> a cada bloque.</div>`;

                    // AQUÍ ESTÁ EL CAMBIO: Recorremos todos los bloques del JSON
                    data.rutina.forEach(bloque => {
                        html += `<span class="bloque-titulo">Bloque #${bloque.id}</span>`;
                        bloque.ejercicios.forEach(ej => {
                            html += crearTarjeta(ej.nombre, ej.link, ej.reps + " REPS");
                        });
                    });
                } else {
                    // Modo Tabata
                    configTabata = data.config;
                    document.getElementById('timer-container').style.display = "block";
                    html += `<h2 style="color:var(--verde); border-color:var(--verde)">⏱️ BLOQUE TABATA</h2>`;
                    html += `<div class="config-pill"><b>Trabajo:</b> ${configTabata.trabajo}s | <b>Pausa:</b> ${configTabata.pausa}s | <b>Rondas:</b> ${configTabata.rondas}</div>`;
                    data.rutina.forEach((ej, i) => {
                        html += crearTarjeta(`${i+1}. ${ej[0]}`, ej[1], "MODO TIMER");
                    });
                }

                document.getElementById('contenido-rutina').innerHTML = html;
                document.getElementById('rutina-modal').style.display = "block";
                resetTimer();

            } catch (e) {
                console.error(e);
            }
        }

        // --- LÓGICA DEL TIMER (TABATA) ---
        function iniciarConPreparacion() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('btnPlay').style.display = "none";
            fase = "preparacion";
            tiempoRestante = 5;
            document.getElementById('timer-status').innerText = "PREPARACIÓN";
            document.getElementById('timer-container').style.borderColor = "#f1c40f";
            timerInterval = setInterval(logicaTimer, 1000);
        }

        function logicaTimer() {
            if (tiempoRestante <= 3 && tiempoRestante > 0) playBeep(440);
            if (tiempoRestante === 0) {
                playBeep(880);
                cambiarFase();
            } else {
                tiempoRestante--;
            }
            actualizarReloj();
        }

        function cambiarFase() {
            const container = document.getElementById('timer-container');
            if (fase === "preparacion") {
                fase = "trabajo";
                tiempoRestante = configTabata.trabajo;
                container.style.borderColor = "var(--verde)";
                document.getElementById('timer-status').innerText = "¡DALE!";
                document.getElementById('timer-status').style.color = "var(--verde)";
                document.getElementById('timer-ejercicio').innerText = rutinaActual[0][0];
            } else if (fase === "trabajo") {
                fase = "pausa";
                tiempoRestante = configTabata.pausa;
                container.style.borderColor = "var(--rojo)";
                document.getElementById('timer-status').innerText = "DESCANSO";
                document.getElementById('timer-status').style.color = "var(--rojo)";
            } else if (fase === "pausa") {
                fase = "trabajo";
                tiempoRestante = configTabata.trabajo;
                indiceEjercicio++;
                if (indiceEjercicio >= rutinaActual.length) {
                    indiceEjercicio = 0;
                    rondaActual++;
                }
                if (rondaActual > configTabata.rondas) {
                    clearInterval(timerInterval);
                    document.getElementById('timer-status').innerText = "¡TERMINADO!";
                    document.getElementById('timer-ejercicio').innerText = "Excelente entrenamiento";
                    return;
                }
                container.style.borderColor = "var(--verde)";
                document.getElementById('timer-status').innerText = "¡DALE!";
                document.getElementById('timer-status').style.color = "var(--verde)";
                document.getElementById('timer-ejercicio').innerText = rutinaActual[indiceEjercicio][0];
            }
        }

        function actualizarReloj() {
            document.getElementById('timer-clock').innerText = tiempoRestante < 10 ? "0" + tiempoRestante : tiempoRestante;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            tiempoRestante = 5;
            fase = "preparacion";
            indiceEjercicio = 0;
            rondaActual = 1;
            document.getElementById('btnPlay').style.display = "block";
            document.getElementById('timer-clock').innerText = "05";
            document.getElementById('timer-status').innerText = "¿LISTO?";
            document.getElementById('timer-status').style.color = "var(--verde)";
            document.getElementById('timer-ejercicio').innerText = "Prepárate para iniciar";
            document.getElementById('timer-container').style.borderColor = "var(--verde)";
        }

        function cerrarModal() {
            resetTimer();
            document.getElementById('rutina-modal').style.display = "none";
        }

        function crearTarjeta(n, l, r) {
            return `
            <div class="card">
                <div class="card-info">
                    <b>${n}</b>
                    <span>${r}</span>
                </div>
                <a href="${l}" target="_blank" class="btn-video">📺 VIDEO</a>
            </div>
        `;
        }
    </script>
</body>

</html>
